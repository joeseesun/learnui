<div class="demo demo-drag-and-drop">
  <div class="board">
    <div class="col" data-col="todo">
      <p class="col-title">To do</p>
      <div class="list">
        <div class="card" draggable="true"><span class="grip" aria-hidden="true"><svg width="9" height="13" viewBox="0 0 10 16" fill="currentColor"><circle cx="3" cy="3" r="1.2"></circle><circle cx="7.5" cy="3" r="1.2"></circle><circle cx="3" cy="8" r="1.2"></circle><circle cx="7.5" cy="8" r="1.2"></circle><circle cx="3" cy="13" r="1.2"></circle><circle cx="7.5" cy="13" r="1.2"></circle></svg></span>Write the intro</div>
        <div class="slot staged" aria-hidden="true"></div>
        <div class="card" draggable="true"><span class="grip" aria-hidden="true"><svg width="9" height="13" viewBox="0 0 10 16" fill="currentColor"><circle cx="3" cy="3" r="1.2"></circle><circle cx="7.5" cy="3" r="1.2"></circle><circle cx="3" cy="8" r="1.2"></circle><circle cx="7.5" cy="8" r="1.2"></circle><circle cx="3" cy="13" r="1.2"></circle><circle cx="7.5" cy="13" r="1.2"></circle></svg></span>Ship the draft</div>
      </div>
    </div>
    <div class="col hl" data-col="review">
      <p class="col-title">In review</p>
      <div class="list">
        <div class="card" draggable="true"><span class="grip" aria-hidden="true"><svg width="9" height="13" viewBox="0 0 10 16" fill="currentColor"><circle cx="3" cy="3" r="1.2"></circle><circle cx="7.5" cy="3" r="1.2"></circle><circle cx="3" cy="8" r="1.2"></circle><circle cx="7.5" cy="8" r="1.2"></circle><circle cx="3" cy="13" r="1.2"></circle><circle cx="7.5" cy="13" r="1.2"></circle></svg></span>Fix the header</div>
        <div class="ins staged" aria-hidden="true"><span class="dot"></span></div>
        <div class="card dim" draggable="true"><span class="grip" aria-hidden="true"><svg width="9" height="13" viewBox="0 0 10 16" fill="currentColor"><circle cx="3" cy="3" r="1.2"></circle><circle cx="7.5" cy="3" r="1.2"></circle><circle cx="3" cy="8" r="1.2"></circle><circle cx="7.5" cy="8" r="1.2"></circle><circle cx="3" cy="13" r="1.2"></circle><circle cx="7.5" cy="13" r="1.2"></circle></svg></span>Update pricing</div>
      </div>
    </div>
    <div class="ghost" aria-hidden="true">
      <div class="card ghost-card"><span class="grip"><svg width="9" height="13" viewBox="0 0 10 16" fill="currentColor"><circle cx="3" cy="3" r="1.2"></circle><circle cx="7.5" cy="3" r="1.2"></circle><circle cx="3" cy="8" r="1.2"></circle><circle cx="7.5" cy="8" r="1.2"></circle><circle cx="3" cy="13" r="1.2"></circle><circle cx="7.5" cy="13" r="1.2"></circle></svg></span>Review the design</div>
      <svg class="ghost-cursor" width="15" height="15" viewBox="0 0 16 16"><path d="M3 1.5 12.5 9l-4.2.6 2.3 4.2-1.9 1-2.2-4.3L3.5 13Z" fill="white" stroke="black" stroke-width="1.1" stroke-linejoin="round"></path></svg>
    </div>
  </div>
</div>
<style>
.demo-drag-and-drop {
  font-family: var(--font-sans);
  max-width: 100%;
}
.demo-drag-and-drop .board {
  position: relative;
  display: flex;
  gap: 12px;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  background: #f7f8fa;
  padding: 12px;
}
.demo-drag-and-drop .col {
  width: 144px;
  border: 2px dashed transparent;
  border-radius: 10px;
  padding: 2px 6px 8px;
  transition: border-color 150ms ease-out, background-color 150ms ease-out;
}
.demo-drag-and-drop .col.hl {
  border-color: rgba(10, 108, 255, 0.5);
  background: rgba(10, 108, 255, 0.05);
}
.demo-drag-and-drop .col-title {
  margin: 0;
  padding: 6px 2px;
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #64748b;
}
.demo-drag-and-drop .col.hl .col-title {
  color: rgba(10, 108, 255, 0.9);
}
.demo-drag-and-drop .list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.demo-drag-and-drop .card {
  display: flex;
  align-items: center;
  gap: 6px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  background: #ffffff;
  padding: 7px 8px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(15, 23, 42, 0.85);
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
  cursor: grab;
}
.demo-drag-and-drop .card:active {
  cursor: grabbing;
}
.demo-drag-and-drop .card.dragging {
  opacity: 0.35;
}
.demo-drag-and-drop .card.dim {
  opacity: 0.8;
}
.demo-drag-and-drop .grip {
  margin-left: -2px;
  padding: 1px;
  border-radius: 3px;
  color: #94a3b8;
  display: inline-flex;
}
.demo-drag-and-drop .slot {
  height: 28px;
  box-sizing: border-box;
  border: 1px dashed #cbd5e1;
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.4);
}
.demo-drag-and-drop .ins {
  position: relative;
  height: 2px;
  margin: 0 2px;
  border-radius: 999px;
  background: #0a6cff;
}
.demo-drag-and-drop .ins .dot {
  position: absolute;
  left: -3px;
  top: 50%;
  width: 7px;
  height: 7px;
  box-sizing: border-box;
  transform: translateY(-50%);
  border-radius: 999px;
  border: 2px solid #0a6cff;
  background: #ffffff;
}
.demo-drag-and-drop .ghost {
  position: absolute;
  left: 74px;
  top: 88px;
  z-index: 2;
  width: 144px;
  transform: rotate(3deg);
  pointer-events: none;
}
.demo-drag-and-drop .ghost-card {
  opacity: 0.85;
  box-shadow: 0 10px 25px rgba(15, 23, 42, 0.18), 0 0 0 1px rgba(15, 23, 42, 0.05);
}
.demo-drag-and-drop .ghost-cursor {
  position: absolute;
  right: -4px;
  top: -4px;
  filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.2));
}
@media (prefers-reduced-motion: reduce) {
  .demo-drag-and-drop .col {
    transition: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  const board = ROOT.querySelector('.board');
  const lists = ROOT.querySelectorAll('.list');
  let dragged = null;

  const marker = document.createElement('div');
  marker.className = 'ins';
  marker.innerHTML = '<span class="dot"></span>';

  function clearStaged() {
    ROOT.querySelectorAll('.staged').forEach(function (el) {
      el.remove();
    });
    const ghost = ROOT.querySelector('.ghost');
    if (ghost) ghost.remove();
    unhighlight();
  }

  function unhighlight() {
    ROOT.querySelectorAll('.col.hl').forEach(function (c) {
      c.classList.remove('hl');
    });
  }

  function afterCard(list, y) {
    const cards = list.querySelectorAll('.card:not(.dragging)');
    for (let i = 0; i < cards.length; i++) {
      const r = cards[i].getBoundingClientRect();
      if (y < r.top + r.height / 2) return cards[i];
    }
    return null;
  }

  ROOT.querySelectorAll('.card[draggable]').forEach(function (card) {
    card.addEventListener('dragstart', function (e) {
      clearStaged();
      dragged = card;
      e.dataTransfer.effectAllowed = 'move';
      try {
        e.dataTransfer.setData('text/plain', card.textContent.trim());
      } catch (err) {
        /* setData can fail in some embedded contexts; drag still works */
      }
      window.requestAnimationFrame(function () {
        card.classList.add('dragging');
      });
    });
    card.addEventListener('dragend', function () {
      card.classList.remove('dragging');
      dragged = null;
      if (marker.parentNode) marker.remove();
      unhighlight();
    });
  });

  lists.forEach(function (list) {
    list.addEventListener('dragover', function (e) {
      if (!dragged) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const col = list.closest('.col');
      unhighlight();
      col.classList.add('hl');
      const after = afterCard(list, e.clientY);
      if (after === null) list.appendChild(marker);
      else list.insertBefore(marker, after);
    });
    list.addEventListener('drop', function (e) {
      if (!dragged) return;
      e.preventDefault();
      if (marker.parentNode === list) list.insertBefore(dragged, marker);
      else list.appendChild(dragged);
      marker.remove();
    });
  });

  board.addEventListener('dragleave', function (e) {
    if (!board.contains(e.relatedTarget)) {
      if (marker.parentNode) marker.remove();
      unhighlight();
    }
  });
})();
</script>
