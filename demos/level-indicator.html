<div class="demo demo-level-indicator">
  <div class="grid">
    <span class="lab">Rating</span>
    <div class="stars">
      <button type="button" class="star is-on" aria-label="1 stars"><svg aria-hidden="true" width="14" height="14" viewBox="0 0 16 16"><path d="M8 1.6l1.9 3.9 4.3.6-3.1 3 .7 4.3L8 11.4l-3.8 2 .7-4.3-3.1-3 4.3-.6L8 1.6Z"/></svg></button>
      <button type="button" class="star is-on" aria-label="2 stars"><svg aria-hidden="true" width="14" height="14" viewBox="0 0 16 16"><path d="M8 1.6l1.9 3.9 4.3.6-3.1 3 .7 4.3L8 11.4l-3.8 2 .7-4.3-3.1-3 4.3-.6L8 1.6Z"/></svg></button>
      <button type="button" class="star is-on" aria-label="3 stars"><svg aria-hidden="true" width="14" height="14" viewBox="0 0 16 16"><path d="M8 1.6l1.9 3.9 4.3.6-3.1 3 .7 4.3L8 11.4l-3.8 2 .7-4.3-3.1-3 4.3-.6L8 1.6Z"/></svg></button>
      <button type="button" class="star" aria-label="4 stars"><svg aria-hidden="true" width="14" height="14" viewBox="0 0 16 16"><path d="M8 1.6l1.9 3.9 4.3.6-3.1 3 .7 4.3L8 11.4l-3.8 2 .7-4.3-3.1-3 4.3-.6L8 1.6Z"/></svg></button>
      <button type="button" class="star" aria-label="5 stars"><svg aria-hidden="true" width="14" height="14" viewBox="0 0 16 16"><path d="M8 1.6l1.9 3.9 4.3.6-3.1 3 .7 4.3L8 11.4l-3.8 2 .7-4.3-3.1-3 4.3-.6L8 1.6Z"/></svg></button>
    </div>
    <span class="lab">Capacity</span>
    <div class="segs">
      <button type="button" class="seg" aria-label="Set level 1 of 10"></button>
      <button type="button" class="seg" aria-label="Set level 2 of 10"></button>
      <button type="button" class="seg" aria-label="Set level 3 of 10"></button>
      <button type="button" class="seg" aria-label="Set level 4 of 10"></button>
      <button type="button" class="seg" aria-label="Set level 5 of 10"></button>
      <button type="button" class="seg" aria-label="Set level 6 of 10"></button>
      <button type="button" class="seg" aria-label="Set level 7 of 10"></button>
      <button type="button" class="seg" aria-label="Set level 8 of 10"></button>
      <button type="button" class="seg" aria-label="Set level 9 of 10"></button>
      <button type="button" class="seg" aria-label="Set level 10 of 10"></button>
    </div>
  </div>
</div>
<style>
.demo-level-indicator {
  font-family: var(--font-sans);
}
.demo-level-indicator .grid {
  display: grid;
  grid-template-columns: auto auto;
  align-items: center;
  column-gap: 12px;
  row-gap: 14px;
}
.demo-level-indicator .lab {
  text-align: right;
  font-size: 12px;
  color: rgba(0,0,0,.6);
}
.demo-level-indicator button {
  font: inherit;
  color: inherit;
  background: none;
  border: 0;
  padding: 0;
  margin: 0;
  cursor: pointer;
}
.demo-level-indicator .stars {
  display: flex;
  gap: 2px;
  width: fit-content;
}
.demo-level-indicator .star {
  padding: 2px;
  border-radius: 3px;
}
.demo-level-indicator .star svg {
  display: block;
  fill: rgba(0,0,0,.15);
  transition: fill .1s;
}
.demo-level-indicator .star.is-on svg {
  fill: rgba(0,0,0,.7);
}
.demo-level-indicator .segs {
  display: flex;
  gap: 2px;
  width: fit-content;
  border-radius: 2px;
}
.demo-level-indicator .seg {
  width: 8px;
  height: 14px;
  border-radius: 2px;
  background: rgba(0,0,0,.12);
  transition: background .1s, transform .1s;
}
.demo-level-indicator .seg:hover {
  transform: scaleY(1.15);
}
.demo-level-indicator .seg.is-ok { background: #28c840; }
.demo-level-indicator .seg.is-warn { background: #febc2e; }
.demo-level-indicator .seg.is-crit { background: #ff3b30; }
@media (prefers-reduced-motion: reduce) {
  .demo-level-indicator .star svg,
  .demo-level-indicator .seg {
    transition: none;
  }
  .demo-level-indicator .seg:hover {
    transform: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  const stars = Array.from(ROOT.querySelectorAll('.star'));
  const segs = Array.from(ROOT.querySelectorAll('.seg'));

  let rating = 3;
  let level = 10;

  // rating style: symbols fill through the current value
  function paintStars(n) {
    stars.forEach(function (s, i) { s.classList.toggle('is-on', i < n); });
  }

  // capacity style: filled segments take their band's threshold color
  function paintSegs() {
    segs.forEach(function (seg, i) {
      seg.classList.remove('is-ok', 'is-warn', 'is-crit');
      if (i < level) {
        // warningValue 7, criticalValue 9
        seg.classList.add(i < 6 ? 'is-ok' : i < 8 ? 'is-warn' : 'is-crit');
      }
    });
  }
  paintSegs();

  stars.forEach(function (star, i) {
    star.addEventListener('mouseenter', function () { paintStars(i + 1); });
    star.addEventListener('click', function () {
      rating = (rating === i + 1) ? 0 : i + 1;
      paintStars(rating);
    });
  });
  ROOT.querySelector('.stars').addEventListener('mouseleave', function () {
    paintStars(rating);
  });

  segs.forEach(function (seg, i) {
    seg.addEventListener('click', function () {
      level = (level === i + 1) ? 0 : i + 1;
      paintSegs();
    });
  });
})();
</script>
