<style>
.demo-menu-bar-extra {
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);

.demo-menu-bar-extra .menubar > svg { flex: none; }
.demo-menu-bar-extra .app-name { font-weight: 600; }

  display: flex;

}
.demo-menu-bar-extra .status-wrap { position: relative; display: flex; }
.demo-menu-bar-extra .status-btn {
  display: flex;
  align-items: center;
  height: 22px;
  padding: 0 6px;
  border: 0;
  border-radius: 4px;
  background: transparent;
  color: inherit;
  cursor: pointer;
  transition: background-color 150ms ease;
}
.demo-menu-bar-extra .status-btn:hover { background: rgba(0, 0, 0, .06); }
.demo-menu-bar-extra .status-btn.open,
.demo-menu-bar-extra .status-btn.open:hover { background: rgba(0, 0, 0, .1); }
.demo-menu-bar-extra .status-btn:focus-visible {
  outline: none;
  box-shadow: 0 0 0 2px rgba(10, 108, 255, .6);
}
.demo-menu-bar-extra .icon-static {
  display: flex;
  align-items: center;
  height: 22px;
  padding: 0 4px;
  border-radius: 4px;
}
.demo-menu-bar-extra .clock {
  padding: 0 2px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.demo-menu-bar-extra .menu {
  position: absolute;
  right: 0;
  top: calc(100% + 5px);
  z-index: 10;
  display: block;
  width: 168px;
  padding: 4px;
  border: 1px solid rgba(0, 0, 0, .1);
  border-radius: 8px;
  background: rgba(255, 255, 255, .85);
  -webkit-backdrop-filter: blur(24px);
  backdrop-filter: blur(24px);
  box-shadow: 0 12px 28px rgba(0, 0, 0, .16);
  transform: scale(.96) translateY(-2px);
  transform-origin: top right;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 150ms ease, transform 150ms ease, visibility 0s 150ms;
}
.demo-menu-bar-extra .menu.open {
  transform: none;
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  transition: opacity 150ms ease, transform 150ms ease;
}
.demo-menu-bar-extra .mi {
  display: block;
  width: 100%;
  padding: 3px 8px;
  border: 0;
  border-radius: 5px;
  background: transparent;
  color: rgba(0, 0, 0, .85);
  font-family: inherit;
  font-size: 12px;
  font-weight: 400;
  text-align: left;
  cursor: pointer;
  transition: background-color 100ms ease, color 100ms ease;
}
.demo-menu-bar-extra .mi:hover { background: #0a6cff; color: #ffffff; }
.demo-menu-bar-extra .mi:focus-visible {
  outline: none;
  background: #0a6cff;
  color: #ffffff;
}

@media (prefers-reduced-motion: reduce) {
  .demo-menu-bar-extra .menu,
  .demo-menu-bar-extra .menu.open,
  .demo-menu-bar-extra .status-btn,
  .demo-menu-bar-extra .mi {
    transition: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;
  const btn = ROOT.querySelector('.status-btn');
  const menu = ROOT.querySelector('.menu');
  if (!btn || !menu) return;

  function isOpen() { return menu.classList.contains('open'); }
  function setOpen(open) {
    menu.classList.toggle('open', open);
    btn.classList.toggle('open', open);
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  btn.addEventListener('click', function (e) {
    e.stopPropagation();
    setOpen(!isOpen());
  });
  menu.addEventListener('click', function (e) {
    if (e.target.closest('.mi')) setOpen(false);
  });
  ROOT.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && isOpen()) {
      setOpen(false);
      btn.focus();
    }
  });
  document.addEventListener('pointerdown', function (e) {
    if (!isOpen()) return;
    if (ROOT.contains(e.target)) return;
    if (window.getComputedStyle(ROOT).pointerEvents === 'none') return;
    setOpen(false);
  });
})();
</script>
