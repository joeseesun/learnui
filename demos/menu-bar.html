<style>
.demo-menu-bar {
  position: relative;
  width: 100%;
  height: 200px;
  font-family: var(--font-sans);
  color: rgba(0,0,0,.8);
}
.demo-menu-bar .desktop {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #a7c4e2, #c6cbe8 50%, #e2c8d8);
}
.demo-menu-bar .menubar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 28px; display: flex; align-items: center; gap: 14px;
  padding: 0 12px; font-size: 12px; font-weight: 500;
  color: rgba(0,0,0,.8);
  background: rgba(255,255,255,.6);
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,.05);
}
.demo-menu-bar .app { font-weight: 600; }
.demo-menu-bar .extras { margin-left: auto; display: flex; align-items: center; gap: 4px; }
.demo-menu-bar .status { position: relative; display: flex; height: 22px; align-items: center; padding: 0 2px; }
.demo-menu-bar .status-btn {
  display: flex; height: 22px; align-items: center;
  border-radius: 4px; padding: 0 6px;
  border: none; background: transparent; color: inherit;
  cursor: pointer; font: inherit;
  transition: background-color .15s;
}
.demo-menu-bar .status-btn.open { background: rgba(0,0,0,.1); }
.demo-menu-bar .clock { padding: 0 4px; white-space: nowrap; font-variant-numeric: tabular-nums; }
.demo-menu-bar .menu {
  position: absolute; right: 0; top: calc(100% + 5px); z-index: 10;
  width: 192px; transform: scale(.95); transform-origin: top right;
  border-radius: 8px; border: 1px solid rgba(0,0,0,.1);
  background: rgba(255,255,255,.85);
  -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
  padding: 4px;
  box-shadow: 0 20px 25px -5px rgba(0,0,0,.1), 0 8px 10px -6px rgba(0,0,0,.1);
  opacity: 0; pointer-events: none;
  transition: opacity .15s, transform .15s;
}
.demo-menu-bar .menu.open { opacity: 1; transform: scale(1); pointer-events: auto; }
.demo-menu-bar .menu button {
  display: flex; width: 100%; align-items: center; justify-content: space-between;
  border: none; background: none; font: inherit;
  font-size: 12px; color: rgba(0,0,0,.85);
  text-align: left; padding: 3px 8px; border-radius: 5px; cursor: pointer;
  transition: background-color .1s, color .1s;
}
.demo-menu-bar .menu button.hl { background: #0a6cff; color: #fff; }
.demo-menu-bar .kbd { font-size: 11px; letter-spacing: .05em; color: rgba(0,0,0,.4); }
.demo-menu-bar .menu button.hl .kbd { color: rgba(255,255,255,.65); }
.demo-menu-bar .sep { margin: 4px 8px; height: 1px; background: rgba(0,0,0,.1); }
@media (prefers-reduced-motion: reduce) {
  .demo-menu-bar .status-btn,
  .demo-menu-bar .menu,
  .demo-menu-bar .menu button { transition: none; }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  const btn = ROOT.querySelector('.status-btn');
  const menu = ROOT.querySelector('.menu');
  const items = menu.querySelectorAll('button');

  btn.addEventListener('click', function (e) {
    e.stopPropagation();
    const willOpen = !menu.classList.contains('open');
    menu.classList.toggle('open', willOpen);
    btn.classList.toggle('open', willOpen);
    btn.setAttribute('aria-expanded', String(willOpen));
  });

  items.forEach(function (item) {
    item.addEventListener('mouseenter', function () {
      items.forEach(function (i) { i.classList.toggle('hl', i === item); });
    });
    item.addEventListener('click', function (e) {
      e.stopPropagation();
      items.forEach(function (i) { i.classList.toggle('hl', i === item); });
    });
  });

  ROOT.addEventListener('click', function () {
    menu.classList.remove('open');
    btn.classList.remove('open');
    btn.setAttribute('aria-expanded', 'false');
  });

  ROOT.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      menu.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    }
  });
})();
</script>
