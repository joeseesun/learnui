<div class="demo demo-pointer">
  <div class="grid" role="group" aria-label="macOS pointer shapes">
    <button type="button" class="cell c-arrow" data-name="Arrow" data-api="NSCursor.arrow" aria-label="Arrow pointer">
      <svg viewBox="0 0 24 24" width="24" height="30" aria-hidden="true"><path d="M6 3.5v14.9l3.9-3.6 2.2 5.2 2.6-1.1-2.1-5.1h5L6 3.5Z" fill="#111" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/></svg>
    </button>
    <button type="button" class="cell c-ibeam" data-name="I-Beam" data-api="NSCursor.iBeam" aria-label="I-beam pointer">
      <svg viewBox="0 0 24 24" width="20" height="30" aria-hidden="true"><path d="M7.5 3h9v2.4h-3.3v13.2h3.3V21h-9v-2.4h3.3V5.4H7.5V3Z" fill="#111" stroke="#fff" stroke-width="1.1" stroke-linejoin="round"/></svg>
    </button>
    <button type="button" class="cell c-hand" data-name="Pointing Hand" data-api="NSCursor.pointingHand" aria-label="Pointing hand pointer">
      <svg viewBox="0 0 24 24" width="26" height="30" aria-hidden="true"><path d="M5.6 15.2c-.5-.9-.2-2 .7-2.5.8-.5 1.9-.2 2.4.6l1 1.6V4.6a1.6 1.6 0 0 1 3.2 0V9h.5V3.9a1.6 1.6 0 0 1 3.2 0V9h.5V5.2a1.6 1.6 0 0 1 3.2 0v8.3c0 4.3-2.6 6.9-6.4 6.9-1.7 0-3-.5-4.1-1.4l-3.2-3.8Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>
    </button>
    <button type="button" class="cell c-cross" data-name="Crosshair" data-api="NSCursor.crosshair" aria-label="Crosshair pointer">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M10.7 4h2.6v6.7H20v2.6h-6.7V20h-2.6v-6.7H4v-2.6h6.7V4Z" fill="#111" stroke="#fff" stroke-width="1.1" stroke-linejoin="round"/></svg>
    </button>
    <button type="button" class="cell c-open" data-name="Open Hand" data-api="NSCursor.openHand" aria-label="Open hand pointer">
      <svg viewBox="0 0 24 24" width="26" height="28" aria-hidden="true"><path d="M6.9 12.3V6.8a1.3 1.3 0 0 1 2.6 0v4.2h.4V5.4a1.3 1.3 0 0 1 2.6 0v5.6h.4V6.2a1.3 1.3 0 0 1 2.6 0v5h.4V7.6a1.3 1.3 0 0 1 2.6 0v6.2c0 4-2 6.7-5.6 6.7-2.8 0-4.3-1.2-5.6-3.7l-1.8-3.4c-.4-.8 0-1.8.8-2.1.7-.4 1.6-.1 2 .6Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>
    </button>
    <button type="button" class="cell c-no" data-name="Operation Not Allowed" data-api="NSCursor.operationNotAllowed" aria-label="Operation not allowed pointer">
      <svg viewBox="0 0 24 24" width="24" height="30" aria-hidden="true">
        <path d="M4.5 2.5v13l3.4-3 1.9 4.5 2.3-1-1.8-4.4h4.4L4.5 2.5Z" fill="#111" stroke="#fff" stroke-width="1.3" stroke-linejoin="round"/>
        <circle cx="16.8" cy="16.8" r="5" fill="#fff" stroke="#111" stroke-width="1.3"/>
        <path d="M13.6 20 20 13.6" stroke="#111" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <p class="readout" aria-live="polite"><span class="r-name">Hover a shape</span><span class="r-sep"> · </span><span class="r-api">your pointer becomes it</span></p>
</div>
<style>
.demo-pointer {
  font-family: var(--font-sans);
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 100%;
}
.demo-pointer .grid {
  display: grid;
  grid-template-columns: repeat(3, 64px);
  gap: 8px;
}
.demo-pointer .cell {
  appearance: none;
  margin: 0;
  padding: 0;
  border: 0;
  font: inherit;
  width: 64px;
  height: 56px;
  display: grid;
  place-items: center;
  border-radius: 8px;
  background: #f1f5f9;
  transition: background-color 120ms ease-out;
}
.demo-pointer .cell:hover {
  background: #e2e8f0;
}
.demo-pointer .cell:focus-visible {
  outline: 2px solid #0a6cff;
  outline-offset: 2px;
}
.demo-pointer .cell svg {
  display: block;
  pointer-events: none;
}
.demo-pointer .c-arrow { cursor: default; }
.demo-pointer .c-ibeam { cursor: text; }
.demo-pointer .c-hand { cursor: pointer; }
.demo-pointer .c-cross { cursor: crosshair; }
.demo-pointer .c-open { cursor: grab; }
.demo-pointer .c-no { cursor: not-allowed; }
.demo-pointer .readout {
  margin: 10px 0 0;
  min-height: 15px;
  font-size: 11px;
  line-height: 15px;
  color: #64748b;
  text-align: center;
}
.demo-pointer.active .readout .r-name {
  color: #334155;
  font-weight: 600;
}
.demo-pointer .r-api {
  font-family: var(--font-mono);
  font-size: 10px;
  color: #94a3b8;
}
@media (prefers-reduced-motion: reduce) {
  .demo-pointer .cell {
    transition: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  const nameEl = ROOT.querySelector('.r-name');
  const apiEl = ROOT.querySelector('.r-api');
  const DEF_NAME = 'Hover a shape';
  const DEF_API = 'your pointer becomes it';
  function reset() {
    nameEl.textContent = DEF_NAME;
    apiEl.textContent = DEF_API;
    ROOT.classList.remove('active');
  }
  ROOT.querySelectorAll('.cell').forEach(function (cell) {
    function show() {
      nameEl.textContent = cell.dataset.name;
      apiEl.textContent = cell.dataset.api;
      ROOT.classList.add('active');
    }
    cell.addEventListener('mouseenter', show);
    cell.addEventListener('focus', show);
    cell.addEventListener('mouseleave', reset);
    cell.addEventListener('blur', reset);
  });
})();
</script>
