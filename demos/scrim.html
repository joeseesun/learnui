<div class="demo demo-scrim">
  <div class="board">
    <div class="grid">
      <div class="mini">
        <div class="mini-cap">Analytics</div>
        <div class="mini-bar"></div>
      </div>
      <div class="mini">
        <div class="mini-cap">Customers</div>
        <div class="mini-bar"></div>
      </div>
      <div class="mini">
        <div class="mini-cap">Revenue</div>
        <div class="mini-bar"></div>
      </div>
      <div class="mini">
        <div class="mini-cap">Activity</div>
        <div class="mini-bar"></div>
      </div>
    </div>
    <button type="button" class="scrim" aria-label="Dismiss scrim"></button>
    <div class="modal" role="dialog" aria-label="Modal surface">
      <div class="modal-head"><strong>Modal surface</strong></div>
      <p class="modal-body">The translucent layer behind this card is the scrim.</p>
    </div>
    <span class="tag">::backdrop</span>
  </div>
</div>
<style>
.demo-scrim {
  font-family: var(--font-sans);
}
.demo-scrim .board {
  position: relative;
  width: 320px;
  max-width: 100%;
  height: 178px;
  border-radius: 12px;
  overflow: hidden;
  background: #f1f5f9;
  padding: 24px;
}
.demo-scrim .grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.demo-scrim .mini {
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  background: #ffffff;
  padding: 12px;
}
.demo-scrim .mini-cap {
  font-size: 10px;
  color: #94a3b8;
}
.demo-scrim .mini-bar {
  margin-top: 8px;
  height: 12px;
  width: 64px;
  border-radius: 4px;
  background: #e2e8f0;
}
.demo-scrim .scrim {
  position: absolute;
  inset: 0;
  z-index: 10;
  border: 0;
  padding: 0;
  cursor: pointer;
  background: rgba(2, 6, 23, 0.55);
  -webkit-backdrop-filter: blur(1.5px);
  backdrop-filter: blur(1.5px);
  opacity: 1;
  transition: opacity 300ms;
}
.demo-scrim .modal {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 20;
  width: 208px;
  border-radius: 12px;
  background: #ffffff;
  padding: 16px;
  box-shadow: 0 25px 50px -12px rgba(2, 6, 23, 0.35);
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
  transition: opacity 300ms, transform 300ms;
}
.demo-scrim .modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.demo-scrim .modal-head strong {
  font-size: 14px;
  color: #0f172a;
}
.demo-scrim .modal-body {
  margin: 8px 0 0;
  font-size: 11px;
  line-height: 16px;
  color: #64748b;
}
.demo-scrim .tag {
  pointer-events: none;
  position: absolute;
  bottom: 16px;
  left: 16px;
  z-index: 20;
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.15);
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: #ffffff;
  opacity: 1;
  transition: opacity 300ms;
}
.demo-scrim .board.dismissed .scrim {
  opacity: 0;
  pointer-events: none;
}
.demo-scrim .board.dismissed .modal {
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.95);
  pointer-events: none;
}
.demo-scrim .board.dismissed .tag {
  opacity: 0;
}
@media (prefers-reduced-motion: reduce) {
  .demo-scrim .scrim,
  .demo-scrim .modal,
  .demo-scrim .tag {
    transition: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const board = ROOT.querySelector('.board');
  const scrim = ROOT.querySelector('.scrim');

  scrim.addEventListener('click', function () {
    board.classList.add('dismissed');
  });

  board.addEventListener('click', function (event) {
    if (event.target.closest('.scrim')) return;
    if (board.classList.contains('dismissed') && !event.target.closest('.modal')) {
      board.classList.remove('dismissed');
    }
  });
})();
</script>
