<style>
.demo-sticky-fixed {
  --d-blue: #2563eb;
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  max-width: 100%;
}
.demo-sticky-fixed .pane {
  position: relative;
  width: 240px;
  max-width: 100%;
  height: 128px;
  overflow-y: auto;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  background: #ffffff;
  scrollbar-width: thin;
  scrollbar-color: rgba(15, 23, 42, .18) transparent;
}
.demo-sticky-fixed .pane:focus-visible {
  outline: 2px solid var(--d-blue);
  outline-offset: 2px;
}
.demo-sticky-fixed .pane::-webkit-scrollbar { width: 8px; }
.demo-sticky-fixed .pane::-webkit-scrollbar-track { background: transparent; }
.demo-sticky-fixed .pane::-webkit-scrollbar-thumb {
  background: rgba(15, 23, 42, .14);
  border-radius: 4px;
  border: 2px solid transparent;
  background-clip: content-box;
}
.demo-sticky-fixed .pane-hero {
  height: 64px;
  padding: 12px;
  color: #ffffff;
  background: linear-gradient(to right, #1c3a63, #274a7d);
}
.demo-sticky-fixed .hero-eyebrow {
  margin: 0;
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, .7);
}
.demo-sticky-fixed .hero-title {
  margin: 4px 0 0;
  font-size: 14px;
  font-weight: 600;
}
.demo-sticky-fixed .sticky-bar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
  height: 36px;
  padding: 0 12px;
  border-bottom: 1px solid #e2e8f0;
  background: rgba(255, 255, 255, .9);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  box-shadow: 0 1px 2px rgba(15, 23, 42, .05);
  font-size: 11px;
  font-weight: 600;
  color: #334155;
}
.demo-sticky-fixed .sticky-bar svg { color: var(--d-blue); flex: none; }
.demo-sticky-fixed .notes {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 12px;
}
.demo-sticky-fixed .note {
  padding: 12px;
  border: 1px solid #f1f5f9;
  border-radius: 8px;
}
.demo-sticky-fixed .line {
  height: 6px;
  border-radius: 999px;
  background: #f1f5f9;

<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;
  const pane = ROOT.querySelector('.pane');
  if (!pane) return;

  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce) return;

  // Gentle auto-scroll so the sticky bar demonstrates itself; pauses when the
  // user scrolls, resumes from the current position a few seconds later.
  let dir = 1;
  let holdUntil = 0;
  let last = performance.now();
  let programmatic = false;

  function hold(ms) { holdUntil = performance.now() + ms; }
  pane.addEventListener('scroll', function () {
    if (!programmatic) hold(4000);
  }, { passive: true });
  pane.addEventListener('wheel', function () { hold(4000); }, { passive: true });
  pane.addEventListener('touchstart', function () { hold(4000); }, { passive: true });
  pane.addEventListener('pointerdown', function () { hold(4000); }, { passive: true });

  function tick(now) {
    const dt = Math.min(50, now - last);
    last = now;
    if (now >= holdUntil) {
      const max = pane.scrollHeight - pane.clientHeight;
      if (max > 0) {
        let y = pane.scrollTop + dir * 0.035 * dt;
        if (y >= max) { y = max; dir = -1; hold(700); }
        else if (y <= 0) { y = 0; dir = 1; hold(700); }
        programmatic = true;
        pane.scrollTop = y;
        programmatic = false;
      }
    }
    window.requestAnimationFrame(tick);
  }
  window.requestAnimationFrame(tick);
})();
</script>
