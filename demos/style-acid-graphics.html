<div class="demo demo-style-acid-graphics">
  <svg class="acid-filter" width="0" height="0" aria-hidden="true">
    <defs>
      <filter id="acid-displace" x="0" y="0" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" result="noise" seed="7"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <linearGradient id="acid-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#39ff14"/>
        <stop offset="45%" stop-color="#00f0ff"/>
        <stop offset="100%" stop-color="#ff00a0"/>
      </linearGradient>
      <linearGradient id="chrome-grad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="40%" stop-color="#a0a0a0"/>
        <stop offset="50%" stop-color="#4a4a4a"/>
        <stop offset="60%" stop-color="#b0b0b0"/>
        <stop offset="100%" stop-color="#e0e0e0"/>
      </linearGradient>
    </defs>
  </svg>
  <div class="player">
    <div class="art">
      <div class="grid-floor"></div>
      <div class="acid-title">ACID</div>
      <div class="chrome-ring"></div>
    </div>
    <div class="meta">
      <div class="title">Midnight Drive</div>
      <div class="artist">Neon Coast</div>
    </div>
    <div class="progress">
      <div class="track"><div class="bar" style="width:31%"></div></div>
      <div class="times"><span>1:12</span><span>3:48</span></div>
    </div>
    <div class="controls">
      <button class="cbtn prev" type="button" aria-label="Previous">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="4.5" y="5" width="2.6" height="14" rx="1.3"/><path d="M20 5.6v12.8c0 .95-1.05 1.52-1.85 1L9.6 13.1a1.25 1.25 0 0 1 0-2.15l8.55-6.35c.8-.6 1.85-.03 1.85 1z"/></svg>
      </button>
      <button class="cbtn play" type="button" aria-label="Play">
        <svg class="i-play" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8.2 5.6v12.8c0 .95 1.05 1.52 1.85 1l9.7-6.4a1.25 1.25 0 0 0 0-2.1l-9.7-6.3c-.8-.52-1.85.05-1.85 1z"/></svg>
        <svg class="i-pause" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6.6" y="5" width="3.4" height="14" rx="1.7"/><rect x="14" y="5" width="3.4" height="14" rx="1.7"/></svg>
      </button>
      <button class="cbtn next" type="button" aria-label="Next">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="16.9" y="5" width="2.6" height="14" rx="1.3"/><path d="M4 5.6v12.8c0 .95 1.05 1.52 1.85 1l8.55-6.3a1.25 1.25 0 0 0 0-2.15L5.85 4.6c-.8-.6-1.85.03-1.85 1z"/></svg>
      </button>
    </div>
    <div class="volume">
      <span class="vicon">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 9.2v5.6c0 .66.54 1.2 1.2 1.2h2.6l3.9 3.3c.62.52 1.55.06 1.55-.75V5.45c0-.8-.93-1.27-1.55-.75L7.8 8H5.2c-.66 0-1.2.54-1.2 1.2z"/><path d="M15.6 9.3a4.1 4.1 0 0 1 0 5.4M18 7a7.4 7.4 0 0 1 0 10" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </span>
      <div class="vtrack"><div class="vfill" style="width:70%"></div></div>
    </div>
  </div>
</div>
<style>
/* ===== Acid Graphics —— dark psychedelic chrome, liquid distortion, toxic neon ===== */
.demo-style-acid-graphics {
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  max-width: 100%;
}
.demo-style-acid-graphics .acid-filter {
  position: absolute;
  width: 0;
  height: 0;
}
.demo-style-acid-graphics .player {
  position: relative;
  width: 286px;
  max-width: 100%;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 18px;
  background: #050505;
  box-shadow:
    0 0 0 1px rgba(57, 255, 20, .22),
    0 0 0 2px rgba(255, 0, 160, .12),
    0 18px 40px rgba(0, 0, 0, .75),
    0 0 30px rgba(57, 255, 20, .12);
}
/* ---- 封面：黑底 + 霓虹扭曲网格 + 铬金属标题 ---- */
.demo-style-acid-graphics .art {
  position: relative;
  height: 124px;
  overflow: hidden;
  background:
    radial-gradient(120% 80% at 20% 10%, rgba(255, 0, 160, .28), transparent 55%),
    radial-gradient(120% 90% at 85% 90%, rgba(57, 255, 20, .22), transparent 55%),
    #050505;
}
.demo-style-acid-graphics .grid-floor {
  position: absolute;
  left: -30%;
  right: -30%;
  bottom: -40%;
  height: 110%;
  background:
    linear-gradient(90deg, rgba(57, 255, 20, .32) 1px, transparent 1px),
    linear-gradient(rgba(0, 240, 255, .24) 1px, transparent 1px);
  background-size: 22px 16px;
  transform: perspective(220px) rotateX(62deg) skewX(-10deg);
  filter: url(#acid-displace);
  animation: acid-warp 4.5s ease-in-out infinite alternate;
}
@keyframes acid-warp {
  0% { transform: perspective(220px) rotateX(62deg) skewX(-10deg) scaleY(1); }
  100% { transform: perspective(220px) rotateX(58deg) skewX(-14deg) scaleY(1.08); }
}
.demo-style-acid-graphics .acid-title {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
  font-size: 52px;
  font-weight: 900;
  letter-spacing: .04em;
  line-height: 1;
  color: transparent;
  background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 40%, #4a4a4a 50%, #b0b0b0 60%, #e0e0e0 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow:
    0 1px 0 #888,
    0 2px 0 #777,
    0 3px 0 #666,
    0 4px 0 #555,
    0 5px 0 #444,
    0 6px 0 #333,
    0 8px 16px rgba(0, 0, 0, .9);
  filter: url(#acid-displace);
}
.demo-style-acid-graphics .chrome-ring {
  position: absolute;
  right: 14px;
  top: 12px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #39ff14, #00f0ff, #ff00a0, #39ff14);
  opacity: .75;
  filter: blur(.5px) url(#acid-displace);
  box-shadow: 0 0 14px rgba(57, 255, 20, .35);
}
.demo-style-acid-graphics .chrome-ring::after {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: #050505;
}
/* ---- 文字信息 ---- */
.demo-style-acid-graphics .meta {
  position: relative;
  padding: 12px 18px 2px;
}
.demo-style-acid-graphics .title {
  font-size: 14px;
  font-weight: 800;
  letter-spacing: .02em;
  color: #f0f0f0;
  text-shadow: 0 0 8px rgba(57, 255, 20, .35);
}
.demo-style-acid-graphics .artist {
  margin-top: 2px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .04em;
  color: #888;
}
/* ---- 进度条：霓虹渐变轨道 ---- */
.demo-style-acid-graphics .progress {
  padding: 9px 18px 0;
}
.demo-style-acid-graphics .track {
  position: relative;
  height: 7px;
  border-radius: 999px;
  background: #151515;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .08);
  overflow: hidden;
}
.demo-style-acid-graphics .bar {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #39ff14 0%, #00f0ff 55%, #ff00a0 100%);
  box-shadow:
    0 0 10px rgba(57, 255, 20, .55),
    0 0 18px rgba(255, 0, 160, .35);
}
.demo-style-acid-graphics .times {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace);
  font-size: 9.5px;
  font-weight: 500;
  color: #777;
}
/* ---- 控制按钮：铬金属 + 霓虹 ---- */
.demo-style-acid-graphics .controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 12px;
}
.demo-style-acid-graphics .cbtn {
  -webkit-appearance: none;
  appearance: none;
  position: relative;
  display: grid;
  place-items: center;
  margin: 0;
  padding: 0;
  cursor: pointer;
  color: #111;
  border: none;
  border-radius: 50%;
  background: linear-gradient(180deg, #ffffff 0%, #b8b8b8 45%, #5a5a5a 50%, #909090 55%, #dcdcdc 100%);
  box-shadow:
    0 3px 0 #2a2a2a,
    0 5px 8px rgba(0, 0, 0, .55),
    inset 0 1px 1px rgba(255, 255, 255, .9),
    inset 0 -1px 1px rgba(0, 0, 0, .35);
  transition: transform .15s ease, box-shadow .15s ease, filter .2s ease;
}
.demo-style-acid-graphics .cbtn::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  background: linear-gradient(135deg, #39ff14, #00f0ff, #ff00a0);
  z-index: -1;
  opacity: 0;
  transition: opacity .2s ease;
  filter: blur(3px);
}
.demo-style-acid-graphics .cbtn:hover {
  transform: translateY(-1px) scale(1.05);
  filter: brightness(1.1);
}
.demo-style-acid-graphics .cbtn:hover::before {
  opacity: .7;
}
.demo-style-acid-graphics .cbtn:active {
  transform: translateY(2px) scale(.96);
  box-shadow:
    0 0 0 #2a2a2a,
    0 2px 4px rgba(0, 0, 0, .55),
    inset 0 1px 1px rgba(255, 255, 255, .9),
    inset 0 -1px 1px rgba(0, 0, 0, .35);
}
.demo-style-acid-graphics .cbtn:focus-visible {
  outline: 2px solid #39ff14;
  outline-offset: 2px;
}
.demo-style-acid-graphics .prev,
.demo-style-acid-graphics .next {
  width: 34px;
  height: 34px;
}
.demo-style-acid-graphics .play {
  width: 48px;
  height: 48px;
}
.demo-style-acid-graphics .play .i-pause { display: none; }
.demo-style-acid-graphics .play.playing .i-play { display: none; }
.demo-style-acid-graphics .play.playing .i-pause { display: block; }
/* ---- 音量：霓虹填充 ---- */
.demo-style-acid-graphics .volume {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-top: 12px;
  padding: 0 18px 16px;
}
.demo-style-acid-graphics .vicon {
  display: flex;
  flex: none;
  color: #777;
}
.demo-style-acid-graphics .vtrack {
  position: relative;
  flex: 1;
  height: 6px;
  border-radius: 999px;
  cursor: pointer;
  background: #151515;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .08);
  overflow: hidden;
}
.demo-style-acid-graphics .vtrack::before {
  content: "";
  position: absolute;
  inset: -8px -3px;
}
.demo-style-acid-graphics .vfill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #39ff14 0%, #00f0ff 100%);
  box-shadow: 0 0 10px rgba(57, 255, 20, .45);
}
/* ---- 动效与透明度兜底 ---- */
@media (prefers-reduced-motion: reduce) {
  .demo-style-acid-graphics .grid-floor,
  .demo-style-acid-graphics .acid-title,
  .demo-style-acid-graphics .chrome-ring {
    animation: none;
    filter: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const DURATION = 30;
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  let playing = false;
  let progress = 31;

  function currentPercent() {
    const br = bar.getBoundingClientRect();
    const tr = bar.parentElement.getBoundingClientRect();
    return tr.width ? Math.min(100, (br.width / tr.width) * 100) : progress;
  }

  function updateIcon() {
    playBtn.classList.toggle('playing', playing);
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function freezeAt(p) {
    bar.style.transition = 'none';
    bar.style.width = p + '%';
    progress = p;
  }

  function animateTo(target) {
    if (reduced.matches) {
      freezeAt(target);
      playing = false;
      updateIcon();
      return;
    }
    const remain = Math.max((target - progress) / 100 * DURATION, 0.05);
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
    void bar.offsetWidth;
    bar.style.transition = 'width ' + remain + 's linear';
    bar.style.width = target + '%';
  }

  playBtn.addEventListener('click', function () {
    if (playing) {
      freezeAt(currentPercent());
      playing = false;
    } else {
      if (progress >= 99.5) progress = 0;
      playing = true;
      animateTo(100);
    }
    updateIcon();
  });

  bar.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'width' && playing && currentPercent() >= 99.5) {
      playing = false;
      progress = 100;
      updateIcon();
    }
  });

  function restart() {
    progress = 0;
    playing = true;
    animateTo(100);
    updateIcon();
  }
  prevBtn.addEventListener('click', restart);
  nextBtn.addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = Math.min(100, Math.max(0, ((e.clientX - r.left) / r.width) * 100));
    vfill.style.width = p + '%';
  });

  // 舞台自适应
  const player = ROOT.querySelector('.player');
  function fit() {
    const host = ROOT.parentElement;
    if (!host || !player) return;
    player.style.transform = '';
    const availW = host.clientWidth, availH = host.clientHeight;
    const w = player.offsetWidth, h = player.offsetHeight;
    if (!w || !h || !availW || !availH) return;
    const s = Math.min(1, availW / w, availH / h);
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  requestAnimationFrame(fit);
  window.addEventListener('resize', fit);
})();
</script>
