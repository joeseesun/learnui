<style>
/* ===== Afrofuturism — tribal geometry, warm metal, and a cosmic sun ===== */
.demo-style-afrofuturism {
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  max-width: 100%;
}
.demo-style-afrofuturism .player {
  position: relative;
  width: 280px;
  max-width: 100%;
  margin: 0 auto;
  overflow: hidden;
  background:
    /* outer chevron tribal border */
    repeating-linear-gradient(45deg, rgba(212,175,55,.45) 0 2px, transparent 2px 8px),
    /* warm inner ground */
    linear-gradient(180deg, #0d0418 0%, #1a0b2e 100%);
  border: 3px solid #d4af37;
  clip-path: polygon(
    12px 0, calc(100% - 12px) 0, 100% 12px,
    100% calc(100% - 12px), calc(100% - 12px) 100%,
    12px 100%, 0 calc(100% - 12px), 0 12px
  );
  box-shadow:
    0 0 0 2px #0d0418,
    0 0 0 5px #f26522,
    0 16px 38px rgba(13,4,24,.55);
}
/* ---- Art: deep space + central sun ---- */
.demo-style-afrofuturism .art {
  position: relative;
  height: 118px;
  overflow: hidden;
  background:
    radial-gradient(1.4px 1.4px at 22% 28%, rgba(255,255,255,.95), transparent 68%),
    radial-gradient(1.1px 1.1px at 72% 18%, rgba(255,255,255,.75), transparent 68%),
    radial-gradient(1.6px 1.6px at 55% 66%, rgba(255,255,255,.7), transparent 68%),
    radial-gradient(1px 1px at 38% 12%, rgba(255,255,255,.55), transparent 68%),
    radial-gradient(1.3px 1.3px at 84% 54%, rgba(255,255,255,.6), transparent 68%),
    radial-gradient(1px 1px at 12% 72%, rgba(255,255,255,.5), transparent 68%),
    radial-gradient(42px 28px at 50% 60%, rgba(107,45,92,.55), transparent 70%),
    radial-gradient(64px 48px at 20% 80%, rgba(242,101,34,.28), transparent 70%),
    linear-gradient(180deg, #0d0418 0%, #1a0b2e 100%);
}
.demo-style-afrofuturism .art::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    repeating-linear-gradient(90deg, transparent 0 18px, rgba(212,175,55,.08) 18px 19px),
    repeating-linear-gradient(0deg, transparent 0 14px, rgba(212,175,55,.06) 14px 15px);
}
.demo-style-afrofuturism .sun {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 90px;
  height: 90px;
  transform: translate(-50%, -50%);
  filter: drop-shadow(0 0 14px rgba(242,101,34,.55));
  animation: afroSun 18s linear infinite;
}
@keyframes afroSun {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}
/* ---- Meta: gold type, orange secondary ---- */
.demo-style-afrofuturism .meta {
  padding: 13px 18px 2px;

}
.demo-style-afrofuturism .title {

  background: linear-gradient(180deg, #f9e076 0%, #d4af37 50%, #9c7f22 100%);

}
.demo-style-afrofuturism .artist {
  margin-top: 3px;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;

/* ---- Progress: purple/orange fill in gold tribal track ---- */
.demo-style-afrofuturism .progress {

.demo-style-afrofuturism .track {

.demo-style-afrofuturism .prev,

.demo-style-afrofuturism .play .i-pause { display: none; }
.demo-style-afrofuturism .play.playing .i-play { display: none; }
.demo-style-afrofuturism .play.playing .i-pause { display: block; }
/* ---- Volume: gold tribal slider ---- */
.demo-style-afrofuturism .volume {
  display: flex;
  align-items: center;

  margin-top: 12px;
  padding: 0 18px 16px;

.demo-style-afrofuturism .vicon {

}
.demo-style-afrofuturism .vtrack {
  position: relative;
  flex: 1;
  height: 7px;
  cursor: pointer;
  background: rgba(13,4,24,.85);
  border: 1px solid #d4af37;

}
.demo-style-afrofuturism .vtrack::before {
  content: "";

  inset: -7px -3px;
}
.demo-style-afrofuturism .vfill {
  height: 100%;
  background: linear-gradient(90deg, #f26522 0%, #d4af37 55%, #6b2d5c 100%);
  box-shadow: 0 0 8px rgba(242,101,34,.45);
}
/* ---- Reduced motion / reduced transparency ---- */
@media (prefers-reduced-motion: reduce) {
  .demo-style-afrofuturism .sun { animation: none; }
  .demo-style-afrofuturism .cbtn { transition: none; }
}
@media (prefers-reduced-transparency: reduce) {
  .demo-style-afrofuturism .art,
  .demo-style-afrofuturism .player {
    background: #0d0418;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const DURATION = 30;
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  let playing = false;
  let progress = 31;

  function currentPercent() {
    const br = bar.getBoundingClientRect();
    const tr = bar.parentElement.getBoundingClientRect();
    return tr.width ? Math.min(100, (br.width / tr.width) * 100) : progress;
  }

  function updateIcon() {
    playBtn.classList.toggle('playing', playing);
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function freezeAt(p) {
    bar.style.transition = 'none';
    bar.style.width = p + '%';
    progress = p;
  }

  function animateTo(target) {
    if (reduced.matches) {
      freezeAt(target);
      playing = false;
      updateIcon();
      return;
    }
    const remain = Math.max((target - progress) / 100 * DURATION, 0.05);
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
    void bar.offsetWidth;
    bar.style.transition = 'width ' + remain + 's linear';
    bar.style.width = target + '%';
  }

  playBtn.addEventListener('click', function () {
    if (playing) {
      freezeAt(currentPercent());
      playing = false;
    } else {
      if (progress >= 99.5) progress = 0;
      playing = true;
      animateTo(100);
    }
    updateIcon();
  });

  bar.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'width' && playing && currentPercent() >= 99.5) {
      playing = false;
      progress = 100;
      updateIcon();
    }
  });

  function restart() {
    progress = 0;
    playing = true;
    animateTo(100);
    updateIcon();
  }
  prevBtn.addEventListener('click', restart);
  nextBtn.addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = Math.min(100, Math.max(0, ((e.clientX - r.left) / r.width) * 100));
    vfill.style.width = p + '%';
  });

  // Stage adaptive fit
  const player = ROOT.querySelector('.player');
  function fit() {
    const host = ROOT.parentElement;
    if (!host || !player) return;
    player.style.transform = '';
    const availW = host.clientWidth, availH = host.clientHeight;
    const w = player.offsetWidth, h = player.offsetHeight;
    if (!w || !h || !availW || !availH) return;
    const s = Math.min(1, availW / w, availH / h);
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  requestAnimationFrame(fit);
  window.addEventListener('resize', fit);
})();
</script>
