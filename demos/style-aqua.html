<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const bar = ROOT.querySelector('.bar');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const TOTAL = 30000; // ms, 0% -> 100%
  let playing = false;

  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  function currentPct() {
    const tw = bar.parentElement.getBoundingClientRect().width;
    if (!tw) return 0;
    return (bar.getBoundingClientRect().width / tw) * 100;
  }

  function animateTo(target, fromPct) {
    if (reduced.matches) {
      bar.style.transition = 'none';
      bar.style.width = target + '%';
      return;
    }
    const dist = Math.abs(target - fromPct);
    bar.style.transition = 'width ' + (TOTAL * dist / 100 / 1000) + 's linear';
    bar.style.width = target + '%';
  }

  playBtn.addEventListener('click', function () {
    playing = !playing;
    ROOT.classList.toggle('playing', playing);
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
    if (playing) {
      const pct = currentPct();
      if (pct >= 99.5) {
        bar.style.transition = 'none';
        bar.style.width = '0%';
        void bar.offsetWidth;
        animateTo(100, 0);
      } else {
        animateTo(100, pct);
      }
    } else {
      const pct = currentPct();
      bar.style.transition = 'none';
      bar.style.width = pct + '%';
    }
  });

  function restart() {
    bar.style.transition = 'none';
    bar.style.width = '0%';
    if (playing) {
      void bar.offsetWidth;
      animateTo(100, 0);
    }
  }
  prevBtn.addEventListener('click', restart);
  nextBtn.addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    let pct = ((e.clientX - r.left) / r.width) * 100;
    pct = Math.max(0, Math.min(100, pct));
    vfill.style.width = pct + '%';
  });
})();
</script>
