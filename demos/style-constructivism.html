</div>
<style>
/* ===== Constructivism — Soviet agitprop poster as a music player ===== */
.demo-style-constructivism {
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  max-width: 100%;
}
.demo-style-constructivism .player {
  position: relative;
  width: 300px;
  max-width: 100%;
  margin: 0 auto;
  overflow: hidden;
  background: #E8E4D9;
  border: 3px solid #0A0A0A;
  box-shadow: 8px 8px 0 #D3191C;
}
/* ---- 封面：照片拼贴 + 工业图像 + 红黑斜条 ---- */
.demo-style-constructivism .art {
  position: relative;
  height: 130px;
  overflow: hidden;
  background:
    linear-gradient(135deg, transparent 38%, #D3191C 38% 48%, transparent 48%),
    linear-gradient(180deg, #E8E4D9 0%, #D9D4C6 100%);
}
.demo-style-constructivism .art::before {
  content: "";
  position: absolute;
  right: -18px;
  top: -18px;
  width: 120px;
  height: 120px;
  background: #0A0A0A;
  clip-path: polygon(30% 0, 100% 0, 100% 70%, 70% 100%, 0 100%, 0 30%);
}
.demo-style-constructivism .art::after {
  content: "";
  position: absolute;
  left: 12px;
  bottom: 10px;
  width: 76px;
  height: 76px;
  background: #B8B2A2;
  border: 3px solid #0A0A0A;
  clip-path: polygon(0 0, 100% 14%, 88% 100%, 6% 86%);
}
.demo-style-constructivism .industrial {
  position: absolute;
  left: 16px;
  bottom: 14px;
  width: 72px;
  height: 72px;
  z-index: 2;
  filter: grayscale(100%) contrast(1.3);
}
/* ---- 文字：粗黑无衬线、全大写、倾斜 ---- */
.demo-style-constructivism .meta {
  padding: 12px 16px 2px;
}
.demo-style-constructivism .title {
  display: inline-block;
  font-size: 17px;
  font-weight: 900;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #0A0A0A;
  transform: skewX(-8deg);
  transform-origin: left center;
}
.demo-style-constructivism .artist {
  display: inline-block;
  margin-top: 2px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #D3191C;
  transform: skewX(-8deg);
  transform-origin: left center;
}
/* ---- 进度条：黑轨道、红填充、硬边缘 ---- */
.demo-style-constructivism .progress {
  padding: 8px 16px 0;
}
.demo-style-constructivism .track {
  position: relative;
  height: 10px;
  background: #0A0A0A;
  border: 2px solid #0A0A0A;
  overflow: hidden;
}
.demo-style-constructivism .bar {
  height: 100%;
  background: #D3191C;
}
.demo-style-constructivism .times {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace);
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #0A0A0A;
}
/* ---- 控制按钮：红黑块、硬偏移阴影、倾斜 ---- */
.demo-style-constructivism .controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 12px;
}
.demo-style-constructivism .cbtn {
  -webkit-appearance: none;
  appearance: none;
  position: relative;
  display: grid;
  place-items: center;
  margin: 0;
  padding: 0;
  cursor: pointer;
  color: #0A0A0A;
  background: #E8E4D9;
  border: 2px solid #0A0A0A;
  border-radius: 0;
  box-shadow: 4px 4px 0 #D3191C;
  transform: skewX(-8deg);
  transition: transform .15s ease, box-shadow .15s ease;
}
.demo-style-constructivism .cbtn svg {
  transform: skewX(8deg);
}
.demo-style-constructivism .prev,
.demo-style-constructivism .next {
  width: 38px;
  height: 38px;
}
.demo-style-constructivism .play {
  width: 52px;
  height: 52px;
  background: #D3191C;
  color: #E8E4D9;
}
.demo-style-constructivism .cbtn:hover {
  transform: skewX(-8deg) translate(-1px, -1px);
  box-shadow: 5px 5px 0 #D3191C;
}
.demo-style-constructivism .cbtn:active {
  transform: skewX(-8deg) translate(4px, 4px);
  box-shadow: 0 0 0 #D3191C;
}
.demo-style-constructivism .cbtn:focus-visible {
  outline: 2px solid #D3191C;
  outline-offset: 2px;
}
.demo-style-constructivism .play .i-pause { display: none; }
.demo-style-constructivism .play.playing .i-play { display: none; }
.demo-style-constructivism .play.playing .i-pause { display: block; }
/* ---- 音量：红填充黑轨道 ---- */
.demo-style-constructivism .volume {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  padding: 0 16px 16px;
}
.demo-style-constructivism .vicon {
  display: flex;
  flex: none;
  color: #0A0A0A;
}
.demo-style-constructivism .vtrack {
  position: relative;
  flex: 1;
  height: 10px;
  cursor: pointer;
  background: #0A0A0A;
  border: 2px solid #0A0A0A;
  overflow: hidden;
}
.demo-style-constructivism .vtrack::before {
  content: "";
  position: absolute;
  inset: -6px -3px;
}
.demo-style-constructivism .vfill {
  height: 100%;
  background: #D3191C;
}
/* ---- 动效与无障碍兜底 ---- */
@media (prefers-reduced-motion: reduce) {
  .demo-style-constructivism .cbtn,
  .demo-style-constructivism .bar,
  .demo-style-constructivism .vfill {
    transition: none;
  }
  .demo-style-constructivism .cbtn:hover,
  .demo-style-constructivism .cbtn:active {
    transform: skewX(-8deg);
    box-shadow: 4px 4px 0 #D3191C;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const DURATION = 30;
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  let playing = false;
  let progress = 31;

  function currentPercent() {
    const br = bar.getBoundingClientRect();
    const tr = bar.parentElement.getBoundingClientRect();
    return tr.width ? Math.min(100, (br.width / tr.width) * 100) : progress;
  }

  function updateIcon() {
    playBtn.classList.toggle('playing', playing);
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function freezeAt(p) {
    bar.style.transition = 'none';
    bar.style.width = p + '%';
    progress = p;
  }

  function animateTo(target) {
    if (reduced.matches) {
      freezeAt(target);
      playing = false;
      updateIcon();
      return;
    }
    const remain = Math.max((target - progress) / 100 * DURATION, 0.05);
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
    void bar.offsetWidth;
    bar.style.transition = 'width ' + remain + 's linear';
    bar.style.width = target + '%';
  }

  playBtn.addEventListener('click', function () {
    if (playing) {
      freezeAt(currentPercent());
      playing = false;
    } else {
      if (progress >= 99.5) progress = 0;
      playing = true;
      animateTo(100);
    }
    updateIcon();
  });

  bar.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'width' && playing && currentPercent() >= 99.5) {
      playing = false;
      progress = 100;
      updateIcon();
    }
  });

  function restart() {
    progress = 0;
    playing = true;
    animateTo(100);
    updateIcon();
  }
  prevBtn.addEventListener('click', restart);
  nextBtn.addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = Math.min(100, Math.max(0, ((e.clientX - r.left) / r.width) * 100));
    vfill.style.width = p + '%';
  });

  const player = ROOT.querySelector('.player');
  function fit() {
    const host = ROOT.parentElement;
    if (!host || !player) return;
    player.style.transform = '';
    const availW = host.clientWidth, availH = host.clientHeight;
    const w = player.offsetWidth + 12, h = player.offsetHeight + 12;
    if (!w || !h || !availW || !availH) return;
    const s = Math.min(1, availW / w, availH / h);
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  requestAnimationFrame(fit);
  window.addEventListener('resize', fit);
})();
</script>
