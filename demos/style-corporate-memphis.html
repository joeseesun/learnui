<style>
/* ===== Corporate Memphis —— 小脑袋面条人 + 大平涂蜡笔色，零渐变零阴影 ===== */
.demo-style-corporate-memphis {
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  max-width: 100%;
}
.demo-style-corporate-memphis .player {
  width: 280px;
  max-width: 100%;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 28px;
  background: #F6F3FF;              /* 米白偏紫的卡片底 */
  border: 2px solid #E9E3FC;        /* 扁平描边，不是阴影 */
  box-shadow: none;                 /* defining：任何投影都会破坏风格 */
}
/* ---- 封面：色团圆点背景上的面条小人抱音符 ---- */
.demo-style-corporate-memphis .art {
  background: #ECE7FD;              /* 平涂淡紫，无渐变 */
  line-height: 0;
}
.demo-style-corporate-memphis .art svg {
  display: block;
  width: 100%;
  height: auto;
}
.demo-style-corporate-memphis .fig,
.demo-style-corporate-memphis .note {
  transform-box: fill-box;
}
.demo-style-corporate-memphis .fig { transform-origin: 50% 100%; }
.demo-style-corporate-memphis .note { transform-origin: 50% 50%; }
/* 播放中小人轻轻蹦、音符微微晃（欢快但克制） */
.demo-style-corporate-memphis .player.playing .fig {
  animation: cm-bob 1.4s ease-in-out infinite;
}
.demo-style-corporate-memphis .player.playing .note {
  animation: cm-wig 1.4s ease-in-out infinite;
}
@keyframes cm-bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
@keyframes cm-wig {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(5deg); }
}
/* ---- 文字：墨色标题 + 柔和次要文字 ---- */
.demo-style-corporate-memphis .meta {
  padding: 12px 18px 0;
}
.demo-style-corporate-memphis .title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: #2E2A5B;
}
.demo-style-corporate-memphis .artist {
  margin-top: 2px;
  font-size: 11px;
  font-weight: 500;
  color: #6E6899;
}
/* ---- 进度：扁平胶囊轨道，纯色填充 ---- */
.demo-style-corporate-memphis .progress {
  padding: 10px 18px 0;
}
.demo-style-corporate-memphis .track {
  height: 10px;
  border-radius: 999px;
  background: #E3DDFA;
  overflow: hidden;
}
.demo-style-corporate-memphis .bar {
  height: 100%;
  border-radius: 999px;
  background: #6C63FF;              /* 平涂品牌紫，无渐变无辉光 */
}
.demo-style-corporate-memphis .times {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace);
  font-size: 9.5px;
  font-weight: 500;
  color: #6E6899;
}
/* ---- 控制：圆形平涂按钮，黄/紫/薄荷各一枚 ---- */
.demo-style-corporate-memphis .controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 14px;
}
.demo-style-corporate-memphis .cbtn {
  -webkit-appearance: none;
  appearance: none;
  display: grid;
  place-items: center;
  margin: 0;
  padding: 0;
  cursor: pointer;
  border: none;
  border-radius: 999px;
  box-shadow: none;
  color: #2E2A5B;
  transition: transform .25s cubic-bezier(.34, 1.56, .64, 1); /* 友好的小回弹 */
}
.demo-style-corporate-memphis .prev,
.demo-style-corporate-memphis .next {
  width: 36px;
  height: 36px;
}
.demo-style-corporate-memphis .prev { background: #FDE68A; } /* 奶油黄 */
.demo-style-corporate-memphis .next { background: #6EE7B7; } /* 薄荷绿 */
.demo-style-corporate-memphis .play {
  width: 52px;
  height: 52px;
  background: #6C63FF;
  color: #FFFFFF;
}
.demo-style-corporate-memphis .cbtn:hover { transform: translateY(-3px); }
.demo-style-corporate-memphis .cbtn:active { transform: translateY(0) scale(.92); }
.demo-style-corporate-memphis .cbtn:focus-visible {
  outline: 2px solid #6C63FF;

}
.demo-style-corporate-memphis .play .i-pause { display: none; }
.demo-style-corporate-memphis .play.playing .i-play { display: none; }

/* ---- 音量：扁平粉色滑条 ---- */
.demo-style-corporate-memphis .volume {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-top: 15px;
  padding: 0 18px 16px;
}
.demo-style-corporate-memphis .vicon {

  flex: none;
  color: #6E6899;
}
.demo-style-corporate-memphis .vtrack {

  flex: 1;
  height: 10px;
  border-radius: 999px;
  background: #E3DDFA;
  overflow: hidden;
  cursor: pointer;
}
.demo-style-corporate-memphis .vtrack::before { /* 扩大点击热区 */
  content: "";
  position: absolute;
  inset: -7px -3px;
}
.demo-style-corporate-memphis .vfill {
  height: 100%;
  border-radius: 999px;
  background: #F9A8D4;
}
/* ---- 动效兜底 ---- */
@media (prefers-reduced-motion: reduce) {
  .demo-style-corporate-memphis .player.playing .fig,
  .demo-style-corporate-memphis .player.playing .note {
    animation: none;
  }
  .demo-style-corporate-memphis .cbtn {
    transition: none;
  }
  .demo-style-corporate-memphis .cbtn:hover,
  .demo-style-corporate-memphis .cbtn:active {
    transform: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const player = ROOT.querySelector('.player');
  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const DURATION = 30; // 全程秒数
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  let playing = false;
  let progress = 31; // 与初始 width:31% 对应

  function currentPercent() {
    const br = bar.getBoundingClientRect();
    const tr = bar.parentElement.getBoundingClientRect();
    return tr.width ? Math.min(100, (br.width / tr.width) * 100) : progress;
  }

  function updateIcon() {
    playBtn.classList.toggle('playing', playing);
    player.classList.toggle('playing', playing);
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function freezeAt(p) {
    bar.style.transition = 'none';
    bar.style.width = p + '%';
    progress = p;
  }

  function animateTo(target) {
    if (reduced.matches) { // 减少动态效果：瞬移
      freezeAt(target);
      playing = false;
      updateIcon();
      return;
    }
    const remain = Math.max((target - progress) / 100 * DURATION, 0.05);
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
    void bar.offsetWidth; // 强制重排，让瞬移先生效
    bar.style.transition = 'width ' + remain + 's linear';
    bar.style.width = target + '%';
  }

  playBtn.addEventListener('click', function () {
    if (playing) {
      freezeAt(currentPercent()); // 暂停：保持当前进度
      playing = false;
    } else {
      if (progress >= 99.5) progress = 0; // 播完后再次播放从头开始
      playing = true;
      animateTo(100);
    }
    updateIcon();
  });

  bar.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'width' && playing && currentPercent() >= 99.5) {
      playing = false;
      progress = 100;
      updateIcon();
    }
  });

  function restart() { // prev/next：归零重播
    progress = 0;
    playing = true;
    animateTo(100);
    updateIcon();
  }
  prevBtn.addEventListener('click', restart);
  nextBtn.addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) { // 点击设置音量
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = Math.min(100, Math.max(0, ((e.clientX - r.left) / r.width) * 100));
    vfill.style.width = p + '%';
  });

  // 舞台自适应：首页卡片舞台较矮时整体等比缩小，保证不溢出
  function fit() {
    const host = ROOT.parentElement; // .fragment 容器
    if (!host || !player) return;
    player.style.transform = '';
    const availW = host.clientWidth, availH = host.clientHeight;
    const w = player.offsetWidth, h = player.offsetHeight;
    if (!w || !h || !availW || !availH) return;
    const s = Math.min(1, availW / w, availH / h);
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  requestAnimationFrame(fit);
  window.addEventListener('resize', fit);
})();
</script>
