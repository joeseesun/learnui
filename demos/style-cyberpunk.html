<style>
/* ===== Cyberpunk —— 近黑画布 + 霓虹辉光 + HUD + 故障 ===== */
.demo-style-cyberpunk {
  max-width: 100%;
  font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace);
}
.demo-style-cyberpunk .player {
  position: relative;
  width: 280px;
  max-width: 100%;
  margin: 0 auto;
  overflow: hidden;
  border: 1px solid rgba(5, 217, 232, .85); /* 1px 霓虹描边 */
  border-radius: 2px; /* 锐角，不圆润 */
  background: linear-gradient(180deg, #0b101c 0%, #0a0e17 100%); /* 近黑画布 */
  box-shadow:
    0 0 10px rgba(5, 217, 232, .35),
    0 0 32px rgba(5, 217, 232, .14),
    inset 0 0 18px rgba(5, 217, 232, .07);
  color: #d1f7ff;
}
/* ---- HUD 边角括线 ---- */
.demo-style-cyberpunk .player::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 31;
  pointer-events: none;
  background:
    linear-gradient(#05d9e8, #05d9e8) left 5px top 5px / 11px 1px,
    linear-gradient(#05d9e8, #05d9e8) left 5px top 5px / 1px 11px,
    linear-gradient(#05d9e8, #05d9e8) right 5px top 5px / 11px 1px,
    linear-gradient(#05d9e8, #05d9e8) right 5px top 5px / 1px 11px,
    linear-gradient(#05d9e8, #05d9e8) left 5px bottom 5px / 11px 1px,
    linear-gradient(#05d9e8, #05d9e8) left 5px bottom 5px / 1px 11px,
    linear-gradient(#05d9e8, #05d9e8) right 5px bottom 5px / 11px 1px,
    linear-gradient(#05d9e8, #05d9e8) right 5px bottom 5px / 1px 11px;
  background-repeat: no-repeat;
  filter: drop-shadow(0 0 3px rgba(5, 217, 232, .8));
}
/* ---- 扫描线 + 缓慢扫过的信号带 ---- */
.demo-style-cyberpunk .player::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 30;
  pointer-events: none;
  background-image:
    linear-gradient(180deg, transparent 0%, rgba(5, 217, 232, .05) 42%, rgba(5, 217, 232, .1) 50%, rgba(5, 217, 232, .05) 58%, transparent 100%),
    repeating-linear-gradient(0deg, rgba(255, 255, 255, .03) 0 1px, transparent 1px 3px);
  background-size: 100% 56px, auto;
  background-repeat: no-repeat, repeat;
  background-position: 0 -70px, 0 0;
  animation: cp-scan 7s linear infinite;
}
@keyframes cp-scan {
  from { background-position: 0 -70px, 0 0; }
  to { background-position: 0 380px, 0 0; }
}
/* ---- 封面：雨夜霓虹都市 ---- */
.demo-style-cyberpunk .art {
  position: relative;
  height: 104px;
  overflow: hidden;
  border-bottom: 1px solid rgba(5, 217, 232, .35);
  background:
    radial-gradient(1.2px 1.2px at 14% 16%, rgba(255, 255, 255, .55), transparent 62%),
    radial-gradient(1px 1px at 38% 9%, rgba(255, 255, 255, .4), transparent 62%),
    radial-gradient(1.2px 1.2px at 71% 13%, rgba(255, 255, 255, .45), transparent 62%),
    radial-gradient(1px 1px at 88% 24%, rgba(255, 255, 255, .35), transparent 62%),
    linear-gradient(180deg, #03050c 0%, #071021 52%, #14091f 100%);
}
.demo-style-cyberpunk .art::before { /* 地平线霓虹反光 */
  content: "";
  position: absolute;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(70% 60% at 50% 100%, rgba(255, 42, 109, .16), transparent 70%),
    radial-gradient(40% 35% at 78% 92%, rgba(5, 217, 232, .12), transparent 70%);
}
.demo-style-cyberpunk .art::after { /* 雨 */
  content: "";
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  background: repeating-linear-gradient(105deg, rgba(170, 220, 255, .05) 0 1px, transparent 1px 6px);
  animation: cp-rain .9s linear infinite;
}
@keyframes cp-rain {
  to { background-position: -3.2px 24px; }
}
.demo-style-cyberpunk .sky {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 1;
  display: block;
  width: 100%;
  height: 58px;
}
.demo-style-cyberpunk .sky .blink { animation: cp-blink 1.6s steps(1) infinite; }
.demo-style-cyberpunk .sky .glow-m { filter: drop-shadow(0 0 2.5px rgba(255, 42, 109, .95)); }
.demo-style-cyberpunk .sky .glow-c { filter: drop-shadow(0 0 2.5px rgba(5, 217, 232, .95)); }
@keyframes cp-blink {
  0%, 60% { opacity: 1; }
  61%, 100% { opacity: .15; }
}
.demo-style-cyberpunk .street { /* 湿漉漉的霓虹倒影 */
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 2;
  height: 9px;
  background: repeating-linear-gradient(90deg,
    rgba(255, 42, 109, .3) 0 4px, transparent 4px 11px,
    rgba(5, 217, 232, .28) 11px 15px, transparent 15px 26px,
    rgba(249, 240, 2, .18) 26px 29px, transparent 29px 40px);
  filter: blur(.6px);
  opacity: .85;
}
.demo-style-cyberpunk .readout { /* HUD 数据读数 */
  position: absolute;
  top: 8px;
  left: 10px;
  z-index: 2;
  font-size: 7.5px;
  letter-spacing: .12em;
  color: rgba(5, 217, 232, .85);
  text-shadow: 0 0 4px rgba(5, 217, 232, .7);
}
.demo-style-cyberpunk .holo { /* 全息广告环，被楼群挡住下缘 */
  position: absolute;
  left: 45%;
  top: 38%;
  z-index: 1;
  width: 44px;
  height: 44px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 2px solid rgba(255, 42, 109, .5);
  box-shadow: 0 0 14px rgba(255, 42, 109, .45), inset 0 0 12px rgba(255, 42, 109, .3);
  animation: cp-holo 5s ease-in-out infinite;
}
.demo-style-cyberpunk .holo::after { /* 内环青色 */
  content: "";
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  border: 1px solid rgba(5, 217, 232, .55);
  box-shadow: 0 0 10px rgba(5, 217, 232, .4), inset 0 0 8px rgba(5, 217, 232, .3);
}
@keyframes cp-holo {
  0%, 100% { opacity: .85; }
  50% { opacity: .45; }
}
.demo-style-cyberpunk .sign { /* 竖排日文霓虹招牌 */
  position: absolute;
  top: 8px;
  right: 10px;
  z-index: 2;
  writing-mode: vertical-rl;
  font-size: 10px;
  letter-spacing: .18em;
  color: #ff2a6d;
  border: 1px solid rgba(255, 42, 109, .8);
  padding: 5px 2px;
  background: rgba(8, 4, 14, .72);
  text-shadow: 0 0 5px rgba(255, 42, 109, .9), 0 0 12px rgba(255, 42, 109, .6);
  box-shadow: 0 0 8px rgba(255, 42, 109, .5), inset 0 0 6px rgba(255, 42, 109, .25);
}
/* ---- 文字：终端等宽 + RGB 分离故障 ---- */
.demo-style-cyberpunk .meta {
  padding: 10px 16px 0;
}
.demo-style-cyberpunk .title {
  font-size: 12.5px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: #f9f002;
  text-shadow:
    -1.5px 0 rgba(255, 42, 109, .7),
    1.5px 0 rgba(5, 217, 232, .7),
    0 0 8px rgba(249, 240, 2, .35);
  animation: cp-tglitch 5s infinite steps(1);
}
@keyframes cp-tglitch {
  0%, 93%, 100% { transform: none; }
  94% { transform: translateX(-1.5px) skewX(-10deg); }
  96% { transform: translateX(1.5px); }
  98% { transform: none; }
}
.demo-style-cyberpunk .artist {
  margin-top: 3px;
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(127, 155, 179, .9);
}
/* ---- 进度：黄黑警示条纹槽 + 电黄发光条 ---- */
.demo-style-cyberpunk .progress {
  padding: 10px 16px 0;
}
.demo-style-cyberpunk .track {
  position: relative;
  height: 10px;
  overflow: hidden;
  border: 1px solid rgba(249, 240, 2, .55);
  border-radius: 1px;
  background: repeating-linear-gradient(45deg, rgba(249, 240, 2, .14) 0 8px, rgba(5, 7, 15, .9) 8px 16px);
  box-shadow: 0 0 8px rgba(249, 240, 2, .18), inset 0 0 6px rgba(0, 0, 0, .6);
  animation: cp-hazard 8s linear infinite;
}
.demo-style-cyberpunk .player.is-playing .track { animation-duration: 1.4s; } /* 播放时条纹加速滚动 */
@keyframes cp-hazard {
  to { background-position: 22.63px 0; } /* 45° 条纹的无缝周期 */
}
.demo-style-cyberpunk .bar {
  position: relative;
  height: 100%;
  background: linear-gradient(180deg, #fdf96b 0%, #f9f002 55%, #cbbf00 100%);
  box-shadow: 0 0 8px rgba(249, 240, 2, .85), 0 0 20px rgba(249, 240, 2, .4);
}
.demo-style-cyberpunk .bar::after { /* 进度尖端的白色热点 */
  content: "";
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: #ffffff;
  box-shadow: 0 0 6px #ffffff;
}
.demo-style-cyberpunk .times {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-size: 9px;
  letter-spacing: .1em;
  color: rgba(5, 217, 232, .6);
}
/* ---- 控制键：霓虹描边方块，播放键带故障抖动 ---- */
.demo-style-cyberpunk .controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 12px;
}
.demo-style-cyberpunk .cbtn {
  -webkit-appearance: none;
  appearance: none;
  display: grid;
  place-items: center;
  margin: 0;
  padding: 0;
  cursor: pointer;
  border-radius: 2px;
  border: 1px solid rgba(5, 217, 232, .75);
  background: rgba(5, 217, 232, .06);
  color: #05d9e8;
  transition: background .15s ease, box-shadow .15s ease;
}
.demo-style-cyberpunk .cbtn svg {
  filter: drop-shadow(0 0 3px rgba(5, 217, 232, .8));
}
.demo-style-cyberpunk .prev,
.demo-style-cyberpunk .next {
  width: 34px;
  height: 34px;
}
.demo-style-cyberpunk .play {
  width: 46px;
  height: 46px;
  border-color: rgba(249, 240, 2, .9);
  background: rgba(249, 240, 2, .07);
  color: #f9f002;
  box-shadow: 0 0 10px rgba(249, 240, 2, .35), inset 0 0 10px rgba(249, 240, 2, .12);
  animation: cp-pglitch 4s infinite steps(1); /* 间歇故障抖动 */
}
.demo-style-cyberpunk .play svg { /* 色散：品红/青错位残影 */
  filter:
    drop-shadow(-1px 0 0 rgba(255, 42, 109, .85))
    drop-shadow(1px 0 0 rgba(5, 217, 232, .85))
    drop-shadow(0 0 4px rgba(249, 240, 2, .7));
}
@keyframes cp-pglitch {
  0%, 90%, 100% { transform: none; clip-path: none; }
  91% { transform: translate(-2px, 1px) skewX(-8deg); }
  93% { transform: translate(2px, -1px); clip-path: inset(15% 0 40% 0); }
  95% { transform: translate(-1px, 0); clip-path: inset(55% 0 8% 0); }
  97% { transform: none; clip-path: none; }
}
.demo-style-cyberpunk .cbtn:hover {
  background: rgba(5, 217, 232, .16);
  box-shadow: 0 0 8px rgba(5, 217, 232, .5), inset 0 0 8px rgba(5, 217, 232, .18);
}
.demo-style-cyberpunk .play:hover {
  background: rgba(249, 240, 2, .16);
  box-shadow: 0 0 14px rgba(249, 240, 2, .55), inset 0 0 10px rgba(249, 240, 2, .2);
}
.demo-style-cyberpunk .cbtn:active {
  background: #05d9e8;
  color: #05070f;
}
.demo-style-cyberpunk .play:active {
  background: #f9f002;
  color: #05070f;
}
.demo-style-cyberpunk .cbtn:focus-visible {
  outline: 1px solid #f9f002;
  outline-offset: 2px;
}
.demo-style-cyberpunk .play .i-pause { display: none; }
.demo-style-cyberpunk .play.playing .i-play { display: none; }
.demo-style-cyberpunk .play.playing .i-pause { display: block; }
/* ---- 音量：青色槽 + 品红发光填充 ---- */
.demo-style-cyberpunk .volume {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 13px;
  padding: 0 16px 14px;
}
.demo-style-cyberpunk .vicon {
  display: flex;
  flex: none;
  color: rgba(5, 217, 232, .8);
}
.demo-style-cyberpunk .vtrack {
  position: relative;
  flex: 1;
  height: 8px;
  cursor: pointer;
  border: 1px solid rgba(5, 217, 232, .5);
  border-radius: 1px;
  background: #05070f;
  box-shadow: inset 0 0 5px rgba(0, 0, 0, .7), 0 0 6px rgba(5, 217, 232, .15);
}
.demo-style-cyberpunk .vtrack::before { /* 扩大点击热区 */
  content: "";
  position: absolute;
  inset: -7px -3px;
}
.demo-style-cyberpunk .vfill {
  height: 100%;
  background: linear-gradient(90deg, #d1144f 0%, #ff2a6d 100%);
  box-shadow: 0 0 8px rgba(255, 42, 109, .8), 0 0 16px rgba(255, 42, 109, .35);
}
/* ---- 动效兜底 ---- */
@media (prefers-reduced-motion: reduce) {
  .demo-style-cyberpunk .player::after,
  .demo-style-cyberpunk .art::after,
  .demo-style-cyberpunk .sky .blink,
  .demo-style-cyberpunk .holo,
  .demo-style-cyberpunk .title,
  .demo-style-cyberpunk .track,
  .demo-style-cyberpunk .play {
    animation: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const player = ROOT.querySelector('.player');
  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const DURATION = 30; // 全程秒数
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  let playing = false;
  let progress = 31; // 与初始 width:31% 对应

  function currentPercent() {
    const br = bar.getBoundingClientRect();
    const tr = bar.parentElement.getBoundingClientRect();
    return tr.width ? Math.min(100, (br.width / tr.width) * 100) : progress;
  }

  function updateIcon() {
    playBtn.classList.toggle('playing', playing);
    player.classList.toggle('is-playing', playing); // 播放时警示条纹加速
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function freezeAt(p) {
    bar.style.transition = 'none';
    bar.style.width = p + '%';
    progress = p;
  }

  function animateTo(target) {
    if (reduced.matches) { // 减少动态效果：瞬移
      freezeAt(target);
      playing = false;
      updateIcon();
      return;
    }
    const remain = Math.max((target - progress) / 100 * DURATION, 0.05);
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
    void bar.offsetWidth; // 强制重排，让瞬移先生效
    bar.style.transition = 'width ' + remain + 's linear';
    bar.style.width = target + '%';
  }

  playBtn.addEventListener('click', function () {
    if (playing) {
      freezeAt(currentPercent()); // 暂停：保持当前进度
      playing = false;
    } else {
      if (progress >= 99.5) progress = 0; // 播完后再次播放从头开始
      playing = true;
      animateTo(100);
    }
    updateIcon();
  });

  bar.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'width' && playing && currentPercent() >= 99.5) {
      playing = false;
      progress = 100;
      updateIcon();
    }
  });

  function restart() { // prev/next：归零重播
    progress = 0;
    playing = true;
    animateTo(100);
    updateIcon();
  }
  prevBtn.addEventListener('click', restart);
  nextBtn.addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) { // 点击设置音量
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = Math.min(100, Math.max(0, ((e.clientX - r.left) / r.width) * 100));
    vfill.style.width = p + '%';
  });

  // 舞台自适应：首页卡片舞台较矮时整体等比缩小，保证不溢出
  function fit() {
    const host = ROOT.parentElement; // .fragment 容器
    if (!host || !player) return;
    player.style.transform = '';
    const availW = host.clientWidth, availH = host.clientHeight;
    const w = player.offsetWidth, h = player.offsetHeight;
    if (!w || !h || !availW || !availH) return;
    const s = Math.min(1, availW / w, availH / h);
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  requestAnimationFrame(fit);
  window.addEventListener('resize', fit);
})();
</script>
