<style>
/* ===== De Stijl —— 正交黑网格 + 三原色矩形 + 零曲线 ===== */
.demo-style-de-stijl {
  --stijl-red: #e3000f;
  --stijl-yellow: #f9d71c;
  --stijl-blue: #0057a8;
  --stijl-ink: #0a0a0a;
  --stijl-paper: #ffffff;
  --stijl-line: 3px;
  font-family: "Helvetica Neue", Arial, var(--font-sans, sans-serif);
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.demo-style-de-stijl .pwrap { transform-origin: center; }
.demo-style-de-stijl .player {
  position: relative;
  width: 280px;
  padding: var(--stijl-line);
  background: var(--stijl-ink);
  border: var(--stijl-line) solid var(--stijl-ink);
  border-radius: 0;
  display: grid;
  grid-template-columns: 1fr;
  grid-template-rows: auto auto auto auto auto;
  gap: var(--stijl-line);
}
/* ---- 封面：蒙德里安式矩形网格 ---- */
.demo-style-de-stijl .art {
  background: var(--stijl-ink);
  overflow: hidden;
}
.demo-style-de-stijl .mondrian {
  display: grid;
  grid-template-columns: 1.6fr 0.9fr 0.7fr;
  grid-template-rows: 1.2fr 0.8fr 1fr;
  gap: var(--stijl-line);
  height: 116px;
}
.demo-style-de-stijl .cell {
  background: var(--stijl-paper);
  border-radius: 0;
  min-height: 18px;
}
.demo-style-de-stijl .cell.red { background: var(--stijl-red); }
.demo-style-de-stijl .cell.yellow { background: var(--stijl-yellow); }
.demo-style-de-stijl .cell.blue { background: var(--stijl-blue); }
.demo-style-de-stijl .cell.wide { grid-column: 1 / 3; }
.demo-style-de-stijl .cell.tall { grid-row: 2 / 4; }
.demo-style-de-stijl .cell.narrow { grid-column: 3; grid-row: 3; }
.demo-style-de-stijl .cell.small { grid-column: 3; grid-row: 2; }
/* ---- 文字：中性无衬线，低调 ---- */
.demo-style-de-stijl .meta {
  padding: 8px 10px 2px;
  background: var(--stijl-paper);
}
.demo-style-de-stijl .title {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--stijl-ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.demo-style-de-stijl .artist {
  margin-top: 2px;
  font-size: 11px;
  font-weight: 500;
  color: var(--stijl-ink);
  opacity: 0.7;
}
/* ---- 进度：白底墨线轨道，蓝色填充 ---- */
.demo-style-de-stijl .progress {
  padding: 8px 10px 6px;
  background: var(--stijl-paper);
}
.demo-style-de-stijl .track {
  height: 10px;
  background: var(--stijl-paper);
  border: var(--stijl-line) solid var(--stijl-ink);
  border-radius: 0;
  overflow: hidden;
}
.demo-style-de-stijl .bar {
  width: 31%;
  height: 100%;
  background: var(--stijl-blue);
}
.demo-style-de-stijl .times {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace);
  font-size: 9.5px;
  font-weight: 600;
  color: var(--stijl-ink);
  opacity: 0.75;
}
/* ---- 控件：实心原色矩形按钮 ---- */
.demo-style-de-stijl .controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 8px 10px;
  background: var(--stijl-paper);
}
.demo-style-de-stijl .cbtn {
  -webkit-appearance: none;
  appearance: none;
  margin: 0;
  padding: 0;
  border: var(--stijl-line) solid var(--stijl-ink);
  border-radius: 0;
  background: var(--stijl-paper);

  display: grid;
  place-items: center;
  transition: background 80ms linear;

.demo-style-de-stijl .cbtn svg {
  display: block;
  width: 100%;
  height: 100%;
}
.demo-style-de-stijl .cbtn svg * { fill: var(--stijl-paper); }
.demo-style-de-stijl .next svg * { fill: var(--stijl-ink); }
.demo-style-de-stijl .prev,
.demo-style-de-stijl .next {
  width: 34px;
  height: 34px;
}
.demo-style-de-stijl .play {
  width: 44px;
  height: 44px;
}
.demo-style-de-stijl .prev { background: var(--stijl-red); }
.demo-style-de-stijl .next { background: var(--stijl-yellow); }
.demo-style-de-stijl .play { background: var(--stijl-blue); }
.demo-style-de-stijl .cbtn:hover {

.demo-style-de-stijl .cbtn:hover svg * { fill: var(--stijl-ink); }

.demo-style-de-stijl .cbtn:focus-visible {

.demo-style-de-stijl .vtrack {

  border-radius: 0;

  cursor: pointer;
}
.demo-style-de-stijl .vtrack::before { /* 扩大点击热区 */
  content: "";

  inset: -7px -3px;
}
.demo-style-de-stijl .vfill {
  width: 70%;
  height: 100%;
  background: var(--stijl-yellow);
}
.demo-style-de-stijl .vtrack:focus-visible {
  outline: var(--stijl-line) solid var(--stijl-ink);
  outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
  .demo-style-de-stijl .cbtn,
  .demo-style-de-stijl .bar,
  .demo-style-de-stijl .vfill { transition: none; }
  .demo-style-de-stijl .cbtn:active { transform: none; }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const wrap = ROOT.querySelector('.pwrap');
  const player = ROOT.querySelector('.player');
  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const motionMQ = window.matchMedia('(prefers-reduced-motion: reduce)');

  /* 舞台自适应：首页矮舞台等比缩小，保证不溢出 */
  function fit() {
    const host = ROOT.parentElement;
    if (!host || !player) return;
    const aw = host.clientWidth, ah = host.clientHeight;
    if (!aw || !ah) return;
    const s = Math.min(1, aw / (player.offsetWidth + 12), ah / (player.offsetHeight + 12));
    wrap.style.transform = 'scale(' + s + ')';
  }
  fit();
  if (window.ResizeObserver) new ResizeObserver(fit).observe(ROOT);
  else window.addEventListener('resize', fit);

  /* play/pause：进度 31% -> 100%，约 30s */
  let p = 31, playing = false, raf = 0, last = 0;
  function render() { bar.style.width = p + '%'; }
  function setPlaying(on) {
    playing = on;
    playBtn.classList.toggle('playing', on);
    playBtn.setAttribute('aria-label', on ? 'Pause' : 'Play');
    cancelAnimationFrame(raf); raf = 0;
    if (!on) return;
    if (motionMQ.matches) { p = 100; render(); setPlaying(false); return; }
    if (p >= 99.5) p = 0;
    last = 0;
    raf = requestAnimationFrame(tick);
  }
  function tick(now) {
    if (!playing) return;
    if (!last) last = now;
    p = Math.min(100, p + (now - last) * ((100 - 31) / 30000));
    last = now;
    render();
    if (p >= 99.5) { setPlaying(false); }
    else { raf = requestAnimationFrame(tick); }
  }
  playBtn.addEventListener('click', function () { setPlaying(!playing); });

  /* prev/next：归零重播 */
  function restart() { p = 0; render(); last = 0; setPlaying(true); }
  ROOT.querySelector('.prev').addEventListener('click', restart);
  ROOT.querySelector('.next').addEventListener('click', restart);

  /* 音量：点击设置，初始 70% */
  function setVol(v) {
    v = Math.max(0, Math.min(100, v));
    vfill.style.width = v + '%';
  }
  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    setVol((e.clientX - r.left) / r.width * 100);
  });
  setVol(70);
})();
</script>
