      <button class="cbtn play" type="button" aria-label="Play" aria-pressed="false"><svg class="i-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg><svg class="i-pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" hidden><path d="M6 5h4.5v14H6zM13.5 5H18v14h-4.5z"/></svg></button>
      <button class="cbtn next" type="button" aria-label="Next"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M14.5 6H17v12h-2.5zM6 6l8.5 6L6 18z"/></svg></button>

</div>
<style>
/* Flat Design (Metro, c.2012): every surface one solid fill.
   The un-skeuomorphing checklist — nothing simulates light:
   no gradients, no shadows, no bevels, no textures, no radius. */
.demo-style-flat-design {
  --tile: #0072c6;      /* Windows 8 Metro accent blue */
  --tile-deep: #005a9e; /* darker solid: edges drawn by color change alone */
  --tile-deep-2: #004b84;
  --ink: #ffffff;
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  width: 288px;
  max-width: 100%;
  box-sizing: border-box;
}
.demo-style-flat-design .player {
  display: grid;
  grid-template-columns: 106px 1fr;
  column-gap: 12px;
  row-gap: 9px;
  align-content: center;
  box-sizing: border-box;
  width: 100%;
  padding: 14px;
  background: var(--tile);
  color: var(--ink);
  border: 0;
  border-radius: 0;
  box-shadow: none;
  filter: none;
  background-image: none;
  text-shadow: none;
}
.demo-style-flat-design .art {
  grid-row: 1 / 5;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 106px;
  background: var(--tile-deep);
  color: var(--ink);
}
.demo-style-flat-design .meta { min-width: 0; }
.demo-style-flat-design .title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: 0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.demo-style-flat-design .artist {
  margin-top: 3px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.demo-style-flat-design .progress { min-width: 0; }
.demo-style-flat-design .track {
  height: 4px;
  background: var(--tile-deep);
}
.demo-style-flat-design .bar {
  width: 31.6%;
  height: 100%;
  background: var(--ink);
}
.demo-style-flat-design .times {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-family: var(--font-mono, ui-monospace, SFMono-Regular, Menlo, monospace);
  font-size: 9.5px;
  letter-spacing: 0.04em;
}
.demo-style-flat-design .controls {
  display: flex;
  align-items: center;
  gap: 6px;
}
.demo-style-flat-design .cbtn {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 34px;
  width: 36px;
  margin: 0;
  padding: 0;
  cursor: pointer;
  border: 0;
  border-radius: 0;
  box-shadow: none;
  background: var(--tile-deep);
  color: var(--ink);
  transition: background-color 120ms linear, color 120ms linear;
}
.demo-style-flat-design .cbtn.play {
  width: 44px;
  background: var(--ink);
  color: var(--tile);
}
.demo-style-flat-design .cbtn:hover { background: var(--tile-deep-2); }
.demo-style-flat-design .cbtn.play:hover { background: #d6e9f8; }
.demo-style-flat-design .cbtn:active { background: #003a67; }
.demo-style-flat-design .cbtn.play:active { background: #b7d7f0; }
.demo-style-flat-design .cbtn:focus-visible {
  outline: 2px solid var(--ink);
  outline-offset: 2px;
}
/* the hidden attribute does not toggle display on SVG elements — do it by hand */
.demo-style-flat-design .cbtn svg[hidden] {
  display: none;
}
.demo-style-flat-design .volume {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.demo-style-flat-design .vicon {
  display: flex;
  align-items: center;
  color: var(--ink);
}
.demo-style-flat-design .vtrack {
  flex: 1;
  height: 4px;
  background: var(--tile-deep);
  cursor: pointer;
}
.demo-style-flat-design .vfill {
  width: 70%;
  height: 100%;
  background: var(--ink);
}
@media (prefers-reduced-motion: reduce) {
  .demo-style-flat-design .bar,
  .demo-style-flat-design .cbtn {
    transition: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const playBtn = ROOT.querySelector('.play');
  const iPlay = ROOT.querySelector('.i-play');
  const iPause = ROOT.querySelector('.i-pause');
  const bar = ROOT.querySelector('.bar');
  const track = ROOT.querySelector('.track');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');

  const FULL = 43.84; /* seconds for 0 -> 100%, so 31.6% -> 100% takes ~30s */
  let playing = false;
  let progress = 31.6;

  function runForward() {
    const remain = (100 - progress) / 100 * FULL;
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
    void bar.offsetWidth; /* reflow so the jump back is applied before animating */
    bar.style.transition = 'width ' + remain + 's linear';
    bar.style.width = '100%';
  }

  function freeze() {
    const w = track.getBoundingClientRect().width;
    if (w > 0) {
      progress = Math.min(100, Math.max(0,
        bar.getBoundingClientRect().width / w * 100));
    }
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
  }

  function setPlaying(next) {
    playing = next;
    playBtn.setAttribute('aria-pressed', next ? 'true' : 'false');
    playBtn.setAttribute('aria-label', next ? 'Pause' : 'Play');
    /* SVG elements have no HTMLElement#hidden reflection — toggle the attribute */
    if (next) { iPlay.setAttribute('hidden', ''); iPause.removeAttribute('hidden'); }
    else { iPlay.removeAttribute('hidden'); iPause.setAttribute('hidden', ''); }
    if (next) runForward(); else freeze();
  }

  playBtn.addEventListener('click', function () { setPlaying(!playing); });

  function restart() {
    progress = 0;
    bar.style.transition = 'none';
    bar.style.width = '0%';
    void bar.offsetWidth;
    if (playing) runForward();
  }
  ROOT.querySelector('.prev').addEventListener('click', restart);
  ROOT.querySelector('.next').addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    if (r.width <= 0) return;
    const pct = Math.min(100, Math.max(0, (e.clientX - r.left) / r.width * 100));
    vfill.style.width = pct + '%';
  });
})();
</script>
