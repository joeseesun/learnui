<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  /* shrink to fit whatever stage the fragment lands in */
  function fit() {
    ROOT.style.transform = '';
    const host = ROOT.parentElement;
    if (!host) return;
    const r = ROOT.getBoundingClientRect();
    if (!r.width || !r.height) return;
    const s = Math.min(1, host.clientWidth / r.width, host.clientHeight / r.height);
    if (s < 1) ROOT.style.transform = 'scale(' + s + ')';
  }
  fit();
  window.addEventListener('resize', fit);

  const player = ROOT.querySelector('.player');
  const bar = ROOT.querySelector('.bar');
  const track = ROOT.querySelector('.track');
  const playBtn = ROOT.querySelector('.play');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const FULL = 30; /* seconds for 0 -> 100% */
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let playing = false;

  function pct() {
    const cw = track.clientWidth - 4; /* groove padding */
    return cw > 0 ? (parseFloat(getComputedStyle(bar).width) / cw) * 100 : 0;
  }
  function setPlaying(on) {
    playing = on;
    player.classList.toggle('is-playing', on);
    playBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
    playBtn.setAttribute('aria-label', on ? 'Pause' : 'Play');
  }
  function runTo100() {
    const from = pct();
    if (reduced) {
      bar.style.transition = 'none';
      bar.style.width = '100%';
      setPlaying(false);
      return;
    }
    const secs = Math.max(0, ((100 - from) / 100) * FULL);
    bar.style.transition = 'width ' + secs + 's linear';
    void bar.offsetWidth;
    bar.style.width = '100%';
  }
  playBtn.addEventListener('click', function () {
    if (playing) {
      const p = pct();
      bar.style.transition = 'none';
      bar.style.width = p + '%';
      setPlaying(false);
    } else {
      if (pct() >= 99.5) {
        bar.style.transition = 'none';
        bar.style.width = '0%';
        void bar.offsetWidth;
      }
      setPlaying(true);
      runTo100();
    }
  });
  function restart() {
    bar.style.transition = 'none';
    bar.style.width = '0%';
    void bar.offsetWidth;
    if (playing) runTo100();
  }
  ROOT.querySelector('.prev').addEventListener('click', restart);
  ROOT.querySelector('.next').addEventListener('click', restart);
  bar.addEventListener('transitionend', function () {
    if (pct() >= 99.5) setPlaying(false);
  });
  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
    vfill.style.width = (p * 100) + '%';
  });
})();
</script>
