<style>
.demo-style-frutiger-metro {
  --fm-magenta: #ec008c;
  --fm-cyan: #00b6e3;
  --fm-yellow: #ffd400;
  --fm-ink: #1a1a2e;
  --fm-paper: #ffffff;
  font-family: var(--font-sans, "Segoe UI", Frutiger, "Myriad Pro", system-ui, sans-serif);
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;

  position: relative;
  width: 288px;
  padding: 16px 18px 18px;
  background:
    linear-gradient(135deg, rgba(236,0,140,.08) 0%, rgba(0,182,227,.08) 50%, rgba(255,212,0,.08) 100%),

  border-radius: 16px;
  border: 2px solid var(--fm-ink);
  box-shadow: 6px 6px 0 rgba(26,26,46,.18);
  overflow: hidden;
}
/* vector flourish wallpaper */
.demo-style-frutiger-metro .player::before {
  content: "";
  position: absolute;
  inset: -20%;
  background:
    radial-gradient(circle at 78% 22%, rgba(236,0,140,.18) 0%, transparent 35%),
    radial-gradient(circle at 18% 78%, rgba(0,182,227,.16) 0%, transparent 32%),
    radial-gradient(circle at 62% 68%, rgba(255,212,0,.16) 0%, transparent 28%);

/* art: gradient block + vector flourishes + silhouette */

  width: 100%;
  height: 112px;
  border-radius: 12px;
  background:
    linear-gradient(135deg, var(--fm-magenta) 0%, var(--fm-cyan) 55%, var(--fm-yellow) 100%);

  width: 100%; height: 100%;
  opacity: .9;
  mix-blend-mode: overlay;

.demo-style-frutiger-metro .art .silhouette {
  position: absolute;
  right: 12px; bottom: 4px;
  width: 42px; height: 56px;

.demo-style-frutiger-metro .badge {

/* progress: subway line */

  position: relative;

.demo-style-frutiger-metro .track {

.demo-style-frutiger-metro .line {

.demo-style-frutiger-metro .cbtn:hover {

  box-shadow: 5px 5px 0 rgba(0,0,0,.18);

.demo-style-frutiger-metro .cbtn:active {

.demo-style-frutiger-metro .vicon {

}
.demo-style-frutiger-metro .vicon svg { width: 100%; height: 100%; }
.demo-style-frutiger-metro .vtrack {
  position: relative;
  flex: 1;
  height: 8px;
  cursor: pointer;
  border-radius: 999px;
  background: #e9edf3;
  border: 1.5px solid var(--fm-ink);
  overflow: hidden;
}
.demo-style-frutiger-metro .vfill {
  width: 70%;
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--fm-magenta) 0%, var(--fm-cyan) 55%, var(--fm-yellow) 100%);

/* reduced motion */
@media (prefers-reduced-motion: reduce) {
  .demo-style-frutiger-metro .cbtn,
  .demo-style-frutiger-metro .vfill,
  .demo-style-frutiger-metro .bar { transition: none; }
  .demo-style-frutiger-metro .cbtn:hover,
  .demo-style-frutiger-metro .cbtn:active { transform: none; }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const player = ROOT.querySelector('.player');
  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const motionMQ = window.matchMedia('(prefers-reduced-motion: reduce)');

  /* stage fit */
  function fit() {
    const host = ROOT.parentElement;
    if (!host || !player) return;
    player.style.transform = '';
    const s = Math.min(1, host.clientWidth / (player.offsetWidth + 12), host.clientHeight / (player.offsetHeight + 12));
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  if (window.ResizeObserver) new ResizeObserver(fit).observe(ROOT);
  else window.addEventListener('resize', fit);

  /* play/pause: 31% -> 100% over ~30s */
  let p = 31, playing = false, raf = 0, last = 0;
  const RATE = (100 - 31) / 30000;
  function render() { bar.style.width = p + '%'; }
  function setPlaying(on) {
    playing = on;
    playBtn.classList.toggle('is-playing', on);
    playBtn.setAttribute('aria-label', on ? 'Pause' : 'Play');
    cancelAnimationFrame(raf); raf = 0;
    if (!on) return;
    if (motionMQ.matches) { p = 100; render(); setPlaying(false); return; }
    if (p >= 99.5) p = 0;
    last = 0;
    raf = requestAnimationFrame(tick);
  }
  function tick(now) {
    if (!playing) return;
    if (!last) last = now;
    p = Math.min(100, p + (now - last) * RATE);
    last = now;
    render();
    if (p >= 100) { setPlaying(false); }
    else { raf = requestAnimationFrame(tick); }
  }
  playBtn.addEventListener('click', function () { setPlaying(!playing); });

  /* prev/next: reset */
  function restart() { p = 0; render(); setPlaying(true); }
  ROOT.querySelector('.prev').addEventListener('click', restart);
  ROOT.querySelector('.next').addEventListener('click', restart);

  /* volume: click to set, initial 70% */
  function setVol(v) {
    const pct = Math.max(0, Math.min(100, v));
    vfill.style.width = pct + '%';
  }
  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    setVol(((e.clientX - r.left) / r.width) * 100);
  });
})();
</script>
