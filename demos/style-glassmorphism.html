<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const bar = ROOT.querySelector('.bar');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const iconPlay = playBtn.querySelector('.i-play');
  const iconPause = playBtn.querySelector('.i-pause');

  const START = 31;          // initial progress %
  const DURATION = 30000;    // ms from START to 100
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
  let progress = START;
  let playing = false;
  let last = null;
  let raf = 0;

  function render() { bar.style.width = progress + '%'; }

  function icons() {
    iconPlay.style.display = playing ? 'none' : 'block';
    iconPause.style.display = playing ? 'block' : 'none';
    playBtn.setAttribute('aria-pressed', playing ? 'true' : 'false');
  }

  function tick(now) {
    if (last === null) last = now;
    const dt = now - last;
    last = now;
    progress = Math.min(100, progress + dt * (100 - START) / DURATION);
    render();
    if (playing && progress < 100) {
      raf = requestAnimationFrame(tick);
    } else {
      playing = false;
      icons();
    }
  }

  function start() {
    if (progress >= 100) { progress = 0; render(); }
    if (reduceMotion.matches) { // no animation: jump to the end
      progress = 100;
      render();
      playing = false;
      icons();
      return;
    }
    playing = true;
    icons();
    last = null;
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(tick);
  }

  function stop() {
    playing = false;
    icons();
    cancelAnimationFrame(raf);
  }

  function replay() {
    progress = 0;
    render();
    start();
  }

  playBtn.addEventListener('click', function () { playing ? stop() : start(); });
  prevBtn.addEventListener('click', replay);
  nextBtn.addEventListener('click', replay);

  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    vfill.style.width = (pct * 100) + '%';
  });

  render();
  icons();
})();
</script>
