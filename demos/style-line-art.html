<div class="demo demo-style-line-art">
  <div class="player">
    <div class="art">
      <div class="art-frame">
        <div class="circle outer"></div>
        <div class="circle inner"></div>
        <div class="cross v"></div>
        <div class="cross h"></div>
      </div>
    </div>
    <div class="meta">
      <div class="title">Contour Lines</div>
      <div class="artist">Monoline Trio</div>
    </div>
    <div class="progress">
      <div class="track"><div class="bar" style="width:31%"></div></div>
      <div class="times"><span>1:12</span><span>3:48</span></div>
    </div>
    <div class="controls">
      <button class="cbtn prev" type="button" aria-label="Previous">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="5" width="2" height="14" rx="1"/><path d="M20 5v14L9.5 12z"/></svg>
      </button>
      <button class="cbtn play" type="button" aria-label="Play">
        <svg class="i-play" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 5l14 7-14 7z"/></svg>
        <svg class="i-pause" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="7" y="5" width="3" height="14" rx="1"/><rect x="14" y="5" width="3" height="14" rx="1"/></svg>
      </button>
      <button class="cbtn next" type="button" aria-label="Next">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="17" y="5" width="2" height="14" rx="1"/><path d="M4 5v14l10.5-7z"/></svg>
      </button>
    </div>
    <div class="volume">
      <span class="vicon">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 9v6h3l5 4V5L8 9z"/><path d="M16 9a4 4 0 0 1 0 6M19 7a7 7 0 0 1 0 10"/></svg>
      </span>
      <div class="vtrack"><div class="vfill" style="width:70%"></div><div class="vthumb"></div></div>
    </div>
  </div>
</div>
<style>
/* ===== Line Art / Monoline —— the interface is a single contour drawing ===== */
.demo-style-line-art {
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  color: #1a1a1a;
  max-width: 100%;
}
.demo-style-line-art .player {
  position: relative;
  width: 260px;
  max-width: 100%;
  margin: 0 auto;
  padding: 16px 18px 18px;
  border: 1.5px solid #1a1a1a;
  border-radius: 4px;
  background: transparent;
}
/* ---- album art: a record/disc drawn only with concentric circles and crosshairs ---- */
.demo-style-line-art .art {
  display: flex;
  justify-content: center;
  margin-bottom: 14px;
}
.demo-style-line-art .art-frame {
  position: relative;
  width: 118px;
  height: 118px;
  border: 1.5px solid #1a1a1a;
  border-radius: 4px;
}
.demo-style-line-art .circle {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  border: 1.5px solid #1a1a1a;
  border-radius: 50%;
}
.demo-style-line-art .circle.outer { width: 72px; height: 72px; }
.demo-style-line-art .circle.inner { width: 28px; height: 28px; }
.demo-style-line-art .cross {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: #1a1a1a;
}
.demo-style-line-art .cross.v { width: 1.5px; height: 72px; }
.demo-style-line-art .cross.h { width: 72px; height: 1.5px; }
/* ---- meta: light, outline-friendly typography ---- */
.demo-style-line-art .meta {
  text-align: center;
  margin-bottom: 12px;
}
.demo-style-line-art .title {
  font-size: 13.5px;
  font-weight: 500;
  letter-spacing: 0.01em;
  color: #1a1a1a;
}
.demo-style-line-art .artist {
  margin-top: 2px;
  font-size: 11px;
  font-weight: 400;
  color: rgba(26, 26, 26, 0.62);
}
/* ---- progress: a single horizontal line with a stroke bar ---- */
.demo-style-line-art .progress {
  margin-bottom: 14px;
}
.demo-style-line-art .track {
  position: relative;
  height: 1.5px;
  background: rgba(26, 26, 26, 0.18);
}
.demo-style-line-art .bar {
  height: 100%;
  background: #1a1a1a;
}
.demo-style-line-art .times {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace);
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.03em;
  color: rgba(26, 26, 26, 0.58);
}
/* ---- controls: hollow circular buttons, icons as strokes ---- */
.demo-style-line-art .controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 14px;
}
.demo-style-line-art .cbtn {
  -webkit-appearance: none;
  appearance: none;
  display: grid;
  place-items: center;
  margin: 0;
  padding: 0;
  cursor: pointer;
  color: #1a1a1a;
  border: 1.5px solid #1a1a1a;
  border-radius: 50%;
  background: transparent;
  transition: transform .15s ease, border-color .15s ease;
}
.demo-style-line-art .prev,
.demo-style-line-art .next {
  width: 34px;
  height: 34px;
}
.demo-style-line-art .play {
  width: 46px;
  height: 46px;
}
.demo-style-line-art .cbtn:hover {
  transform: scale(1.05);
}
.demo-style-line-art .cbtn:active {
  transform: scale(0.96);
}
.demo-style-line-art .cbtn:focus-visible {
  outline: none;
  border-style: dashed;
}
.demo-style-line-art .play .i-pause { display: none; }
.demo-style-line-art .play.playing .i-play { display: none; }
.demo-style-line-art .play.playing .i-pause { display: block; }
/* ---- volume: speaker icon + horizontal stroke slider ---- */
.demo-style-line-art .volume {
  display: flex;
  align-items: center;
  gap: 9px;
}
.demo-style-line-art .vicon {
  display: flex;
  flex: none;
  color: #1a1a1a;
}
.demo-style-line-art .vtrack {
  position: relative;
  flex: 1;
  height: 1.5px;
  cursor: pointer;
  background: rgba(26, 26, 26, 0.18);
}
.demo-style-line-art .vtrack::before {
  content: "";
  position: absolute;
  inset: -7px -3px;
}
.demo-style-line-art .vfill {
  height: 100%;
  background: #1a1a1a;
}
.demo-style-line-art .vthumb {
  position: absolute;
  left: 70%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 10px;
  height: 10px;
  border: 1.5px solid #1a1a1a;
  border-radius: 50%;
  background: transparent;
}
/* ---- reduced motion ---- */
@media (prefers-reduced-motion: reduce) {
  .demo-style-line-art .cbtn {
    transition: none;
  }
  .demo-style-line-art .cbtn:hover,
  .demo-style-line-art .cbtn:active {
    transform: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const vthumb = ROOT.querySelector('.vthumb');
  const DURATION = 30;
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  let playing = false;
  let progress = 31;

  function currentPercent() {
    const br = bar.getBoundingClientRect();
    const tr = bar.parentElement.getBoundingClientRect();
    return tr.width ? Math.min(100, (br.width / tr.width) * 100) : progress;
  }

  function updateIcon() {
    playBtn.classList.toggle('playing', playing);
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function freezeAt(p) {
    bar.style.transition = 'none';
    bar.style.width = p + '%';
    progress = p;
  }

  function animateTo(target) {
    if (reduced.matches) {
      freezeAt(target);
      playing = false;
      updateIcon();
      return;
    }
    const remain = Math.max((target - progress) / 100 * DURATION, 0.05);
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
    void bar.offsetWidth;
    bar.style.transition = 'width ' + remain + 's linear';
    bar.style.width = target + '%';
  }

  playBtn.addEventListener('click', function () {
    if (playing) {
      freezeAt(currentPercent());
      playing = false;
    } else {
      if (progress >= 99.5) progress = 0;
      playing = true;
      animateTo(100);
    }
    updateIcon();
  });

  bar.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'width' && playing && currentPercent() >= 99.5) {
      playing = false;
      progress = 100;
      updateIcon();
    }
  });

  function restart() {
    progress = 0;
    playing = true;
    animateTo(100);
    updateIcon();
  }
  prevBtn.addEventListener('click', restart);
  nextBtn.addEventListener('click', restart);

  function setVolume(p) {
    p = Math.min(100, Math.max(0, p));
    vfill.style.width = p + '%';
    vthumb.style.left = p + '%';
  }

  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = ((e.clientX - r.left) / r.width) * 100;
    setVolume(p);
  });

  // stage fit
  const player = ROOT.querySelector('.player');
  function fit() {
    const host = ROOT.parentElement;
    if (!host || !player) return;
    player.style.transform = '';
    const availW = host.clientWidth, availH = host.clientHeight;
    const w = player.offsetWidth, h = player.offsetHeight;
    if (!w || !h || !availW || !availH) return;
    const s = Math.min(1, availW / w, availH / h);
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  requestAnimationFrame(fit);
  window.addEventListener('resize', fit);
})();
</script>
