<div class="demo demo-style-liquid-glass">
  <div class="player">
    <div class="art"><div class="sun"></div></div>
    <div class="meta">
      <div class="title">Midnight Drive</div>
      <div class="artist">Neon Coast</div>
    </div>
    <div class="progress">
      <div class="track"><div class="bar" style="width:31%"></div></div>
      <div class="times"><span>1:12</span><span>3:48</span></div>
    </div>
    <div class="controls">
      <button class="cbtn prev" type="button" aria-label="Previous">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="4.5" y="5" width="2.6" height="14" rx="1.3"/><path d="M20 5.6v12.8c0 .95-1.05 1.52-1.85 1L9.6 13.1a1.25 1.25 0 0 1 0-2.15l8.55-6.35c.8-.6 1.85-.03 1.85 1z"/></svg>
      </button>

        <svg class="i-pause" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6.6" y="5" width="3.4" height="14" rx="1.7"/><rect x="14" y="5" width="3.4" height="14" rx="1.7"/></svg>

<style>
/* ===== Liquid Glass (Apple 2025) —— 玻璃只属于控制层，内容保持不透明 ===== */
.demo-style-liquid-glass {
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  max-width: 100%;
}
.demo-style-liquid-glass .player {
  position: relative;
  width: 280px;
  max-width: 100%;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 30px; /* 外层大圆角，与内部胶囊控件构成同心几何 */
  background: linear-gradient(180deg, #241031 0%, #2d0f3c 30%, #1a0a2b 62%, #100620 100%); /* 不透明内容底 */
  box-shadow:
    0 18px 40px rgba(8, 2, 18, .5),
    0 3px 10px rgba(8, 2, 18, .35),
    inset 0 0 0 1px rgba(255, 255, 255, .07);
}
/* ---- 封面：不透明内容（合成波夕阳），只有它能被玻璃透镜折射出颜色 ---- */
.demo-style-liquid-glass .art {
  position: relative;
  height: 118px;
  overflow: hidden;
  background:
    radial-gradient(1.8px 1.8px at 18% 16%, rgba(255, 255, 255, .95), transparent 62%),
    radial-gradient(1.4px 1.4px at 66% 9%,  rgba(255, 255, 255, .75), transparent 62%),
    radial-gradient(1.4px 1.4px at 41% 25%, rgba(255, 255, 255, .55), transparent 62%),
    radial-gradient(1.8px 1.8px at 84% 28%, rgba(255, 255, 255, .5),  transparent 62%),
    radial-gradient(1.2px 1.2px at 55% 14%, rgba(255, 255, 255, .45), transparent 62%),
    linear-gradient(180deg, #120422 0%, #2c0a4e 28%, #661c7c 50%, #c7358a 66%, #ff7c60 80%, #ffb36b 100%);
}
.demo-style-liquid-glass .sun { /* 条纹夕阳 */
  position: absolute;
  left: 50%;
  top: 16%;
  width: 76px;
  height: 76px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: linear-gradient(180deg, #ffeeb0 0%, #ffc46b 34%, #ff8a6b 62%, #ff4f8b 100%);
  box-shadow: 0 0 34px 8px rgba(255, 140, 110, .5);
}
.demo-style-liquid-glass .sun::after { /* 下半部暗色横条纹（synthwave 切线） */
  content: "";
  position: absolute;
  left: 0; right: 0; top: 42%; bottom: 0;
  border-radius: 0 0 999px 999px;
  background: repeating-linear-gradient(180deg,
    transparent 0 3px,
    rgba(46, 8, 74, .92) 3px 6px);
}
.demo-style-liquid-glass .art::after { /* 霓虹地面网格 + 地平线辉光 */
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 33%;
  border-top: 1px solid rgba(255, 186, 140, .9);
  box-shadow: 0 -1px 16px rgba(255, 150, 100, .6);
  background:
    repeating-linear-gradient(90deg, rgba(255, 120, 170, .32) 0 1px, transparent 1px 24px),
    repeating-linear-gradient(180deg, rgba(255, 120, 170, .22) 0 1px, transparent 1px 10px),
    linear-gradient(180deg, #3b0f4e 0%, #180626 100%);
}
/* ---- 文字：不透明内容，白字全对比 ---- */
.demo-style-liquid-glass .meta {
  padding: 11px 18px 2px;
}
.demo-style-liquid-glass .title {
  font-size: 13.5px;
  font-weight: 650;
  letter-spacing: .01em;
  color: #ffffff;
}
.demo-style-liquid-glass .artist {
  margin-top: 1px;
  font-size: 11px;
  font-weight: 450;
  color: rgba(255, 255, 255, .62);
}
/* ---- 进度：玻璃胶囊轨道浮在内容上 ---- */
.demo-style-liquid-glass .progress {
  padding: 9px 18px 0;
}
.demo-style-liquid-glass .track {
  position: relative;
  height: 8px;
  border-radius: 999px;
  background: rgba(255, 255, 255, .13);
  -webkit-backdrop-filter: blur(10px) saturate(1.5);
  backdrop-filter: blur(10px) saturate(1.5);
  box-shadow:
    inset 0 1px 2px rgba(4, 0, 12, .5),
    inset 0 -0.5px 1px rgba(255, 255, 255, .14),
    inset 0 0 0 1px rgba(255, 255, 255, .09);
}
.demo-style-liquid-glass .bar {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #ffffff 0%, #ffe9dc 55%, #ffc9b8 100%);
  box-shadow:
    0 0 10px rgba(255, 190, 165, .75),
    0 0 3px rgba(255, 255, 255, .8),
    inset 0 1px 1px rgba(255, 255, 255, .9),
    inset 0 -1px 1px rgba(255, 160, 140, .4);
}
.demo-style-liquid-glass .times {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace);
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: .03em;
  color: rgba(255, 255, 255, .55);
}
/* ---- 控制层：唯一的玻璃材质区，浮在不透明内容之上 ---- */
.demo-style-liquid-glass .controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  margin-top: 13px;
}
.demo-style-liquid-glass .cbtn {
  -webkit-appearance: none;
  appearance: none;
  position: relative;
  display: grid;
  place-items: center;
  margin: 0;
  padding: 0;
  cursor: pointer;
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, .34);
  border-radius: 999px; /* 胶囊/圆 —— Liquid Glass 几何 */
  /* 透镜体：半透白渐变 + 强模糊增饱和 → 透出并重新染上底层内容的颜色 */
  background: linear-gradient(180deg,
    rgba(255, 255, 255, .42) 0%,
    rgba(255, 255, 255, .16) 46%,
    rgba(255, 255, 255, .07) 100%);
  -webkit-backdrop-filter: blur(16px) saturate(1.8) brightness(1.15);
  backdrop-filter: blur(16px) saturate(1.8) brightness(1.15);
  box-shadow:
    inset 0 1.5px 1px rgba(255, 255, 255, .75),   /* 顶部透镜高光 */
    inset 0 -1px 1px rgba(255, 255, 255, .28),    /* 底缘反光 */
    inset 1px 0 1px rgba(255, 255, 255, .22),
    inset -1px 0 1px rgba(255, 255, 255, .22),
    0 10px 22px rgba(4, 0, 14, .5),
    0 2px 5px rgba(4, 0, 14, .35);
  text-shadow: 0 1px 1px rgba(4, 0, 14, .35);
  transition: transform .38s cubic-bezier(.34, 1.56, .64, 1), /* 液态回弹 */
    box-shadow .3s ease, background .3s ease;
}
.demo-style-liquid-glass .cbtn::before { /* 透镜顶部弧形高光带 */
  content: "";
  position: absolute;
  left: 11%; right: 11%; top: 1.5px;
  height: 44%;
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(255, 255, 255, .55), rgba(255, 255, 255, 0));
  pointer-events: none;
}
.demo-style-liquid-glass .cbtn::after { /* 底缘环境光折射环 —— lensing 而非扁平磨砂 */
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(150% 130% at 50% 118%, rgba(200, 190, 255, .3), transparent 46%);
  pointer-events: none;
}
.demo-style-liquid-glass .cbtn svg {
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 1px 1px rgba(4, 0, 14, .4));
}
.demo-style-liquid-glass .prev,
.demo-style-liquid-glass .next {
  width: 34px;
  height: 34px;
}
.demo-style-liquid-glass .play {
  width: 48px;
  height: 48px;
}
.demo-style-liquid-glass .cbtn:hover {
  transform: scale(1.07);
  background: linear-gradient(180deg,
    rgba(255, 255, 255, .5) 0%,
    rgba(255, 255, 255, .2) 46%,
    rgba(255, 255, 255, .09) 100%);
}
.demo-style-liquid-glass .cbtn:active {
  transform: scale(.92);
}
.demo-style-liquid-glass .cbtn:focus-visible {
  outline: 2px solid rgba(255, 255, 255, .9);
  outline-offset: 2px;
}
.demo-style-liquid-glass .play .i-pause { display: none; }
.demo-style-liquid-glass .play.playing .i-play { display: none; }
.demo-style-liquid-glass .play.playing .i-pause { display: block; }
/* ---- 音量：玻璃胶囊滑条 ---- */
.demo-style-liquid-glass .volume {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-top: 14px;
  padding: 0 18px 16px;
}
.demo-style-liquid-glass .vicon {
  display: flex;
  flex: none;
  color: rgba(255, 255, 255, .72);
}
.demo-style-liquid-glass .vtrack {
  position: relative;
  flex: 1;
  height: 8px;
  border-radius: 999px;
  cursor: pointer;
  background: rgba(255, 255, 255, .13);
  -webkit-backdrop-filter: blur(10px) saturate(1.5);
  backdrop-filter: blur(10px) saturate(1.5);
  box-shadow:
    inset 0 1px 2px rgba(4, 0, 12, .5),
    inset 0 -0.5px 1px rgba(255, 255, 255, .14),
    inset 0 0 0 1px rgba(255, 255, 255, .09);
}
.demo-style-liquid-glass .vtrack::before { /* 扩大点击热区 */
  content: "";
  position: absolute;
  inset: -7px -3px;
}
.demo-style-liquid-glass .vfill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #ffffff 0%, #ffe9dc 55%, #ffc9b8 100%);
  box-shadow:
    0 0 8px rgba(255, 190, 165, .65),
    inset 0 1px 1px rgba(255, 255, 255, .9),
    inset 0 -1px 1px rgba(255, 160, 140, .4);
}
/* ---- 动效与透明度兜底 ---- */
@media (prefers-reduced-motion: reduce) {
  .demo-style-liquid-glass .cbtn {
    transition: none;
  }
  .demo-style-liquid-glass .cbtn:hover,
  .demo-style-liquid-glass .cbtn:active {
    transform: none;
  }
}
@media (prefers-reduced-transparency: reduce) {
  .demo-style-liquid-glass .cbtn,
  .demo-style-liquid-glass .track,
  .demo-style-liquid-glass .vtrack {
    -webkit-backdrop-filter: none;
    backdrop-filter: none;
    background: rgba(52, 26, 72, .94);
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const DURATION = 30; // 全程秒数
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  let playing = false;
  let progress = 31; // 与初始 width:31% 对应

  function currentPercent() {
    const br = bar.getBoundingClientRect();
    const tr = bar.parentElement.getBoundingClientRect();
    return tr.width ? Math.min(100, (br.width / tr.width) * 100) : progress;
  }

  function updateIcon() {
    playBtn.classList.toggle('playing', playing);
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function freezeAt(p) {
    bar.style.transition = 'none';
    bar.style.width = p + '%';
    progress = p;
  }

  function animateTo(target) {
    if (reduced.matches) { // 减少动态效果：瞬移
      freezeAt(target);
      playing = false;
      updateIcon();
      return;
    }
    const remain = Math.max((target - progress) / 100 * DURATION, 0.05);
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
    void bar.offsetWidth; // 强制重排，让瞬移先生效
    bar.style.transition = 'width ' + remain + 's linear';
    bar.style.width = target + '%';
  }

  playBtn.addEventListener('click', function () {
    if (playing) {
      freezeAt(currentPercent()); // 暂停：保持当前进度
      playing = false;
    } else {
      if (progress >= 99.5) progress = 0; // 播完后再次播放从头开始
      playing = true;
      animateTo(100);
    }
    updateIcon();
  });

  bar.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'width' && playing && currentPercent() >= 99.5) {
      playing = false;
      progress = 100;
      updateIcon();
    }
  });

  function restart() { // prev/next：归零重播
    progress = 0;
    playing = true;
    animateTo(100);
    updateIcon();
  }
  prevBtn.addEventListener('click', restart);
  nextBtn.addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) { // 点击设置音量
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = Math.min(100, Math.max(0, ((e.clientX - r.left) / r.width) * 100));
    vfill.style.width = p + '%';
  });

  // 舞台自适应：首页卡片舞台较矮时整体等比缩小，保证不溢出
  const player = ROOT.querySelector('.player');
  function fit() {
    const host = ROOT.parentElement; // .fragment 容器
    if (!host || !player) return;
    player.style.transform = '';
    const availW = host.clientWidth, availH = host.clientHeight;
    const w = player.offsetWidth, h = player.offsetHeight;
    if (!w || !h || !availW || !availH) return;
    const s = Math.min(1, availW / w, availH / h);
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  requestAnimationFrame(fit);
  window.addEventListener('resize', fit);
})();
</script>
