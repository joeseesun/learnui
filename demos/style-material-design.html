<div class="demo demo-style-material-design">
  <div class="player">
    <div class="art">
      <div class="paper p1"></div>
      <div class="paper p2"></div>
      <div class="paper p3"></div>
    </div>
    <div class="meta">
      <div class="title">Midnight Drive</div>
      <div class="artist">Neon Coast</div>
    </div>
    <div class="progress">
      <div class="track"><div class="bar" style="width:31%"></div></div>
      <div class="times"><span>1:12</span><span>3:48</span></div>
    </div>
    <div class="controls">
      <button class="cbtn prev" type="button" aria-label="Previous">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="cbtn play" type="button" aria-label="Play">
        <svg class="i-play" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
        <svg class="i-pause" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <button class="cbtn next" type="button" aria-label="Next">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
      </button>
    </div>
    <div class="volume">
      <span class="vicon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </span>
      <div class="vtrack"><div class="vfill" style="width:70%"></div></div>
    </div>
  </div>
</div>
<style>
/* ===== Material Design (Google 2014) —— 纸墨隐喻 + z 轴 elevation 物理 ===== */
.demo-style-material-design {
  font-family: var(--font-sans, Roboto, "Helvetica Neue", Arial, sans-serif);
  max-width: 100%;
}
/* ---- 白色卡片浮在浅灰底上：2dp 静止卡（MDC elevation 真实参数） ---- */
.demo-style-material-design .player {
  position: relative;
  width: 280px;
  max-width: 100%;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 2px; /* 纸片的利落小圆角 */
  background: #ffffff;
  box-shadow: 0 2px 2px rgba(0,0,0,.14), 0 3px 1px -2px rgba(0,0,0,.20), 0 1px 5px rgba(0,0,0,.12); /* 2dp */
  transition: box-shadow .28s cubic-bezier(.4, 0, .2, 1); /* 标准曲线 */
}
.demo-style-material-design .player:hover {
  box-shadow: 0 8px 10px 1px rgba(0,0,0,.14), 0 3px 14px 2px rgba(0,0,0,.12), 0 5px 5px -3px rgba(0,0,0,.20); /* 抬起 8dp */
}
/* ---- 封面：Indigo 700 上的分层纸艺（不同 elevation 投不同阴影） ---- */
.demo-style-material-design .art {
  position: relative;
  height: 118px;
  overflow: hidden;
  background: #303F9F; /* Indigo 700 */
}
.demo-style-material-design .paper {
  position: absolute;
  border-radius: 50%;
}
.demo-style-material-design .p1 { /* 强调色大纸片，4dp */
  width: 112px; height: 112px;
  right: -24px; top: 20px;
  background: #FF4081; /* Pink A200 */
  box-shadow: 0 4px 5px rgba(0,0,0,.14), 0 1px 10px rgba(0,0,0,.12), 0 2px 4px -1px rgba(0,0,0,.20);
}
.demo-style-material-design .p2 { /* 琥珀纸片，2dp */
  width: 58px; height: 58px;
  left: 24px; bottom: -20px;
  background: #FFC107; /* Amber 500 */
  box-shadow: 0 2px 2px rgba(0,0,0,.14), 0 3px 1px -2px rgba(0,0,0,.20), 0 1px 5px rgba(0,0,0,.12);
}
.demo-style-material-design .p3 { /* 浅靛小圆，贴底 0dp */
  width: 34px; height: 34px;
  left: 96px; top: 18px;
  background: #536DFE; /* Indigo A200 */
}
/* ---- 文字：#212121 主 / #757575 次，8dp 网格（16px 边距） ---- */
.demo-style-material-design .meta {
  padding: 12px 16px 0;
}
.demo-style-material-design .title {
  font-size: 14px;
  font-weight: 500; /* Roboto Medium */
  line-height: 1.35;
  color: #212121;
}
.demo-style-material-design .artist {
  margin-top: 2px;
  font-size: 12px;
  font-weight: 400;
  color: #757575;
}
/* ---- 进度：细轨道 + 强调色填充 ---- */
.demo-style-material-design .progress {
  padding: 10px 16px 0;
}
.demo-style-material-design .track {
  height: 3px;
  border-radius: 2px;
  background: #E0E0E0;
}
.demo-style-material-design .bar {
  height: 100%;
  border-radius: 2px;
  background: #FF4081; /* 强调色承担进行态 */
}
.demo-style-material-design .times {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 10px;
  letter-spacing: .02em;
  color: #757575;
}
/* ---- 控制层：中央粉色 FAB + 两侧扁平图标按钮 ---- */
.demo-style-material-design .controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px; /* 8dp 网格 */
  margin-top: 12px;
}
.demo-style-material-design .cbtn {
  -webkit-appearance: none;
  appearance: none;
  position: relative;
  display: grid;
  place-items: center;
  margin: 0;
  padding: 0;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  overflow: hidden; /* 把墨涟漪裁进纸片 */
}
.demo-style-material-design .prev,
.demo-style-material-design .next { /* 扁平按钮：无色圆，hover 才浮出 state layer */
  width: 36px;
  height: 36px;
  color: #757575;
  background: transparent;
  transition: background-color .2s cubic-bezier(.4, 0, .2, 1), color .2s cubic-bezier(.4, 0, .2, 1);
}
.demo-style-material-design .prev:hover,
.demo-style-material-design .next:hover {
  color: #3F51B5;
  background: rgba(63, 81, 181, .08);
}
.demo-style-material-design .play { /* FAB：全屏唯一主推操作，6dp 静止 */
  width: 48px;
  height: 48px;
  color: #ffffff;
  background: #FF4081; /* Pink A200 强调色 */
  box-shadow: 0 6px 10px rgba(0,0,0,.14), 0 1px 18px rgba(0,0,0,.12), 0 3px 5px -1px rgba(0,0,0,.20); /* 6dp */
  transition: box-shadow .28s cubic-bezier(.4, 0, .2, 1);
}
.demo-style-material-design .play:active {
  box-shadow: 0 12px 17px 2px rgba(0,0,0,.14), 0 5px 22px 4px rgba(0,0,0,.12), 0 7px 8px -4px rgba(0,0,0,.20); /* 按下抬到 12dp */
}
.demo-style-material-design .cbtn:focus-visible {
  outline: 2px solid #3F51B5;
  outline-offset: 2px;
}
.demo-style-material-design .play .i-pause { display: none; }
.demo-style-material-design .play.playing .i-play { display: none; }
.demo-style-material-design .play.playing .i-pause { display: block; }
/* ---- 墨涟漪：从触点荡开的物理反馈 ---- */
.demo-style-material-design .ripple {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  transform: scale(0);
  opacity: .26;
  animation: md-ink-ripple .55s cubic-bezier(.4, 0, .2, 1) forwards;
}
.demo-style-material-design .play .ripple { background: #ffffff; }
.demo-style-material-design .prev .ripple,
.demo-style-material-design .next .ripple { background: #3F51B5; }
@keyframes md-ink-ripple {
  to { transform: scale(1); opacity: 0; }
}
/* ---- 音量：Indigo 滑条 + 圆形 thumb ---- */
.demo-style-material-design .volume {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  padding: 0 16px 16px;
}
.demo-style-material-design .vicon {
  display: flex;
  flex: none;
  color: #757575;
}
.demo-style-material-design .vtrack {
  position: relative;
  flex: 1;
  height: 3px;
  border-radius: 2px;
  cursor: pointer;
  background: #E0E0E0;
}
.demo-style-material-design .vtrack::before { /* 扩大点击热区 */
  content: "";
  position: absolute;
  inset: -8px -4px;
}
.demo-style-material-design .vfill {
  position: relative;
  height: 100%;
  border-radius: 2px;
  background: #3F51B5; /* Indigo 500 主色 */
  transition: width .15s cubic-bezier(.4, 0, .2, 1);
}
.demo-style-material-design .vfill::after { /* slider thumb */
  content: "";
  position: absolute;
  right: -5px;
  top: 50%;
  width: 10px;
  height: 10px;
  margin-top: -5px;
  border-radius: 50%;
  background: #3F51B5;
  box-shadow: 0 1px 3px rgba(0,0,0,.3); /* thumb 的 2dp */
}
/* ---- 动效兜底 ---- */
@media (prefers-reduced-motion: reduce) {
  .demo-style-material-design .player,
  .demo-style-material-design .cbtn,
  .demo-style-material-design .vfill {
    transition: none;
  }
  .demo-style-material-design .ripple {
    display: none; /* 关闭涟漪动画 */
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const DURATION = 30; // 全程秒数
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  let playing = false;
  let progress = 31; // 与初始 width:31% 对应

  /* ---- 墨涟漪：在触点落一滴墨，荡满整个表面后淡出 ---- */
  function spawnRipple(btn, x, y) {
    if (reduced.matches) return;
    const r = btn.getBoundingClientRect();
    const d = Math.max(r.width, r.height) * 2.2;
    const rip = document.createElement('span');
    rip.className = 'ripple';
    rip.style.width = rip.style.height = d + 'px';
    rip.style.left = (x - r.left - d / 2) + 'px';
    rip.style.top = (y - r.top - d / 2) + 'px';
    btn.appendChild(rip);
    rip.addEventListener('animationend', function () { rip.remove(); });
  }
  [playBtn, prevBtn, nextBtn].forEach(function (btn) {
    btn.addEventListener('pointerdown', function (e) {
      spawnRipple(btn, e.clientX, e.clientY);
    });
    btn.addEventListener('click', function (e) {
      if (e.detail === 0) { // 键盘激活：涟漪从圆心荡开
        const r = btn.getBoundingClientRect();
        spawnRipple(btn, r.left + r.width / 2, r.top + r.height / 2);
      }
    });
  });

  function currentPercent() {
    const br = bar.getBoundingClientRect();
    const tr = bar.parentElement.getBoundingClientRect();
    return tr.width ? Math.min(100, (br.width / tr.width) * 100) : progress;
  }

  function updateIcon() {
    playBtn.classList.toggle('playing', playing);
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function freezeAt(p) {
    bar.style.transition = 'none';
    bar.style.width = p + '%';
    progress = p;
  }

  function animateTo(target) {
    if (reduced.matches) { // 减少动态效果：瞬移
      freezeAt(target);
      playing = false;
      updateIcon();
      return;
    }
    const remain = Math.max((target - progress) / 100 * DURATION, 0.05);
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
    void bar.offsetWidth; // 强制重排，让瞬移先生效
    bar.style.transition = 'width ' + remain + 's linear';
    bar.style.width = target + '%';
  }

  playBtn.addEventListener('click', function () {
    if (playing) {
      freezeAt(currentPercent()); // 暂停：保持当前进度
      playing = false;
    } else {
      if (progress >= 99.5) progress = 0; // 播完后再次播放从头开始
      playing = true;
      animateTo(100);
    }
    updateIcon();
  });

  bar.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'width' && playing && currentPercent() >= 99.5) {
      playing = false;
      progress = 100;
      updateIcon();
    }
  });

  function restart() { // prev/next：归零重播
    progress = 0;
    playing = true;
    animateTo(100);
    updateIcon();
  }
  prevBtn.addEventListener('click', restart);
  nextBtn.addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) { // 点击设置音量
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = Math.min(100, Math.max(0, ((e.clientX - r.left) / r.width) * 100));
    vfill.style.width = p + '%';
  });

  // 舞台自适应：首页卡片舞台较矮时整体等比缩小，保证不溢出
  const player = ROOT.querySelector('.player');
  function fit() {
    const host = ROOT.parentElement; // .fragment 容器
    if (!host || !player) return;
    player.style.transform = '';
    const availW = host.clientWidth, availH = host.clientHeight;
    const w = player.offsetWidth, h = player.offsetHeight;
    if (!w || !h || !availW || !availH) return;
    const s = Math.min(1, availW / w, availH / h);
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  requestAnimationFrame(fit);
  window.addEventListener('resize', fit);
})();
</script>
