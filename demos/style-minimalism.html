<div class="demo demo-style-minimalism">
  <div class="player">
    <div class="art"><span class="art-dot"></span></div>
    <div class="meta">
      <div class="title">Midnight Drive</div>
      <div class="artist">Neon Coast</div>
    </div>
    <div class="progress">
      <div class="track"><div class="bar"></div></div>
      <div class="times"><span>1:12</span><span>3:48</span></div>
    </div>
    <div class="controls">
      <button class="cbtn prev" type="button" aria-label="Previous">
        <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M6 5.5v13h1.8v-13H6zM18.6 5.5 9.9 12l8.7 6.5v-13z" fill="currentColor"/></svg>
      </button>
      <button class="cbtn play" type="button" aria-label="Play">
        <svg class="ic-play" viewBox="0 0 24 24" width="12" height="12" aria-hidden="true"><path d="M8.5 5.5 18.8 12l-10.3 6.5v-13z" fill="currentColor"/></svg>
        <svg class="ic-pause" viewBox="0 0 24 24" width="12" height="12" aria-hidden="true"><path d="M7.8 5.5h2.7v13H7.8zM13.5 5.5h2.7v13h-2.7z" fill="currentColor"/></svg>
      </button>
      <button class="cbtn next" type="button" aria-label="Next">
        <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M16.2 5.5H18v13h-1.8zM5.4 5.5 14.1 12l-8.7 6.5v-13z" fill="currentColor"/></svg>
      </button>
    </div>
    <div class="volume">
      <span class="vicon">
        <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true"><path d="M4 9.5v5h3.4l4.6 4v-13l-4.6 4H4z" fill="currentColor"/><path d="M15.2 9.2a3.8 3.8 0 0 1 0 5.6" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </span>
      <div class="vtrack"><div class="vfill"></div></div>
    </div>
  </div>
</div>
<style>
.demo-style-minimalism {
  width: 280px;
  max-width: 100%;
  background: #ffffff;
  border: 1px solid #ececec;
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  color: #111111;
  box-sizing: border-box;
}
.demo-style-minimalism *,
.demo-style-minimalism *::before,
.demo-style-minimalism *::after { box-sizing: border-box; }
.demo-style-minimalism .player {
  display: grid;
  grid-template-columns: 38px 1fr;
  column-gap: 13px;
  row-gap: 12px;
  padding: 17px 19px;
}
/* cover: one hairline square, one black circle — nothing else */
.demo-style-minimalism .art {
  grid-column: 1;
  grid-row: 1;
  width: 38px;
  height: 38px;
  border: 1px solid #e6e6e6;
  background: #ffffff;
  display: grid;
  place-items: center;
}
.demo-style-minimalism .art-dot {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: #111111;
}
.demo-style-minimalism .meta {
  grid-column: 2;
  grid-row: 1;
  align-self: center;
  min-width: 0;
}
/* the one loud element: oversized, light, tightly tracked */
.demo-style-minimalism .title {
  font-size: 21px;
  font-weight: 300;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: #111111;
  white-space: nowrap;
}
.demo-style-minimalism .artist {
  margin-top: 5px;
  font-size: 9px;
  font-weight: 500;
  line-height: 1.3;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: #737373;
}
.demo-style-minimalism .progress {
  grid-column: 1 / -1;
  grid-row: 2;
}
.demo-style-minimalism .track {
  height: 2px;
  background: #ededed;
}
.demo-style-minimalism .bar {
  height: 100%;
  width: 31%;
  background: #111111;
}
.demo-style-minimalism .times {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace);
  font-size: 9px;
  line-height: 1.3;
  letter-spacing: 0.04em;
  color: #737373;
}
/* margin:0 also cancels the site's global .controls { margin-top:32px } leak */
.demo-style-minimalism .controls {
  grid-column: 1 / -1;
  grid-row: 3;
  display: flex;
  flex-wrap: nowrap;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin: 0;
}
.demo-style-minimalism .cbtn {
  margin: 0;
  padding: 0;
  border: 0;
  background: none;
  font-family: inherit;
  color: #111111;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: opacity 150ms ease;
}
.demo-style-minimalism .cbtn:hover { opacity: 0.42; }
.demo-style-minimalism .cbtn:focus-visible {
  outline: 1px solid #111111;
  outline-offset: 3px;
}
.demo-style-minimalism .prev,
.demo-style-minimalism .next { width: 26px; height: 26px; }
/* the single primary action gets the only filled shape */
.demo-style-minimalism .play {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #111111;
  color: #ffffff;
}
.demo-style-minimalism .play:hover { opacity: 0.72; }
.demo-style-minimalism .play .ic-pause { display: none; }
.demo-style-minimalism.is-playing .play .ic-play { display: none; }
.demo-style-minimalism.is-playing .play .ic-pause { display: block; }
.demo-style-minimalism .volume {
  grid-column: 1 / -1;
  grid-row: 4;
  display: flex;
  align-items: center;
  gap: 10px;
}
.demo-style-minimalism .vicon {
  display: grid;
  place-items: center;
  color: #6b6b6b;
}
/* 12px-tall click target, hairline drawn via ::before so the fill can overlay it */
.demo-style-minimalism .vtrack {
  position: relative;
  flex: 1;
  height: 12px;
  cursor: pointer;
}
.demo-style-minimalism .vtrack::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 5px;
  height: 2px;
  background: #ededed;
}
.demo-style-minimalism .vfill {
  position: absolute;
  left: 0;
  top: 5px;
  height: 2px;
  width: 70%;
  background: #6b6b6b;
}
@media (prefers-reduced-motion: reduce) {
  .demo-style-minimalism .cbtn { transition: none; }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let p = 0.31;                 /* matches the static 31% bar / 1:12 of 3:48 */
  let playing = false;
  let rafId = 0;
  let lastT = 0;
  const RATE = (1 - 0.31) / 30000;  /* 31% -> 100% in about 30s, per ms */

  function render() {
    bar.style.width = (p * 100).toFixed(2) + '%';
  }

  function setPlaying(on) {
    playing = on;
    ROOT.classList.toggle('is-playing', on);
    playBtn.setAttribute('aria-label', on ? 'Pause' : 'Play');
  }

  function tick(t) {
    if (!playing) return;
    if (lastT) {
      p += (reduced ? 1 : (t - lastT) * RATE);
      if (p >= 1) { p = 1; render(); setPlaying(false); return; }
      render();
    }
    lastT = t;
    rafId = requestAnimationFrame(tick);
  }

  function start() {
    if (playing) return;
    if (p >= 1) p = 0;
    setPlaying(true);
    lastT = 0;
    rafId = requestAnimationFrame(tick);
  }

  function stop() {
    setPlaying(false);
    cancelAnimationFrame(rafId);
  }

  playBtn.addEventListener('click', function () {
    if (playing) { stop(); } else { start(); }
  });

  function replay() {
    p = 0;
    render();
    start();
  }
  prevBtn.addEventListener('click', replay);
  nextBtn.addEventListener('click', replay);

  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    const v = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
    vfill.style.width = (v * 100).toFixed(1) + '%';
  });

  render();
})();
</script>
