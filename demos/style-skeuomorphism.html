<style>
.demo-style-skeuomorphism {
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  max-width: 100%;
}
/* --- 机身：拉丝铝外壳（iTunes MiniPlayer / iOS 6 时代） --- */
.demo-style-skeuomorphism .player {
  position: relative;
  width: 284px;
  max-width: 100%;
  box-sizing: border-box;
  padding: 13px 14px;
  border-radius: 16px;
  border: 1px solid #8f8f96;
  display: grid;
  grid-template-columns: 82px 1fr;
  column-gap: 13px;
  row-gap: 8px;
  align-content: center;
  background:
    /* 拉丝：细密水平丝纹 */
    repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 1px, rgba(0,0,0,.04) 1px 2px, transparent 2px 3px),
    /* 顶光金属渐变 */
    linear-gradient(180deg, #f2f2f4 0%, #d7d7db 34%, #b8b8be 72%, #cfcfd4 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.95),
    inset 0 -1px 0 rgba(0,0,0,.22),
    0 12px 24px rgba(20,20,30,.32),
    0 2px 6px rgba(20,20,30,.22);
}
/* 机身边缘斜面反光 */
.demo-style-skeuomorphism .player::before {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 14px;
  border-top: 1px solid rgba(255,255,255,.8);
  border-bottom: 1px solid rgba(0,0,0,.12);
  pointer-events: none;
}
/* --- 封面：缝线皮革贴片 + 铆钉 + 黑胶 --- */

  position: relative;
  grid-row: 1 / 5;
  align-self: center;
  width: 82px;
  height: 82px;
  border-radius: 9px;
  display: grid;
  place-items: center;
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,.025) 0 2px, rgba(0,0,0,.03) 2px 4px),
    radial-gradient(circle at 32% 26%, rgba(255,255,255,.14), transparent 55%),
    linear-gradient(160deg, #8a5a33 0%, #6d4526 48%, #54331b 100%);
  box-shadow:
    inset 0 2px 5px rgba(0,0,0,.55),
    inset 0 -1px 2px rgba(255,255,255,.15),
    0 1px 0 rgba(255,255,255,.75);
}
/* 缝线（虚线仿双针脚） */
.demo-style-skeuomorphism .art::after {
  content: "";
  position: absolute;
  inset: 5px;
  border-radius: 6px;
  border: 1.5px dashed rgba(240,214,170,.55);
  box-shadow: 0 1px 0 rgba(0,0,0,.35), inset 0 1px 0 rgba(0,0,0,.25);
  pointer-events: none;
}
.demo-style-skeuomorphism .reel {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  box-shadow: 0 3px 7px rgba(0,0,0,.6), inset 0 1px 1px rgba(255,255,255,.25);
}
.demo-style-skeuomorphism .rivet {

  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: radial-gradient(circle at 34% 30%, #fbfbfb 0%, #b9b9c0 45%, #6f6f77 100%);
  box-shadow: 0 1px 2px rgba(0,0,0,.55), inset 0 -1px 1px rgba(0,0,0,.35);

.demo-style-skeuomorphism .r-tl { top: 2px; left: 2px; }
.demo-style-skeuomorphism .r-tr { top: 2px; right: 2px; }
.demo-style-skeuomorphism .r-bl { bottom: 2px; left: 2px; }
.demo-style-skeuomorphism .r-br { bottom: 2px; right: 2px; }
/* --- 文字：金属上的 letterpress 凹刻 --- */

.demo-style-skeuomorphism .title {

  font-weight: 700;
  color: #34343a;

/* --- 按钮：凝胶塑料键，凸起可按压 --- */

  box-shadow:

.demo-style-skeuomorphism .cbtn svg {

.demo-style-skeuomorphism .cbtn.play {

}
.demo-style-skeuomorphism .cbtn.play svg { width: 19px; height: 19px; }
.demo-style-skeuomorphism .cbtn:active,
.demo-style-skeuomorphism .cbtn.play[aria-pressed="true"] {
  background:
    radial-gradient(circle at 50% 70%, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 50%),
    linear-gradient(180deg, #a9a9b0 0%, #c6c6cc 52%, #dcdce0 100%);
  box-shadow:
    inset 0 3px 6px rgba(0,0,0,.32),

.demo-style-skeuomorphism .cbtn.play[aria-pressed="true"] {
  background:
    radial-gradient(circle at 50% 70%, rgba(255,255,255,.3) 0%, rgba(255,255,255,0) 50%),

.demo-style-skeuomorphism .cbtn:focus-visible {
  outline: none;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.95),

    0 3px 5px rgba(20,20,30,.35);
}
.demo-style-skeuomorphism .ic-pause { display: none; }
.demo-style-skeuomorphism .play[aria-pressed="true"] .ic-play { display: none; }
.demo-style-skeuomorphism .play[aria-pressed="true"] .ic-pause { display: block; }
/* --- 音量：内凹轨道 + 金属滑帽 --- */
.demo-style-skeuomorphism .volume {
  align-self: start;
  display: flex;
  align-items: center;
  gap: 8px;
}
.demo-style-skeuomorphism .vicon {
  display: grid;

}
.demo-style-skeuomorphism .vicon svg { width: 14px; height: 14px; }
.demo-style-skeuomorphism .vtrack {

.demo-style-skeuomorphism .vfill {

.demo-style-skeuomorphism .vknob {

  right: -9px;

  background:

@media (prefers-reduced-motion: reduce) {

<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const play = ROOT.querySelector('.play');
  const prev = ROOT.querySelector('.prev');
  const next = ROOT.querySelector('.next');
  const bar = ROOT.querySelector('.bar');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  if (!play || !bar || !vtrack || !vfill) return;

  const DURATION = 30000; /* 31% -> 100% 约 30s */
  const START = 31;
  const RATE = (100 - START) / DURATION; /* 每毫秒推进的百分比 */
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let playing = false;
  let shown = START;   /* 当前显示的百分比 */
  let fromP = START;   /* 本次动画起点百分比 */
  let t0 = 0;          /* 本次动画起始时刻 */
  let raf = 0;

  function render(p) {
    shown = p;
    bar.style.width = p + '%';
  }
  function stop() {
    playing = false;
    cancelAnimationFrame(raf);
    play.setAttribute('aria-pressed', 'false');
    play.setAttribute('aria-label', 'Play');
  }
  function frame(now) {
    if (!playing) return;
    if (!t0) t0 = now;
    const p = Math.min(100, fromP + (now - t0) * RATE);
    render(p);
    if (p < 100 && playing) {
      raf = requestAnimationFrame(frame);
    } else {
      stop();
    }
  }
  function start() {
    if (shown >= 100) render(START);
    playing = true;
    fromP = shown;
    t0 = 0;
    play.setAttribute('aria-pressed', 'true');
    play.setAttribute('aria-label', 'Pause');
    if (reduced) { render(100); stop(); return; }
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(frame);
  }
  function restart() {
    cancelAnimationFrame(raf);
    render(0);
    start();
  }

  play.addEventListener('click', function () {
    if (playing) { stop(); } else { start(); }
  });
  if (prev) prev.addEventListener('click', restart);
  if (next) next.addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    const pct = Math.max(0, Math.min(100, (e.clientX - r.left) / r.width * 100));
    vfill.style.width = pct + '%';
  });
})();
</script>
