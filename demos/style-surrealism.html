<style>
/* ===== Surrealism —— dream canvas, melting clock, floating eye, soft lunar gradient ===== */
.demo-style-surrealism {
  font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  max-width: 100%;
}
.demo-style-surrealism .player {
  position: relative;
  width: 280px;
  max-width: 100%;
  margin: 0 auto;
  overflow: hidden;
  /* melting organic blob for the card */
  border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
  background: rgba(245, 240, 230, .92);
  box-shadow:
    0 18px 40px rgba(45, 36, 56, .25),
    0 4px 12px rgba(45, 36, 56, .12),
    inset 0 0 0 1px rgba(255, 255, 255, .35);
  color: #2d2438;
}
/* ---- 封面：柔渐变天空 + 漂浮眼睛 + 融化时钟 ---- */
.demo-style-surrealism .art {
  position: relative;
  height: 124px;
  overflow: hidden;
}
.demo-style-surrealism .sky {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, #c8b6e2 0%, #f4c7b0 45%, #a8d5e5 100%);
}
.demo-style-surrealism .cloud {
  position: absolute;
  background: rgba(255, 255, 255, .72);
  border-radius: 50%;
  filter: blur(1px);
}
.demo-style-surrealism .cloud-1 {
  width: 56px;
  height: 28px;
  left: 18%;
  top: 26%;
  animation: surreal-float 8s ease-in-out infinite;
}
.demo-style-surrealism .cloud-2 {
  width: 42px;
  height: 22px;
  right: 16%;
  top: 48%;
  animation: surreal-float 9s ease-in-out infinite 1.5s;
}
.demo-style-surrealism .cloud::after {
  content: "";
  position: absolute;
  background: rgba(255, 255, 255, .62);
  border-radius: 50%;
}
.demo-style-surrealism .cloud-1::after { width: 34px; height: 34px; left: 10px; top: -12px; }
.demo-style-surrealism .cloud-2::after { width: 26px; height: 26px; left: 8px; top: -10px; }
.demo-style-surrealism .eye {
  position: absolute;
  right: 18%;
  top: 18%;
  width: 44px;
  height: 28px;
  filter: drop-shadow(0 8px 12px rgba(45, 36, 56, .2));
  animation: surreal-float 7s ease-in-out infinite .8s;
}
.demo-style-surrealism .eye-white { fill: #f5f0e6; }
.demo-style-surrealism .eye-iris { fill: #6b5b7a; }
.demo-style-surrealism .eye-pupil { fill: #2d2438; }
.demo-style-surrealism .eye-glint { fill: #ffffff; opacity: .9; }
.demo-style-surrealism .clock {
  position: absolute;
  left: 12%;
  bottom: 4px;
  width: 58px;
  height: 72px;
  filter: drop-shadow(0 10px 14px rgba(45, 36, 56, .22));
  animation: surreal-drip 10s ease-in-out infinite;
}
.demo-style-surrealism .clock-body { fill: #d4af37; }
.demo-style-surrealism .clock-face { fill: #f5f0e6; }
.demo-style-surrealism .clock-hand { stroke: #2d2438; stroke-width: 2.2; stroke-linecap: round; fill: none; }
.demo-style-surrealism .clock-drip { fill: #d4af37; }
.demo-style-surrealism .moon {
  position: absolute;
  right: 10%;
  bottom: 10%;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #f5f0e6;
  box-shadow: 0 0 18px 4px rgba(245, 240, 230, .5);
  animation: surreal-pulse 8s ease-in-out infinite;
}
@keyframes surreal-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-9px); }
}
@keyframes surreal-drip {
  0%, 100% { transform: translateY(0) scaleY(1); }
  50% { transform: translateY(5px) scaleY(1.04); }
}
@keyframes surreal-pulse {
  0%, 100% { opacity: .8; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
}
/* ---- 文字：放在雾 Cream 面板上，保证可读 ---- */
.demo-style-surrealism .meta {
  padding: 12px 22px 2px;
  text-align: center;
}
.demo-style-surrealism .title {
  font-size: 13.5px;
  font-weight: 650;
  letter-spacing: .02em;
  color: #2d2438;
}
.demo-style-surrealism .artist {
  margin-top: 2px;
  font-size: 11px;
  font-weight: 450;
  color: #6b5b7a;
}
/* ---- 进度：有机胶囊轨道 ---- */
.demo-style-surrealism .progress {
  padding: 8px 22px 0;
}
.demo-style-surrealism .track {
  position: relative;
  height: 9px;
  border-radius: 999px;
  background: rgba(107, 91, 122, .18);
  box-shadow: inset 0 1px 2px rgba(45, 36, 56, .15);
  overflow: hidden;
}
.demo-style-surrealism .bar {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #c8b6e2 0%, #d4af37 100%);
  box-shadow: 0 0 10px rgba(212, 175, 55, .35);
}
.demo-style-surrealism .times {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace);
  font-size: 9.5px;
  font-weight: 500;
  color: #6b5b7a;
}
/* ---- 控制层：像软蜡一样、有机圆角的按钮 ---- */
.demo-style-surrealism .controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 11px;
}
.demo-style-surrealism .cbtn {
  -webkit-appearance: none;
  appearance: none;
  position: relative;
  display: grid;
  place-items: center;
  margin: 0;
  padding: 0;
  cursor: pointer;
  color: #2d2438;
  border: 1px solid rgba(107, 91, 122, .35);
  background: rgba(245, 240, 230, .9);
  box-shadow: 0 8px 18px rgba(45, 36, 56, .16);
  transition: transform .35s cubic-bezier(.34, 1.56, .64, 1),
    box-shadow .3s ease, background .3s ease;
}
.demo-style-surrealism .prev,
.demo-style-surrealism .next {
  width: 34px;
  height: 34px;
  border-radius: 45% 55% 60% 40% / 50% 45% 55% 50%;
}
.demo-style-surrealism .play {
  width: 48px;
  height: 48px;
  border-radius: 55% 45% 50% 60% / 55% 60% 40% 50%;
}
.demo-style-surrealism .cbtn:hover {
  transform: scale(1.06);
  background: #ffffff;
}
.demo-style-surrealism .cbtn:active {
  transform: scale(.96);
  box-shadow: 0 3px 8px rgba(45, 36, 56, .12);
}
.demo-style-surrealism .cbtn:focus-visible {
  outline: 2px solid #6b5b7a;
  outline-offset: 2px;
}
.demo-style-surrealism .play .i-pause { display: none; }
.demo-style-surrealism .play.playing .i-play { display: none; }
.demo-style-surrealism .play.playing .i-pause { display: block; }
/* ---- 音量：同风格胶囊滑条 ---- */
.demo-style-surrealism .volume {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 11px;
  padding: 0 22px 16px;
}
.demo-style-surrealism .vicon {
  display: flex;
  flex: none;
  color: #6b5b7a;
}
.demo-style-surrealism .vtrack {
  position: relative;
  flex: 1;
  height: 8px;
  border-radius: 999px;
  cursor: pointer;
  background: rgba(107, 91, 122, .18);
  box-shadow: inset 0 1px 2px rgba(45, 36, 56, .15);
  overflow: hidden;
}
.demo-style-surrealism .vtrack::before {
  content: "";
  position: absolute;
  inset: -7px -3px;
}
.demo-style-surrealism .vfill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #c8b6e2 0%, #d4af37 100%);
  box-shadow: 0 0 8px rgba(212, 175, 55, .3);
}
/* ---- 动效与透明度兜底 ---- */
@media (prefers-reduced-motion: reduce) {
  .demo-style-surrealism .cloud,
  .demo-style-surrealism .eye,
  .demo-style-surrealism .clock,
  .demo-style-surrealism .moon {
    animation: none;
  }
  .demo-style-surrealism .cbtn {
    transition: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const DURATION = 30;
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  let playing = false;
  let progress = 31;

  function currentPercent() {
    const br = bar.getBoundingClientRect();
    const tr = bar.parentElement.getBoundingClientRect();
    return tr.width ? Math.min(100, (br.width / tr.width) * 100) : progress;
  }

  function updateIcon() {
    playBtn.classList.toggle('playing', playing);
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function freezeAt(p) {
    bar.style.transition = 'none';
    bar.style.width = p + '%';
    progress = p;
  }

  function animateTo(target) {
    if (reduced.matches) {
      freezeAt(target);
      playing = false;
      updateIcon();
      return;
    }
    const remain = Math.max((target - progress) / 100 * DURATION, 0.05);
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
    void bar.offsetWidth;
    bar.style.transition = 'width ' + remain + 's linear';
    bar.style.width = target + '%';
  }

  playBtn.addEventListener('click', function () {
    if (playing) {
      freezeAt(currentPercent());
      playing = false;
    } else {
      if (progress >= 99.5) progress = 0;
      playing = true;
      animateTo(100);
    }
    updateIcon();
  });

  bar.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'width' && playing && currentPercent() >= 99.5) {
      playing = false;
      progress = 100;
      updateIcon();
    }
  });

  function restart() {
    progress = 0;
    playing = true;
    animateTo(100);
    updateIcon();
  }
  prevBtn.addEventListener('click', restart);
  nextBtn.addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = Math.min(100, Math.max(0, ((e.clientX - r.left) / r.width) * 100));
    vfill.style.width = p + '%';
  });

  // 舞台自适应：首页卡片舞台较矮时整体等比缩小，保证不溢出
  const player = ROOT.querySelector('.player');
  function fit() {
    const host = ROOT.parentElement;
    if (!host || !player) return;
    player.style.transform = '';
    const availW = host.clientWidth, availH = host.clientHeight;
    const w = player.offsetWidth, h = player.offsetHeight;
    if (!w || !h || !availW || !availH) return;
    const s = Math.min(1, availW / w, availH / h);
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  requestAnimationFrame(fit);
  window.addEventListener('resize', fit);
})();
</script>
