<div class="demo demo-style-terminal-hacker">
  <div class="player">
    <div class="art">
      <div class="abox">+[ AUDIO.VIZ ]----------------+</div>
      <div class="boot">| &gt; MOUNT /dev/audio ..... OK</div>
      <div class="viz vl1">| ▁▂▃▂▁▂▃▄▃▂▁▂▃▄▃▂▁▁▂▃▂▁▂▃▄</div>
      <div class="viz vl2">| ▁▁▂▁▁▁▂▃▂▁▁▁▂▃▂▁▁▁▂▁▁▁▂▃</div>
      <div class="abox">+------------------------------+</div>
    </div>
    <div class="meta">
      <div class="title">Midnight Drive</div>
      <div class="artist">Neon Coast</div>
    </div>
    <div class="progress">
      <div class="track"><div class="bar" style="width:31%"></div></div>
      <div class="times"><span>1:12</span><span>3:48</span></div>
    </div>
    <div class="controls">
      <button class="cbtn prev" type="button" aria-label="Previous"><span aria-hidden="true">|&lt;&lt;</span></button>
      <button class="cbtn play" type="button" aria-label="Play"><span class="i-play" aria-hidden="true">&gt;</span><span class="i-pause" aria-hidden="true">||</span></button>
      <button class="cbtn next" type="button" aria-label="Next"><span aria-hidden="true">&gt;&gt;|</span></button>
    </div>
    <div class="volume">
      <span class="vicon">VOL</span>
      <div class="vtrack"><div class="vfill" style="width:70%"></div></div>
    </div>
  </div>
</div>
<style>
/* ===== Terminal Hacker —— 黑底磷光单色 + 辉光 + 扫描线 + 方块光标 ===== */
.demo-style-terminal-hacker {
  font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace);
  max-width: 100%;
}
.demo-style-terminal-hacker .player {
  position: relative;
  width: 280px;
  max-width: 100%;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 2px; /* CRT 没有圆角 */
  border: 1px solid rgba(0, 255, 65, .4);
  background: #050805; /* 纯黑显像管底 */
  box-shadow:
    0 0 24px rgba(0, 255, 65, .14),
    inset 0 0 60px rgba(0, 255, 65, .05);
}
/* ---- CRT 覆盖层：扫描线 + 边缘暗角 + 偶发闪烁（永远在最前） ---- */
.demo-style-terminal-hacker .player::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 6;
  pointer-events: none;
  background:
    radial-gradient(130% 100% at 50% 50%, transparent 58%, rgba(0, 0, 0, .55) 100%),
    repeating-linear-gradient(0deg, rgba(0, 0, 0, .3) 0 1px, transparent 1px 3px);
  animation: crt-flick-th 5s steps(1) infinite;
}
@keyframes crt-flick-th {
  0%, 90.9%, 94%, 100% { opacity: 1; }
  92% { opacity: .8; }
  93% { opacity: .95; }
}
/* ---- 封面：ASCII 终端窗口（框线 + boot 行 + 字符波形） ---- */
.demo-style-terminal-hacker .art {
  height: 96px;
  padding: 9px 12px 0;
  overflow: hidden;
  font-size: 10px;
  line-height: 1.55;
  letter-spacing: .04em;
  color: rgba(0, 255, 65, .85);
  text-shadow: 0 0 6px rgba(0, 255, 65, .5), 0 0 16px rgba(0, 255, 65, .2);
  border-bottom: 1px solid rgba(0, 255, 65, .28);
}
.demo-style-terminal-hacker .art > div {
  white-space: pre; /* 只给行内文本保留空格，避免父级 pre 吞掉元素间换行 */
}
.demo-style-terminal-hacker .abox {
  color: rgba(0, 255, 65, .45); /* 暗磷光框线 */
}
.demo-style-terminal-hacker .boot {
  color: rgba(0, 255, 65, .65);
}
.demo-style-terminal-hacker .vl1 {
  color: #00ff41; /* 主波形全亮磷光 */
}
.demo-style-terminal-hacker .vl2 {
  color: rgba(0, 255, 65, .5); /* 镜像衰减 */
}
/* ---- 文字：命令行提示符 + 全大写系统日志口吻 ---- */
.demo-style-terminal-hacker .meta {
  padding: 9px 14px 0;
}
.demo-style-terminal-hacker .title {
  font-size: 12.5px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  white-space: nowrap;
  color: #00ff41;
  text-shadow: 0 0 6px rgba(0, 255, 65, .6), 0 0 20px rgba(0, 255, 65, .25);
}
.demo-style-terminal-hacker .title::before {
  content: "> "; /* shell 提示符 */
  color: rgba(0, 255, 65, .65);
}
.demo-style-terminal-hacker .title::after {
  content: "█"; /* 硬闪烁方块光标，steps(1) 不淡变 */
  margin-left: 2px;
  animation: blink-th 1.1s steps(1) infinite;
}
@keyframes blink-th {
  50% { opacity: 0; }
}
.demo-style-terminal-hacker .artist {
  margin-top: 2px;
  font-size: 10.5px;
  letter-spacing: .1em;
  text-transform: uppercase;
  white-space: nowrap;
  color: rgba(0, 255, 65, .6);
  text-shadow: 0 0 5px rgba(0, 255, 65, .4);
}
.demo-style-terminal-hacker .artist::before {
  content: ":: ";
}
/* ---- 进度：字符格轨道 [████░░░░] ---- */
.demo-style-terminal-hacker .progress {
  padding: 10px 14px 0;
}
.demo-style-terminal-hacker .track {
  position: relative;
  height: 10px;
  border: 1px solid rgba(0, 255, 65, .4);
  background: repeating-linear-gradient(90deg, rgba(0, 255, 65, .16) 0 4px, transparent 4px 7px); /* 空槽字符格 */
}
.demo-style-terminal-hacker .bar {
  height: 100%;
  background: repeating-linear-gradient(90deg, #00ff41 0 4px, transparent 4px 7px); /* 实心块 ████ */
  box-shadow: 0 0 8px rgba(0, 255, 65, .6), 0 0 3px rgba(0, 255, 65, .8);
}
.demo-style-terminal-hacker .times {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-size: 9.5px;
  letter-spacing: .06em;
  color: rgba(0, 255, 65, .55);
  text-shadow: 0 0 4px rgba(0, 255, 65, .35);
}
.demo-style-terminal-hacker .times span::before { content: "["; }
.demo-style-terminal-hacker .times span::after { content: "]"; }
/* ---- 控制：ASCII 按钮，按下反色 ---- */
.demo-style-terminal-hacker .controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 11px;
}
.demo-style-terminal-hacker .cbtn {
  -webkit-appearance: none;
  appearance: none;
  display: grid;
  place-items: center;
  margin: 0;
  padding: 0;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .05em;
  color: #00ff41;
  background: transparent;
  border: 1px solid rgba(0, 255, 65, .55);
  border-radius: 0;
  text-shadow: 0 0 6px rgba(0, 255, 65, .6);
  box-shadow: inset 0 0 8px rgba(0, 255, 65, .08);
  transition: background .12s steps(2), color .12s steps(2);
}
.demo-style-terminal-hacker .prev,
.demo-style-terminal-hacker .next {
  width: 40px;
  height: 26px;
  font-size: 10.5px;
}
.demo-style-terminal-hacker .play {
  width: 46px;
  height: 32px;
  font-size: 13px;
}
.demo-style-terminal-hacker .cbtn:hover {
  background: rgba(0, 255, 65, .14);
  box-shadow: inset 0 0 10px rgba(0, 255, 65, .18), 0 0 10px rgba(0, 255, 65, .35);
}
.demo-style-terminal-hacker .cbtn:active {
  background: #00ff41; /* 反色 = 磷光打满 */
  color: #050805;
  text-shadow: none;
}
.demo-style-terminal-hacker .cbtn:focus-visible {
  outline: 1px dashed #00ff41;
  outline-offset: 2px;
}
.demo-style-terminal-hacker .play .i-pause { display: none; }
.demo-style-terminal-hacker .play.playing .i-play { display: none; }
.demo-style-terminal-hacker .play.playing .i-pause { display: block; }
/* ---- 音量：VOL 标签 + 字符格滑条 ---- */
.demo-style-terminal-hacker .volume {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-top: 12px;
  padding: 0 14px 14px;
}
.demo-style-terminal-hacker .vicon {
  flex: none;
  font-size: 9.5px;
  letter-spacing: .12em;
  color: rgba(0, 255, 65, .6);
  text-shadow: 0 0 4px rgba(0, 255, 65, .35);
}
.demo-style-terminal-hacker .vtrack {
  position: relative;
  flex: 1;
  height: 10px;
  cursor: pointer;
  border: 1px solid rgba(0, 255, 65, .4);
  background: repeating-linear-gradient(90deg, rgba(0, 255, 65, .16) 0 4px, transparent 4px 7px);
}
.demo-style-terminal-hacker .vtrack::before { /* 扩大点击热区 */
  content: "";
  position: absolute;
  inset: -7px -3px;
}
.demo-style-terminal-hacker .vfill {
  height: 100%;
  background: repeating-linear-gradient(90deg, #00ff41 0 4px, transparent 4px 7px);
  box-shadow: 0 0 8px rgba(0, 255, 65, .55);
}
/* ---- 动效兜底：关闪烁/光标闪，波形与打字机由 JS 侧判断 ---- */
@media (prefers-reduced-motion: reduce) {
  .demo-style-terminal-hacker .player::after {
    animation: none;
  }
  .demo-style-terminal-hacker .title::after {
    animation: none;
  }
  .demo-style-terminal-hacker .cbtn {
    transition: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const prevBtn = ROOT.querySelector('.prev');
  const nextBtn = ROOT.querySelector('.next');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  const titleEl = ROOT.querySelector('.title');
  const artistEl = ROOT.querySelector('.artist');
  const bootEl = ROOT.querySelector('.boot');
  const viz1 = ROOT.querySelector('.vl1');
  const viz2 = ROOT.querySelector('.vl2');
  const DURATION = 30; // 全程秒数
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');
  const BARS = '▁▂▃▄▅▆▇█';
  const COLS = 26;

  let playing = false;
  let progress = 31; // 与初始 width:31% 对应

  /* ---------- 播放进度（与其他风格标本同一套行为） ---------- */
  function currentPercent() {
    const br = bar.getBoundingClientRect();
    const tr = bar.parentElement.getBoundingClientRect();
    return tr.width ? Math.min(100, (br.width / tr.width) * 100) : progress;
  }

  function updateIcon() {
    playBtn.classList.toggle('playing', playing);
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function freezeAt(p) {
    bar.style.transition = 'none';
    bar.style.width = p + '%';
    progress = p;
  }

  function animateTo(target) {
    if (reduced.matches) { // 减少动态效果：瞬移
      freezeAt(target);
      playing = false;
      updateIcon();
      return;
    }
    const remain = Math.max((target - progress) / 100 * DURATION, 0.05);
    bar.style.transition = 'none';
    bar.style.width = progress + '%';
    void bar.offsetWidth; // 强制重排，让瞬移先生效
    bar.style.transition = 'width ' + remain + 's linear';
    bar.style.width = target + '%';
  }

  playBtn.addEventListener('click', function () {
    if (playing) {
      freezeAt(currentPercent()); // 暂停：保持当前进度
      playing = false;
    } else {
      if (progress >= 99.5) progress = 0; // 播完后再次播放从头开始
      playing = true;
      animateTo(100);
    }
    updateIcon();
  });

  bar.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'width' && playing && currentPercent() >= 99.5) {
      playing = false;
      progress = 100;
      updateIcon();
    }
  });

  function restart() { // prev/next：归零重播
    progress = 0;
    playing = true;
    animateTo(100);
    updateIcon();
  }
  prevBtn.addEventListener('click', restart);
  nextBtn.addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) { // 点击设置音量：吸附到字符格
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = Math.min(100, Math.max(0, ((e.clientX - r.left) / r.width) * 100));
    vfill.style.width = (Math.round(p / 10) * 10) + '%';
  });

  /* ---------- boot 行 + 歌名/歌手的打字机揭示（最终文本与 DOM 原文一致） ---------- */
  const titleText = titleEl.textContent;
  const artistText = artistEl.textContent;
  const bootText = bootEl.textContent;

  function typeInto(el, text, cps, done) {
    el.textContent = '';
    let i = 0;
    const t = setInterval(function () {
      i++;
      el.textContent = text.slice(0, i);
      if (i >= text.length) {
        clearInterval(t);
        if (done) done();
      }
    }, cps);
  }

  if (reduced.matches) { // 减少动态效果：直接给出完整文本
    bootEl.textContent = bootText;
    titleEl.textContent = titleText;
    artistEl.textContent = artistText;
  } else {
    artistEl.textContent = '';
    typeInto(bootEl, bootText, 14, function () {
      typeInto(titleEl, titleText, 55, function () {
        typeInto(artistEl, artistText, 40, null);
      });
    });
  }

  /* ---------- ASCII 波形：播放时跳动，暂停时回落到低位静止 ---------- */
  function drawViz(amp) {
    let l1 = '| ', l2 = '| ';
    for (let c = 0; c < COLS; c++) {
      const h = Math.floor(Math.random() * (amp + 1));
      l1 += BARS[h];
      l2 += BARS[Math.floor(h * 0.45)];
    }
    viz1.textContent = l1;
    viz2.textContent = l2;
  }

  if (reduced.matches) {
    drawViz(3); // 静态图案，不启动定时器
  } else {
    drawViz(4); // 初始待机波形，比暂停态(1)更有起伏
    setInterval(function () {
      drawViz(playing ? 7 : 1);
    }, 130);
  }

  /* ---------- 舞台自适应：首页卡片舞台较矮时整体等比缩小，保证不溢出 ---------- */
  const player = ROOT.querySelector('.player');
  function fit() {
    const host = ROOT.parentElement; // .fragment 容器
    if (!host || !player) return;
    player.style.transform = '';
    const availW = host.clientWidth, availH = host.clientHeight;
    const w = player.offsetWidth, h = player.offsetHeight;
    if (!w || !h || !availW || !availH) return;
    const s = Math.min(1, availW / w, availH / h);
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  requestAnimationFrame(fit);
  window.addEventListener('resize', fit);
})();
</script>
