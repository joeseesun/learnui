.demo-style-vaporwave .player.is-playing .grid { animation: vw-scroll 1.1s linear infinite; }

<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const player = ROOT.querySelector('.player');
  const playBtn = ROOT.querySelector('.play');
  const bar = ROOT.querySelector('.bar');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');

  const INITIAL = 31;
  const RATE = (100 - INITIAL) / 30000; /* 31% -> 100% 约 30s */
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  let progress = INITIAL;
  let playing = false;
  let raf = 0;
  let last = 0;

  function render() {
    bar.style.width = progress + '%';
  }

  function tick(now) {
    if (!playing) return;
    if (last) progress = Math.min(100, progress + (now - last) * RATE);
    last = now;
    render();
    if (progress >= 100) {
      setPlaying(false);
      return;
    }
    raf = requestAnimationFrame(tick);
  }

  function setPlaying(on) {
    cancelAnimationFrame(raf);
    last = 0;
    playing = on;
    player.classList.toggle('is-playing', on);
    playBtn.setAttribute('aria-label', on ? 'Pause' : 'Play');
    playBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
    if (on) {
      if (reduced.matches) { /* 减少动态效果：瞬移到结尾并停住 */
        progress = 100;
        render();
        playing = false;
        player.classList.remove('is-playing');
        playBtn.setAttribute('aria-label', 'Play');
        playBtn.setAttribute('aria-pressed', 'false');
        return;
      }
      if (progress >= 100) progress = 0;
      render();
      raf = requestAnimationFrame(tick);
    }
  }

  playBtn.addEventListener('click', function () { setPlaying(!playing); });

  function restart() { /* prev/next：归零重播 */
    progress = 0;
    render();
    last = 0;
    if (playing) {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(tick);
    }
  }
  ROOT.querySelector('.prev').addEventListener('click', restart);
  ROOT.querySelector('.next').addEventListener('click', restart);

  vtrack.addEventListener('click', function (e) { /* 点击设置音量 */
    const r = vtrack.getBoundingClientRect();
    if (!r.width) return;
    const p = Math.min(100, Math.max(0, ((e.clientX - r.left) / r.width) * 100));
    vfill.style.width = p + '%';
  });

  /* 舞台自适应：首页卡片舞台较矮时整体等比缩小，保证不溢出 */
  function fit() {
    const host = ROOT.parentElement;
    if (!host || !player) return;
    player.style.transform = '';
    const availW = host.clientWidth, availH = host.clientHeight;
    const w = player.offsetWidth, h = player.offsetHeight;
    if (!w || !h || !availW || !availH) return;
    const s = Math.min(1, availW / w, availH / h);
    if (s < 1) player.style.transform = 'scale(' + s + ')';
  }
  fit();
  requestAnimationFrame(fit);
  window.addEventListener('resize', fit);
})();
</script>
