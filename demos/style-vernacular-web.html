<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;
  const player = ROOT.querySelector('.player');
  const bar = ROOT.querySelector('.bar');
  const playBtn = ROOT.querySelector('.play');
  const playIcon = playBtn.querySelector('.ic');
  const RM = window.matchMedia('(prefers-reduced-motion: reduce)');

  /* --- fit-to-stage scaling: the hub stage (220px) shows the specimen scaled,
         the detail stage (400px) shows it at natural size --- */
  function fit() {
    const host = ROOT.closest ? ROOT.closest('.stage-center') : null;
    if (!host) return;
    const cs = window.getComputedStyle(host);
    const aw = host.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
    const ah = host.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
    const s = Math.min(1, aw / ROOT.offsetWidth, ah / ROOT.offsetHeight);
    ROOT.style.transform = s < 1 ? 'scale(' + s + ')' : '';
  }
  fit();
  window.addEventListener('resize', fit);

  /* --- play / pause: smooth progress from 31% toward 100% over ~30s --- */
  const DUR = 30000;
  let p = 0.31, playing = false, last = 0, raf = 0;
  function render() { bar.style.width = (p * 100).toFixed(2) + '%'; }
  function updateIcon() {
    playIcon.textContent = playing ? '❚❚' : '►';
    playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
    player.classList.toggle('is-playing', playing);
  }
  function tick(t) {
    if (!playing) return;
    if (!last) last = t;
    p += (t - last) / DUR;
    last = t;
    if (p >= 1) {
      p = 1;
      playing = false;
      render();
      updateIcon();
      return;
    }
    render();
    raf = requestAnimationFrame(tick);
  }
  playBtn.addEventListener('click', function () {
    if (RM.matches) { /* reduced motion: progress jumps, no animation */
      playing = false;
      p = 1;
      render();
      updateIcon();
      return;
    }
    playing = !playing;
    if (playing) {
      if (p >= 1) p = 0;
      last = 0;
      raf = requestAnimationFrame(tick);
    } else {
      cancelAnimationFrame(raf);
    }
    updateIcon();
  });

  /* --- prev / next: reset to zero and replay --- */
  function restart() {
    p = 0;
    if (RM.matches) { render(); return; }
    playing = true;
    last = 0;
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(tick);
    render();
    updateIcon();
  }
  ROOT.querySelector('.prev').addEventListener('click', restart);
  ROOT.querySelector('.next').addEventListener('click', restart);

  /* --- volume: click track to set fill (initial 70%) --- */
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');
  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    let v = (e.clientX - r.left) / r.width;
    v = Math.max(0, Math.min(1, v));
    vfill.style.width = (v * 100).toFixed(1) + '%';
  });
})();
</script>
