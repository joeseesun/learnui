<script>
(function () {
  var ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;
  var player = ROOT.querySelector('.player');
  var bar = ROOT.querySelector('.bar');
  var playBtn = ROOT.querySelector('.cbtn.play');
  var prevBtn = ROOT.querySelector('.cbtn.prev');
  var nextBtn = ROOT.querySelector('.cbtn.next');
  var vtrack = ROOT.querySelector('.vtrack');
  var vfill = ROOT.querySelector('.vfill');
  if (!player || !bar || !playBtn || !vtrack || !vfill) return;

  var reduced = false;
  try { reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}

  var DURATION = 30000; /* 0 -> 100% in ~30s */
  var progress = 0.31;
  var playing = false;
  var rafId = null;
  var lastTs = null;

  function render() { bar.style.width = (progress * 100).toFixed(2) + '%'; }

  function setPlaying(on) {
    playing = on;
    player.classList.toggle('playing', on);
    playBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
    playBtn.setAttribute('aria-label', on ? 'Pause' : 'Play');
  }

  function stopLoop() {
    if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
    lastTs = null;
  }

  function tick(ts) {
    if (!playing) { stopLoop(); return; }
    if (lastTs === null) lastTs = ts;
    progress = Math.min(1, progress + (ts - lastTs) / DURATION);
    lastTs = ts;
    render();
    if (progress >= 1) { setPlaying(false); stopLoop(); return; }
    rafId = requestAnimationFrame(tick);
  }

  function play() {
    if (progress >= 1) progress = 0; /* replay after the track finished */
    if (reduced) { progress = 1; render(); setPlaying(true); return; } /* jump, no animation */
    setPlaying(true);
    stopLoop();
    rafId = requestAnimationFrame(tick);
  }

  playBtn.addEventListener('click', function () {
    if (playing) { setPlaying(false); stopLoop(); } else { play(); }
  });

  function restart() {
    stopLoop();
    progress = 0;
    render();
    if (reduced) { setPlaying(false); return; }
    setPlaying(true);
    rafId = requestAnimationFrame(tick);
  }
  if (prevBtn) prevBtn.addEventListener('click', restart);
  if (nextBtn) nextBtn.addEventListener('click', restart);

  function setVolume(v) {
    v = Math.min(1, Math.max(0, v));
    vfill.style.width = (v * 100).toFixed(1) + '%';
    vtrack.setAttribute('aria-valuenow', String(Math.round(v * 100)));
  }
  vtrack.addEventListener('click', function (e) {
    var r = vtrack.getBoundingClientRect();
    if (r.width > 0) setVolume((e.clientX - r.left) / r.width);
  });
  vtrack.addEventListener('keydown', function (e) {
    var now = parseFloat(vtrack.getAttribute('aria-valuenow')) || 0;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') { setVolume((now - 10) / 100); e.preventDefault(); }
    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') { setVolume((now + 10) / 100); e.preventDefault(); }
  });

  render();
  setPlaying(false);
  setVolume(0.7);
})();
</script>
