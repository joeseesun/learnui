<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  if (!ROOT) return;

  const player = ROOT.querySelector('.player');
  const playBtn = ROOT.querySelector('.play');
  const bar = ROOT.querySelector('.bar');
  const vtrack = ROOT.querySelector('.vtrack');
  const vfill = ROOT.querySelector('.vfill');

  const INITIAL = 31;
  const RATE = (100 - INITIAL) / 30000; /* percent per ms: 31% -> 100% in ~30s */
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  let progress = INITIAL;
  let playing = false;
  let raf = 0;
  let last = 0;

  function render() {
    bar.style.width = progress + '%';
  }

  function tick(now) {
    if (!playing) return;
    if (last) progress = Math.min(100, progress + (now - last) * RATE);
    last = now;
    render();
    if (progress >= 100) {
      setPlaying(false);
      return;
    }
    raf = requestAnimationFrame(tick);
  }

  function setPlaying(on) {
    cancelAnimationFrame(raf);
    last = 0;
    playing = on;
    player.classList.toggle('is-playing', on);
    playBtn.setAttribute('aria-label', on ? 'Pause' : 'Play');
    playBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
    if (on) {
      if (reduced.matches) { /* no animation under reduced motion: jump, stay paused */
        progress = 100;
        render();
        playing = false;
        player.classList.remove('is-playing');
        playBtn.setAttribute('aria-label', 'Play');
        playBtn.setAttribute('aria-pressed', 'false');
        return;
      }
      if (progress >= 100) progress = 0;
      render();
      raf = requestAnimationFrame(tick);
    }
  }

  function restart() {
    progress = 0;
    render();
    last = 0;
    if (playing) {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(tick);
    }
  }

  playBtn.addEventListener('click', function () { setPlaying(!playing); });
  ROOT.querySelector('.prev').addEventListener('click', restart);
  ROOT.querySelector('.next').addEventListener('click', restart);

  function setVolume(ratio) {
    const pct = Math.max(0, Math.min(1, ratio)) * 100;
    vfill.style.width = pct + '%';
    vtrack.setAttribute('aria-valuenow', String(Math.round(pct)));
  }

  vtrack.addEventListener('click', function (e) {
    const r = vtrack.getBoundingClientRect();
    setVolume((e.clientX - r.left) / r.width);
  });

  vtrack.addEventListener('keydown', function (e) {
    const cur = parseFloat(vfill.style.width || '70');
    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
      e.preventDefault();
      setVolume((cur + 10) / 100);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
      e.preventDefault();
      setVolume((cur - 10) / 100);
    }
  });

  render();
})();
</script>
