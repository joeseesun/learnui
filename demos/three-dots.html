<div class="demo demo-three-dots">
  <div class="row">
    <div class="cell">
      <div class="anchor">
        <button type="button" class="icon-btn" aria-haspopup="menu" aria-expanded="false" data-menu="m-meat" aria-label="More options">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="3" cy="8" r="1.4"/><circle cx="8" cy="8" r="1.4"/><circle cx="13" cy="8" r="1.4"/></svg>
        </button>
        <div class="menu" id="m-meat" role="menu">
          <button type="button" role="menuitem">Rename…</button>
          <button type="button" role="menuitem">Duplicate</button>
          <button type="button" role="menuitem">Delete</button>
        </div>
      </div>
      <span class="tag">meatballs</span>
    </div>
    <div class="cell">
      <div class="anchor">
        <button type="button" class="icon-btn" aria-haspopup="menu" aria-expanded="false" data-menu="m-kebab" aria-label="More options">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="3" r="1.4"/><circle cx="8" cy="8" r="1.4"/><circle cx="8" cy="13" r="1.4"/></svg>
        </button>
        <div class="menu" id="m-kebab" role="menu">
          <button type="button" role="menuitem">Share</button>
          <button type="button" role="menuitem">Report</button>
          <button type="button" role="menuitem">Mute</button>
        </div>
      </div>
      <span class="tag">kebab</span>
    </div>
    <div class="cell">
      <div class="anchor">
        <button type="button" class="icon-btn" aria-expanded="false" data-menu="drawer" aria-label="Open navigation">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M3 4.75h10M3 8h10M3 11.25h10"/></svg>
        </button>
      </div>
      <span class="tag">hamburger</span>
    </div>
    <div class="cell">
      <div class="anchor">
        <button type="button" class="text-btn" aria-haspopup="dialog" aria-expanded="false" data-menu="m-open">Open…</button>
        <div class="menu pop" id="m-open" role="dialog">
          <p>Open which file?</p>
          <div class="fake-input">Choose…</div>
        </div>
      </div>
      <span class="tag">command ellipsis</span>
    </div>
  </div>
  <div class="scrim" aria-hidden="true"></div>
  <div class="drawer" id="drawer" aria-label="Navigation">
    <p>Navigation</p>
    <button type="button">Home</button>
    <button type="button">Projects</button>
    <button type="button">Settings</button>
  </div>
</div>
<style>
.demo-three-dots {
  position: relative;
  width: 100%;
  max-width: 360px;
  height: 150px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-sans);
  color: #18181b;
}
.demo-three-dots .row { display: flex; align-items: flex-start; gap: 20px; }
.demo-three-dots .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.demo-three-dots .anchor { position: relative; }
.demo-three-dots .icon-btn {
  display: flex; width: 36px; height: 36px; align-items: center; justify-content: center;
  border-radius: 6px; border: 1px solid #e4e4e7; background: #fff;
  color: rgba(24,24,27,.8); box-shadow: 0 1px 2px rgba(0,0,0,.05);
  cursor: pointer; padding: 0; font: inherit;
  transition: background-color .15s;
}
.demo-three-dots .icon-btn:hover { background: rgba(244,244,245,.6); }
.demo-three-dots .text-btn {
  display: flex; height: 36px; align-items: center;
  border-radius: 6px; border: 1px solid #e4e4e7; background: #fff;
  padding: 0 12px; font: inherit; font-size: 12.5px; font-weight: 500;
  color: rgba(24,24,27,.85); box-shadow: 0 1px 2px rgba(0,0,0,.05);
  cursor: pointer;
  transition: background-color .15s;
}
.demo-three-dots .text-btn:hover { background: rgba(244,244,245,.6); }
.demo-three-dots .tag { font-family: var(--font-mono); font-size: 9.5px; color: #71717a; }
.demo-three-dots .menu {
  position: absolute; left: 50%; top: calc(100% + 6px); z-index: 10;
  width: 144px; transform: translateX(-50%) scale(.95); transform-origin: top;
  border-radius: 8px; border: 1px solid #e4e4e7; background: #fff; padding: 4px;
  box-shadow: 0 20px 25px -5px rgba(0,0,0,.1), 0 8px 10px -6px rgba(0,0,0,.1);
  opacity: 0; pointer-events: none;
  transition: opacity .15s, transform .15s;
}
.demo-three-dots .menu.open { opacity: 1; transform: translateX(-50%) scale(1); pointer-events: auto; }
.demo-three-dots .menu button {
  display: block; width: 100%; border: none; background: none; font: inherit;
  text-align: left; font-size: 12px; padding: 3px 8px; border-radius: 5px;
  cursor: pointer; color: #18181b;
  transition: background-color .1s;
}
.demo-three-dots .menu button:hover { background: #f4f4f5; }
.demo-three-dots .menu.pop { width: 176px; padding: 12px; }
.demo-three-dots .menu.pop p { margin: 0; font-size: 11.5px; font-weight: 500; }
.demo-three-dots .fake-input {
  margin-top: 6px; height: 24px; line-height: 24px;
  border-radius: 6px; border: 1px solid #e4e4e7; background: #fff;
  padding: 0 8px; font-size: 11px; color: #71717a;
}
.demo-three-dots .scrim {
  position: absolute; inset: -24px; z-index: 15;
  background: rgba(2,6,23,.25);
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.demo-three-dots .scrim.open { opacity: 1; pointer-events: auto; }
.demo-three-dots .drawer {
  position: absolute; top: -24px; bottom: -24px; left: -24px; z-index: 20;
  width: 144px; border-right: 1px solid #e4e4e7; background: #fff; padding: 12px;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,.25);
  transform: translateX(-102%);
  transition: transform .2s cubic-bezier(.23,1,.32,1);
}
.demo-three-dots .drawer.open { transform: translateX(0); }
.demo-three-dots .drawer p {
  margin: 0; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .05em; color: #71717a;
}
.demo-three-dots .drawer button {
  display: block; width: 100%; margin-top: 4px; border: none; background: none;
  font: inherit; text-align: left; font-size: 12px; padding: 4px 8px;
  border-radius: 5px; cursor: pointer; color: #18181b;
  transition: background-color .1s;
}
.demo-three-dots .drawer button:hover { background: #f4f4f5; }
@media (prefers-reduced-motion: reduce) {
  .demo-three-dots .icon-btn,
  .demo-three-dots .text-btn,
  .demo-three-dots .menu,
  .demo-three-dots .menu button,
  .demo-three-dots .scrim,
  .demo-three-dots .drawer,
  .demo-three-dots .drawer button { transition: none; }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  const menus = ROOT.querySelectorAll('.menu');
  const drawer = ROOT.querySelector('.drawer');
  const scrim = ROOT.querySelector('.scrim');

  function closeMenus() {
    menus.forEach(function (m) { m.classList.remove('open'); });
    ROOT.querySelectorAll('[data-menu]').forEach(function (b) { b.setAttribute('aria-expanded', 'false'); });
  }
  function closeDrawer() {
    drawer.classList.remove('open');
    scrim.classList.remove('open');
    ROOT.querySelector('[data-menu="drawer"]').setAttribute('aria-expanded', 'false');
  }

  ROOT.querySelectorAll('[data-menu]').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      const target = ROOT.querySelector('#' + btn.getAttribute('data-menu'));
      if (target === drawer) {
        const willOpen = !drawer.classList.contains('open');
        closeMenus();
        drawer.classList.toggle('open', willOpen);
        scrim.classList.toggle('open', willOpen);
        btn.setAttribute('aria-expanded', String(willOpen));
        return;
      }
      const willOpen = !target.classList.contains('open');
      closeMenus();
      closeDrawer();
      target.classList.toggle('open', willOpen);
      btn.setAttribute('aria-expanded', String(willOpen));
    });
  });

  scrim.addEventListener('click', closeDrawer);

  ROOT.addEventListener('click', function (e) {
    if (e.target.closest('.menu') && e.target.tagName !== 'BUTTON') return;
    closeMenus();
  });

  ROOT.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') { closeMenus(); closeDrawer(); }
  });
})();
</script>
