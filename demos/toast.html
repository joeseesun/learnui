<div class="demo demo-toast">
  <div class="card">
    <div class="sk sk-strong w-96"></div>
    <div class="sk"></div>
    <div class="sk w-75"></div>
    <button type="button" class="save-btn">Save changes</button>
  </div>
  <div class="toast" role="status">
    <span class="icon" aria-hidden="true"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
    <span class="msg">Changes saved</span>
  </div>
</div>
<style>
.demo-toast { font-family: var(--font-sans); position: relative; width: 280px; height: 176px; display: flex; align-items: center; justify-content: center; border-radius: 12px; overflow: hidden; background: linear-gradient(135deg, #f0f9ff, rgba(59,130,246,.08)); }
.demo-toast, .demo-toast * { box-sizing: border-box; }
.demo-toast .card { width: 208px; padding: 16px; border: 1px solid rgba(0,0,0,.1); border-radius: 12px; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.05); }
.demo-toast .sk { height: 8px; border-radius: 999px; background: #f1f5f9; margin-top: 8px; }
.demo-toast .sk-strong { background: #e2e8f0; margin-top: 0; margin-bottom: 12px; }
.demo-toast .w-96 { width: 96px; }
.demo-toast .w-75 { width: 75%; }
.demo-toast .save-btn { margin: 12px 0 0; appearance: none; border: 0; border-radius: 6px; background: #0f172a; color: #f8fafc; font: inherit; font-size: 12px; font-weight: 500; height: 32px; padding: 0 12px; cursor: pointer; transition: background-color .15s, transform .1s; }
.demo-toast .save-btn:hover { background: #1e293b; }
.demo-toast .save-btn:active { transform: scale(.97); }
.demo-toast .save-btn:focus-visible { outline: 2px solid rgba(37,99,235,.5); outline-offset: 1px; }
.demo-toast .toast { position: absolute; right: 16px; bottom: 16px; display: flex; align-items: center; gap: 10px; max-width: calc(100% - 32px); padding: 10px 12px; border: 1px solid rgba(0,0,0,.1); border-radius: 8px; background: #fff; box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1); font-size: 12px; font-weight: 500; color: #1e293b; opacity: 1; transform: translateY(0); transition: opacity .3s, transform .3s cubic-bezier(.23,1,.32,1); }
.demo-toast .toast.is-hidden { opacity: 0; transform: translateY(10px); pointer-events: none; }
.demo-toast .icon { flex: none; display: grid; place-items: center; width: 20px; height: 20px; border-radius: 50%; background: #d1fae5; color: #047857; }
@media (prefers-reduced-motion: reduce) {
  .demo-toast .save-btn,
  .demo-toast .toast { transition: none; }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  const toast = ROOT.querySelector('.toast');
  const save = ROOT.querySelector('.save-btn');
  let timer = null;
  function schedule() {
    clearTimeout(timer);
    timer = setTimeout(function () { toast.classList.add('is-hidden'); }, 4000);
  }
  save.addEventListener('click', function () {
    toast.classList.add('is-hidden');
    void toast.offsetWidth;
    toast.classList.remove('is-hidden');
    schedule();
  });
  toast.addEventListener('mouseenter', function () { clearTimeout(timer); });
  toast.addEventListener('mouseleave', schedule);
})();
</script>
