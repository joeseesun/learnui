<div class="demo demo-traffic-lights">
  <div class="win">
    <div class="titlebar">
      <div class="tl">
        <button type="button" class="tl-btn tl-close" aria-label="Close — click to toggle unsaved-changes dot">
          <svg class="glyph glyph-x" aria-hidden="true" width="7" height="7" viewBox="0 0 8 8"><path d="M1.5 1.5l5 5m0-5l-5 5" stroke="#7d0b04" stroke-width="1.1" stroke-linecap="round"/></svg>
          <span class="dot" aria-hidden="true"></span>
        </button>
        <button type="button" class="tl-btn tl-min" aria-label="Minimize">
          <svg class="glyph" aria-hidden="true" width="7" height="7" viewBox="0 0 8 8"><path d="M1.2 4h5.6" stroke="#985712" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
        <button type="button" class="tl-btn tl-zoom" aria-label="Zoom — click to toggle window zoom">
          <svg class="glyph" aria-hidden="true" width="7" height="7" viewBox="0 0 8 8"><path d="M2 4.6L4.6 2v2.6H2Zm4-1.2L3.4 6V3.4H6Z" fill="#0b650d" transform="rotate(90 4 4)"/></svg>
        </button>
      </div>
      <span class="win-title">Untitled</span>
    </div>
    <div class="content">
      <div class="line w-75"></div>
      <div class="line w-50"></div>
    </div>
  </div>
</div>
<style>
.demo-traffic-lights { font-family: var(--font-sans); }
.demo-traffic-lights, .demo-traffic-lights * { box-sizing: border-box; }
.demo-traffic-lights .win { width: 224px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(0,0,0,.1); background: #f6f6f7; color: rgba(0,0,0,.85); box-shadow: 0 24px 50px -12px rgba(0,0,0,.25), 0 4px 12px rgba(0,0,0,.08); transition: width .25s cubic-bezier(.23,1,.32,1); }
.demo-traffic-lights .win.is-zoomed { width: 268px; }
.demo-traffic-lights .titlebar { position: relative; display: flex; align-items: center; height: 36px; padding: 0 12px; border-bottom: 1px solid rgba(0,0,0,.05); }
.demo-traffic-lights .tl { display: flex; align-items: center; gap: 7px; }
.demo-traffic-lights .tl-btn { position: relative; display: flex; align-items: center; justify-content: center; width: 12px; height: 12px; margin: 0; padding: 0; border: 0; border-radius: 50%; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.15); cursor: default; }
.demo-traffic-lights .tl-btn:focus-visible { outline: 2px solid rgba(10,108,255,.6); outline-offset: 1px; }
.demo-traffic-lights .tl-close { background: #ff5f57; }
.demo-traffic-lights .tl-min { background: #febc2e; }
.demo-traffic-lights .tl-zoom { background: #28c840; }
.demo-traffic-lights .glyph { opacity: 0; transition: opacity .1s; }
.demo-traffic-lights .tl:hover .glyph { opacity: 1; }
.demo-traffic-lights .tl:hover .tl-close.is-dirty .glyph-x { opacity: 0; }
.demo-traffic-lights .dot { position: absolute; top: 50%; left: 50%; width: 4.5px; height: 4.5px; margin: -2.25px 0 0 -2.25px; border-radius: 50%; background: rgba(0,0,0,.55); opacity: 0; transition: opacity .1s; }
.demo-traffic-lights .tl-close.is-dirty .dot { opacity: 1; }
.demo-traffic-lights .win-title { position: absolute; left: 0; right: 0; text-align: center; font-size: 12px; font-weight: 600; color: rgba(0,0,0,.6); pointer-events: none; }
.demo-traffic-lights .content { height: 64px; padding: 12px 16px; }
.demo-traffic-lights .line { height: 8px; border-radius: 4px; background: rgba(0,0,0,.1); margin-top: 8px; }
.demo-traffic-lights .line:first-child { margin-top: 0; }
.demo-traffic-lights .w-75 { width: 75%; }
.demo-traffic-lights .w-50 { width: 50%; }
@media (prefers-reduced-motion: reduce) {
  .demo-traffic-lights .win,
  .demo-traffic-lights .glyph,
  .demo-traffic-lights .dot { transition: none; }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  ROOT.querySelector('.tl-close').addEventListener('click', function () {
    this.classList.toggle('is-dirty');
  });
  ROOT.querySelector('.tl-zoom').addEventListener('click', function () {
    ROOT.querySelector('.win').classList.toggle('is-zoomed');
  });
})();
</script>
