<div class="demo demo-vibrancy">
  <div class="wallpaper" aria-hidden="true">
    <div class="blob blob-sun"></div>
    <div class="blob blob-leaf"></div>
  </div>
  <div class="panel">
    <div class="panel-head">
      <p class="panel-title">Vibrancy on</p>
      <button type="button" class="switch is-on" role="switch" aria-checked="true" aria-label="Vibrancy"><span class="knob" aria-hidden="true"></span></button>
    </div>
    <p class="panel-sub">The wallpaper bleeds through the frosted material.</p>
  </div>
</div>
<style>
.demo-vibrancy { font-family: var(--font-sans); position: relative; width: 272px; height: 168px; display: flex; align-items: center; justify-content: center; border-radius: 12px; overflow: hidden; }
.demo-vibrancy, .demo-vibrancy * { box-sizing: border-box; }
.demo-vibrancy p { margin: 0; }
.demo-vibrancy .wallpaper { position: absolute; inset: 0; background: linear-gradient(135deg, #7fb2e5, #b48ad6 50%, #e8927c); }
.demo-vibrancy .blob { position: absolute; border-radius: 50%; }
.demo-vibrancy .blob-sun { left: 15%; top: 20%; width: 96px; height: 96px; background: rgba(255,214,10,.7); filter: blur(12px); }
.demo-vibrancy .blob-leaf { right: 20%; bottom: 18%; width: 112px; height: 112px; background: rgba(40,200,64,.5); filter: blur(16px); }
.demo-vibrancy .panel { position: relative; width: 208px; padding: 14px; border: 1px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.5); -webkit-backdrop-filter: blur(24px) saturate(1.6); backdrop-filter: blur(24px) saturate(1.6); box-shadow: 0 25px 50px -12px rgba(0,0,0,.25); transition: background-color .3s, border-color .3s, box-shadow .3s; }
.demo-vibrancy .panel.is-off { background: rgba(246,246,247,.96); -webkit-backdrop-filter: none; backdrop-filter: none; border-color: rgba(0,0,0,.1); box-shadow: 0 8px 20px rgba(0,0,0,.18); }
.demo-vibrancy .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.demo-vibrancy .panel-title { font-size: 12px; font-weight: 600; color: rgba(0,0,0,.8); }
.demo-vibrancy .panel-sub { margin-top: 4px; font-size: 11px; line-height: 1.4; color: rgba(0,0,0,.55); }
.demo-vibrancy .switch { position: relative; flex: none; width: 30px; height: 18px; margin: 0; padding: 0; border: 0; border-radius: 999px; background: rgba(0,0,0,.25); cursor: default; transition: background-color .15s; }
.demo-vibrancy .switch.is-on { background: #0a6cff; }
.demo-vibrancy .switch:focus-visible { outline: 2px solid rgba(10,108,255,.6); outline-offset: 1px; }
.demo-vibrancy .knob { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25); transition: transform .15s cubic-bezier(.23,1,.32,1); }
.demo-vibrancy .switch.is-on .knob { transform: translateX(12px); }
@media (prefers-reduced-motion: reduce) {
  .demo-vibrancy .panel,
  .demo-vibrancy .switch,
  .demo-vibrancy .knob { transition: none; }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  const panel = ROOT.querySelector('.panel');
  const sw = ROOT.querySelector('.switch');
  const title = ROOT.querySelector('.panel-title');
  const sub = ROOT.querySelector('.panel-sub');
  sw.addEventListener('click', function () {
    const on = !sw.classList.contains('is-on');
    sw.classList.toggle('is-on', on);
    sw.setAttribute('aria-checked', on ? 'true' : 'false');
    panel.classList.toggle('is-off', !on);
    title.textContent = on ? 'Vibrancy on' : 'Vibrancy off';
    sub.textContent = on
      ? 'The wallpaper bleeds through the frosted material.'
      : 'The panel turns opaque and hides the wallpaper.';
  });
})();
</script>
