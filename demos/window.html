<div class="demo demo-window">
  <div class="desktop">
    <div class="win">
      <div class="titlebar">
        <div class="tls">
          <span class="tl tl-r"><svg aria-hidden="true" width="7" height="7" viewBox="0 0 8 8"><path d="M1.5 1.5l5 5m0-5l-5 5" stroke="#7d0b04" stroke-width="1.1" stroke-linecap="round"/></svg></span>
          <span class="tl tl-y"><svg aria-hidden="true" width="7" height="7" viewBox="0 0 8 8"><path d="M1.2 4h5.6" stroke="#985712" stroke-width="1.2" stroke-linecap="round"/></svg></span>
          <span class="tl tl-g"><svg aria-hidden="true" width="7" height="7" viewBox="0 0 8 8"><path d="M2 4.6L4.6 2v2.6H2Zm4-1.2L3.4 6V3.4H6Z" fill="#0b650d" transform="rotate(90 4 4)"/></svg></span>
        </div>
        <span class="title">Notes</span>
        <span class="tb-spacer"></span>
        <button type="button" class="share-btn">
          <svg aria-hidden="true" width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 10V2.5M5 5l3-3 3 3M3.5 8v4.5a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V8"/></svg>Share</button>
        <span class="tb-group">
          <button type="button" class="tb-btn" aria-label="New note"><svg aria-hidden="true" width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M8 3v10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <button type="button" class="tb-btn" aria-label="List view"><svg aria-hidden="true" width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 4.5h10M3 8h7M3 11.5h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </span>
      </div>
      <div class="chrome-sep"></div>
      <div class="tabs">
        <button type="button" class="tab is-active" data-tab="0">Groceries</button>
        <button type="button" class="tab" data-tab="1">Ideas</button>
      </div>
      <div class="content">
        <div class="bars" data-pane="0">
          <div class="bar" style="width:66%"></div>
          <div class="bar" style="width:50%"></div>
        </div>
        <div class="bars is-hidden" data-pane="1">
          <div class="bar" style="width:55%"></div>
          <div class="bar" style="width:36%"></div>
        </div>
      </div>
      <span class="grip" aria-hidden="true">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M9 3v6H3M9 6v3H6" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
      </span>
    </div>
  </div>
</div>
<style>
.demo-window {
  font-family: var(--font-sans);
  user-select: none;
}
.demo-window .desktop {
  position: relative;
  width: 320px;
  height: 200px;
  border-radius: 10px;
  overflow: hidden;
  background: linear-gradient(to bottom right, #a7c4e2, #c6cbe8 50%, #e2c8d8);
}
.demo-window .win {
  position: absolute;
  left: 32px;
  top: 26px;
  width: 256px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,.1);
  background: #f6f6f7;
  color: rgba(0,0,0,.85);
  box-shadow: 0 25px 50px -12px rgba(0,0,0,.35), 0 4px 12px rgba(0,0,0,.12);
  overflow: hidden;
}
.demo-window .win.is-dragging {
  box-shadow: 0 32px 64px -12px rgba(0,0,0,.42), 0 6px 16px rgba(0,0,0,.14);
}
.demo-window .titlebar {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  height: 36px;
  padding: 0 12px;
  cursor: grab;
}
.demo-window .win.is-dragging .titlebar {
  cursor: grabbing;
}
.demo-window .tls {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.demo-window .tl {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: inset 0 0 0 .5px rgba(0,0,0,.15);
}
.demo-window .tl-r { background: #ff5f57; }
.demo-window .tl-y { background: #febc2e; }
.demo-window .tl-g { background: #28c840; }
.demo-window .tl svg {
  opacity: 0;
  transition: opacity .1s;
}
.demo-window .tls:hover .tl svg {
  opacity: 1;
}
.demo-window .title {
  margin-left: 6px;
  font-size: 12px;
  font-weight: 600;
  color: rgba(0,0,0,.6);
}
.demo-window .tb-spacer {
  flex: 1;
  height: 24px;
}
.demo-window button {
  font: inherit;
  color: inherit;
  background: none;
  border: 0;
  padding: 0;
  margin: 0;
  cursor: pointer;
}
.demo-window .share-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  height: 24px;
  padding: 0 8px;
  border-radius: 9999px;
  border: 1px solid rgba(0,0,0,.1);
  background: rgba(0,0,0,.05);
  font-size: 10.5px;
  font-weight: 500;
  color: rgba(0,0,0,.6);
  transition: background .1s;
}
.demo-window .share-btn:hover {
  background: rgba(0,0,0,.09);
}
.demo-window .tb-group {
  display: flex;
  align-items: center;
  gap: 4px;
}
.demo-window .tb-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  color: rgba(0,0,0,.55);
  transition: background .1s;
}
.demo-window .tb-btn:hover {
  background: rgba(0,0,0,.05);
}
.demo-window .chrome-sep {
  height: 1px;
  background: rgba(0,0,0,.1);
}
.demo-window .tabs {
  display: flex;
  border-bottom: 1px solid rgba(0,0,0,.1);
  background: rgba(0,0,0,.03);
  font-size: 11px;
}
.demo-window .tab {
  flex: 1;
  padding: 6px 12px;
  text-align: center;
  color: rgba(0,0,0,.5);
  transition: background .1s;
}
.demo-window .tab:hover {
  background: rgba(0,0,0,.05);
}
.demo-window .tab.is-active {
  background: rgba(255,255,255,.7);
  font-weight: 500;
  color: rgba(0,0,0,.8);
  box-shadow: inset -1px 0 0 rgba(0,0,0,.1);
}
.demo-window .content {
  position: relative;
  height: 80px;
  padding: 12px 16px;
}
.demo-window .bars.is-hidden {
  display: none;
}
.demo-window .bar {
  height: 8px;
  border-radius: 4px;
  background: rgba(0,0,0,.1);
}
.demo-window .bar + .bar {
  margin-top: 8px;
}
.demo-window .grip {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 16px;
  height: 16px;
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  padding: 0 3px 3px 0;
  color: rgba(0,0,0,.25);
  cursor: nwse-resize;
}
@media (prefers-reduced-motion: reduce) {
  .demo-window .tl svg,
  .demo-window .share-btn,
  .demo-window .tb-btn,
  .demo-window .tab {
    transition: none;
  }
}
</style>
<script>
(function () {
  const ROOT = document.currentScript.parentElement.querySelector(':scope > .demo');
  const desktop = ROOT.querySelector('.desktop');
  const win = ROOT.querySelector('.win');
  const titlebar = ROOT.querySelector('.titlebar');
  const grip = ROOT.querySelector('.grip');
  const content = ROOT.querySelector('.content');
  const tabs = Array.from(ROOT.querySelectorAll('.tab'));
  const panes = Array.from(ROOT.querySelectorAll('.bars'));

  // --- drag the window by its title bar (drag region) ---
  titlebar.addEventListener('pointerdown', function (e) {
    if (e.target.closest('button')) return;
    const startX = e.clientX - win.offsetLeft;
    const startY = e.clientY - win.offsetTop;
    win.classList.add('is-dragging');
    titlebar.setPointerCapture(e.pointerId);
    function move(ev) {
      const maxLeft = desktop.clientWidth - win.offsetWidth;
      const maxTop = desktop.clientHeight - win.offsetHeight;
      win.style.left = Math.min(Math.max(ev.clientX - startX, 0), maxLeft) + 'px';
      win.style.top = Math.min(Math.max(ev.clientY - startY, 0), maxTop) + 'px';
    }
    function up() {
      win.classList.remove('is-dragging');
      titlebar.removeEventListener('pointermove', move);
      titlebar.removeEventListener('pointerup', up);
      titlebar.removeEventListener('pointercancel', up);
    }
    titlebar.addEventListener('pointermove', move);
    titlebar.addEventListener('pointerup', up);
    titlebar.addEventListener('pointercancel', up);
  });

  // --- resize from the bottom-right corner grip ---
  grip.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    const startX = e.clientX;
    const startY = e.clientY;
    const startW = win.offsetWidth;
    const startH = content.offsetHeight;
    const chrome = win.offsetHeight - startH; // titlebar + separator + tabs
    grip.setPointerCapture(e.pointerId);
    function move(ev) {
      const maxW = desktop.clientWidth - win.offsetLeft;
      const maxH = desktop.clientHeight - win.offsetTop - chrome;
      win.style.width = Math.min(Math.max(startW + ev.clientX - startX, 210), maxW) + 'px';
      content.style.height = Math.min(Math.max(startH + ev.clientY - startY, 56), maxH) + 'px';
    }
    function up() {
      grip.removeEventListener('pointermove', move);
      grip.removeEventListener('pointerup', up);
      grip.removeEventListener('pointercancel', up);
    }
    grip.addEventListener('pointermove', move);
    grip.addEventListener('pointerup', up);
    grip.addEventListener('pointercancel', up);
  });

  // --- native window tabs switch between documents ---
  tabs.forEach(function (tab) {
    tab.addEventListener('click', function () {
      tabs.forEach(function (t) { t.classList.toggle('is-active', t === tab); });
      panes.forEach(function (p) {
        p.classList.toggle('is-hidden', p.dataset.pane !== tab.dataset.tab);
      });
    });
  });
})();
</script>
